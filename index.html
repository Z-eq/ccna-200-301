cal hardware."},{"q":"Match the IPsec component with its category.","o":["confidentiality — AES","authentication — ECDSA","key management — IKE","data integrity — SHA-2"],"c":["confidentiality — AES","authentication — ECDSA","key management — IKE","data integrity — SHA-2"],"cat":"Security AAA & ACL","e":"AES is an encryption algorithm (Confidentiality). ECDSA is a digital signature algorithm (Authentication). IKE is the protocol for secure key exchange (Key Management). SHA-2 is a hashing algorithm (Data Integrity)."},{"q":"What is the function of an FHRP?","o":["The FHRP supplies hosts with routing information.","The FHRP is a routing protocol.","The FHRP provides default gateway redundancy.","The FHRP is always standard-based."],"c":"The FHRP provides default gateway redundancy.","cat":"Routing & Protocols","e":"**FHRP (First Hop Redundancy Protocol)**, som inkluderar HSRP, VRRP och GLBP, skapar en **virtuell standard-gateway** som delas av två eller flera routrar för att ge redundans i händelse av att den aktiva routern misslyckas."},{"q":"In which type of applications does the user need to wait for a response when performing actions such as inventory lookup or a database update?","o":["batch applications","real-time applications","interactive applications","human-to-human applications"],"c":"interactive applications","cat":"Network Fundamentals & Tools","e":"Interactive applications, such as inventory lookups or database updates, require immediate two-way communication where the user must wait for the system's response to their input before proceeding with the next action."},{"q":"Which QoS mechanism prioritizes traffic based on class?","o":["FIFO","WRED","CBWFQ","Best Effort"],"c":"CBWFQ","cat":"TCP/IP/DNS Protocols","e":"Class-Based Weighted Fair Queuing (CBWFQ) reserves bandwidth per traffic class."},{"q":"Which command sets a VLAN as the native VLAN on a trunk port?","o":["switchport trunk native vlan 99","switchport access vlan 99","switchport mode trunk","switchport trunk allowed vlan 99"],"c":"switchport trunk native vlan 99","cat":"Switching & VLAN","e":"This command specifies which VLAN is untagged on a trunk port."},{"q":"How to access privileged EXEC mode?","o":["enable","exec","login","admin"],"c":"enable","cat":"Network Fundamentals & Tools","e":"The 'enable' command is used to transition from user EXEC mode to privileged EXEC mode in IOS."},{"q":"Which three of the following commands can be used to exit user EXEC mode in a Cisco CLI session? (Choose three.)","o":["exit","end","disable","quit","logout","escape"],"c":["exit","quit","logout"],"cat":"Network Fundamentals & Tools","e":"To exit **User EXEC** mode (`Router>`), you can use: **`exit`** (returns to login prompt or disconnects), **`logout`** (same as exit), or, if you were in Privileged EXEC mode (`Router#`) and ran `dquit` to drop down to User EXEC, you can then use `exit` or `logout` to completely leave the session. The option `disable` itself is used to exit Privileged EXEC mode and enter User EXEC mode, and not the other way around, but in some context it can terminate a session (like a disconnect). The most standard commands to exit the session completely are `exit` and `logout`."},{"q":"What is the availability percentage over a one-year period of a network that is not available for 15 minutes each month?","o":["99.9657 percent","0.9996 percent","99.8457 percent","0.0342 percent"],"c":"99.9657 percent","cat":"Network Fundamentals & Tools","e":"Totala minuter på ett år: $365 \\times 24 \\times 60 = 525,600$ minuter. Total nedtid: $12 \\text{ månader} \\times 15 \\text{ minuter} = 180$ minuter. Upptid: $525,600 - 180 = 525,420$ minuter. Tillgänglighet: $(525,420 / 525,600) \\times 100 \\approx 99.9657$ procent."},{"q":"Which ISO OSI layer defines services to segment the data?","o":["presentation layer","session layer","transport layer","network layer"],"c":"transport layer","cat":"OSI Model","e":"The **Transport Layer (Layer 4)** is responsible for taking data from the Application Layer and dividing it into smaller, manageable units called **segments** (for TCP) or datagrams (for UDP)."},{"q":"Which OSI layer do switches normally work on?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"c":"Layer 2","cat":"Switching & VLAN","e":"Traditional switches primarily operate at **Layer 2 (Data Link Layer)**, forwarding traffic based on **MAC addresses** contained in the Ethernet frame. Layer 3 switches (Multilayer switches) can also operate at the Network layer."},{"q":"Which Cisco IOS command do you use to change from user EXEC mode into privileged EXEC mode?","o":["enable","disable","admin","configure","configure terminal"],"c":"enable","cat":"Network Fundamentals & Tools","e":"The 'enable' command is used to move from User EXEC mode (router>) to the higher-privilege Privileged EXEC mode (router#)."},{"q":"You have configured two Layer 3 switches with HSRP to provide default gateway redundancy to hosts in VLAN 10 using HSRP version 1 and group 10. What is the virtual MAC address associated with the virtual router if the configured virtual IPv4 address is 10.1.1.1?","o":["1001.0001.001","1001.0c07.ac01","0000.0c07.ac10","0000.0c07.ac0a"],"c":"0000.0c07.ac0a","cat":"Routing & Protocols","e":"För **HSRP version 1** är formatet för den virtuella MAC-adressen `0000.0C07.ACxx`, där `xx` är HSRP-gruppnumret i hexadecimalt format. Eftersom gruppnumret är **10**, blir det hexadecimalt **0A**. Den fullständiga MAC-adressen är därför **0000.0C07.AC0A**."},{"q":"Refer to the exhibit. It represents the Cisco Enterprise Architecture model. In this model, where is the firewall located?","o":["between the edge router and the core switch","between the edge router and the distribution switch","between the internet and the core switch","between the internet and the edge router"],"c":"between the internet and the edge router","cat":"Security AAA & ACL","e":"I en säker nätverksarkitektur placeras **brandväggen** vanligtvis som den första försvarslinjen omedelbart efter anslutningen till **Internet** för att skydda den interna nätverksutrustningen, inklusive Edge-routern. Korrekt sekvens: Internet $\\rightarrow$ Brandvägg $\\rightarrow$ Edge Router."},{"q":"Which Cisco IOS command displays a brief summary of the interfaces, including IP addresses and status?","o":["show interfaces","show ip interface brief","show running-config","show ip route"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"\"show ip interface brief\" shows a one-line status of each interface and its IP address. \"show interfaces\" is more detailed, \"show running-config\" shows the configuration, and \"show ip route\" shows routing information."},{"q":"Which of the following is the default gateway on a device that is configured with an IP address of 192.168.1.50 and a subnet mask of 255.255.255.0?","o":["192.168.1.1","192.168.1.50","255.255.255.0","0.0.0.0"],"c":"192.168.1.1","cat":"Network Fundamentals & Tools","e":"The **default gateway** is the router interface IP address used to send traffic outside the local network. By convention, it is typically the first usable address in the subnet, which is **$192.168.1.1$** in the $192.168.1.0/24$ network."},{"q":"What is used by a router to determine where to forward data?","o":["routing table","ARP table","MAC address table","OSPF database"],"c":"routing table","cat":"Routing & Protocols","e":"A router performs a lookup in its **routing table** to find the best path (next hop) for a destination IP address. This is the core function of Layer 3 routing."},{"q":"How many usable host addresses are there in a /28 network?","o":["14","16","30","32"],"c":"14","cat":"Network Fundamentals & Tools","e":"A /28 subnet mask leaves 4 host bits, resulting in $2^4 = 16$ total addresses. Subtracting the network and broadcast addresses gives 14 usable host addresses."},{"q":"What is the default subnet mask for a Class C IPv4 network?","o":["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.255"],"c":"255.255.255.0","cat":"IP Addressing IPv4/Ipv6","e":"Class C addresses (e.g., 192.168.1.0) have a default mask of 255.255.255.0 (/24). This means the first three octets are the network portion and the last octet is for hosts."},{"q":"Which option correctly describes the \"on\" mode regarding EtherChannel?","o":["The EtherChannel will form only if the other side is set to on.","The EtherChannel will form if the other side is set to active.","If the other side is set to negotiate parameters through PAgP, EtherChannel will not form, because PAgP is a proprietary protocol.","If the other side is set to negotiate parameters through LACP, EtherChannel will form, because negotiations with standard protocol will be successful.","The Etherchannel will be successful if the other side is set to passive."],"c":"The EtherChannel will form only if the other side is set to on.","cat":"Switching & VLAN","e":"The **`on`** mode is a static configuration that forces the ports into an EtherChannel without any negotiation protocol (LACP or PAgP). Therefore, the peer switch must also be configured statically using the `on` mode for the channel to form."},{"q":"Which command is used to clear all ARP entries on a Cisco switch?","o":["clear ip arp","clear arp-cache","clear mac address-table","clear interface arp"],"c":"clear ip arp","cat":"Network Fundamentals & Tools","e":"The \"clear ip arp\" command clears the ARP cache on a Cisco device."},{"q":"How many usable host IP addresses are there in a /24 IPv4 subnet?","o":["254","256","252","255"],"c":"254","cat":"IP Addressing IPv4/Ipv6","e":"A /24 subnet (255.255.255.0) has $2^{8} = 256$ total addresses. You must reserve one address for the network address and one for the broadcast address, leaving $256 - 2 = 254$ usable host addresses."},{"q":"Which two statements about the layered model of communication are true? (Choose two.)","o":["Layering makes communication less complex.","Layer processes on a host logically communicate with the same layer processes on another host.","Layer processes on a host are independent and can communicate with any other layer.","Layering facilitates troubleshooting by allowing a fault to be isolated to specific layers.","Layering of functions is only theoretical and not implemented in reality."],"c":["Layer processes on a host logically communicate with the same layer processes on another host.","Layering facilitates troubleshooting by allowing a fault to be isolated to specific layers."],"cat":"OSI Model","e":"The two true statements are related to peer-to-peer logical communication and simplified diagnostics:\n1. **Logical Communication:** In the layered model, processes at Layer X on one host logically communicate with processes at Layer X on another host (peer-to-peer communication).\n2. **Troubleshooting:** The modular nature of layering simplifies troubleshooting by allowing technicians to isolate problems to a single, specific layer (e.g., Layer 2, Layer 3).\n\n*Layering simplifies the *management* of complexity through abstraction, not the communication protocols themselves."},{"q":"Which of the following network devices defines a broadcast domain and a collision domain on every one of its ports?","o":["bridge","hub","router","switch"],"c":"router","cat":"Network Fundamentals & Tools","e":"A router separates both collision domains and broadcast domains for each of its interfaces."},{"q":"Which command clears the running configuration on a Cisco switch?","o":["erase startup-config","clear running-config","write erase","reload"],"c":"write erase","cat":"Network Fundamentals & Tools","e":"\"write erase\" raderar startup-konfigurationen i NVRAM; efter omstart kommer enheten ha tom konfiguration."},{"q":"Which protocol is used for VLAN trunking between switches?","o":["VTP","802.1Q","STP","DTP"],"c":"802.1Q","cat":"Network Fundamentals & Tools","e":"**802.1Q** (often called Dot1Q) is the standard protocol for VLAN tagging on trunk ports. It inserts a 4-byte tag into the Ethernet frame header to identify the VLAN."},{"q":"Which two statements correctly describe port forwarding? (Choose two.)","o":["Port forwarding is defined as a static mapping.","Port forwarding enables devices in the private network to reach critical services in external networks.","Port forwarding enables local resource in private network to be available to external networks.","Port forwarding changes only port numbers and is a mechanism that forces applications to use arbitrarily chosen port numbers.","Port forwarding is dynamic translation mechanism that enables multiple hosts from external networks to access the same resource in the private network.","Port forwarding statically defines multiple ports and the number of ports determines how many connections can be established to the same resource in the private network."],"c":["Port forwarding is defined as a static mapping.","Port forwarding enables local resource in private network to be available to external networks."],"cat":"WAN & SDN/Virtualization","e":"Port forwarding is a form of **static NAT** (or Static PAT) that maps a specific port on the public address to a specific private IP address and port, enabling external access to an internal server (local resource)."},{"q":"What alternative to Cisco Meraki Dashboard can you use to manage Cisco Meraki network devices?","o":["Cisco Meraki Dashboard API","RESTCONF","SNMP","Telnet"],"c":"Cisco Meraki Dashboard API","cat":"Automation & DevOps","e":"Cisco Meraki is primarily cloud-managed via the Dashboard web interface. The official, modern alternative for bulk configuration, monitoring, and integration is the Meraki Dashboard API (Application Programming Interface), which is a RESTful interface."},{"q":"Presuming there are no specific obstacles on locations where you are setting up a WLAN network, for which location should you use a patch antenna?","o":["a big laboratory","a group of small offices","a large meeting room","a warehouse rack"],"c":"a warehouse rack","cat":"Wireless","e":"A patch antenna is a directional antenna. It is best used to cover long, narrow areas (like the aisles between warehouse racks) or to provide focused coverage in a specific direction, minimizing signal interference elsewhere."},{"q":"Which layer in the OSI model is responsible for routing and IP addressing?","o":["Layer 2","Layer 3","Layer 4","Layer 5"],"c":"Layer 3","cat":"OSI Model","e":"Layer 3 (Network Layer) is where logical addressing (IP addresses) and routing decisions take place."},{"q":"Which OSI stack layers match the application layer of the TCP/IP stack?","o":["Application layer","Presentation layer","Session layer","Network layer","Data Link layer"],"c":["Application layer","Presentation layer","Session layer"],"cat":"OSI Model","e":"TCP/IP-modellens Application layer omfattar funktionaliteten hos OSI:s Application (Lager 7), Presentation (Lager 6) och Session (Lager 5) lager."},{"q":"You have detected that the rogue DHCP server in the LAN replicates client DHCP requests before they reach the authentic DHCP server. Which two options describe this attack type? (Choose two.)","o":["DHCP DoS attack","DHCP spoofing attack","DHCP authentication attack","IP address spoofing","application/service spoofing"],"c":["DHCP spoofing attack","application/service spoofing"],"cat":"Security AAA & ACL","e":"Correct: The attack is a DHCP spoofing attack, where a rogue server impersonates an authentic DHCP server. It also counts as application/service spoofing because the service (DHCP) is manipulated. The options:\n- 'DHCP DoS attack' would block DHCP, not impersonate.\n- 'DHCP authentication attack' does not exist as a standard attack.\n- 'IP address spoofing' means fake IP, but does not affect the DHCP server's service directly."},{"q":"Data center monitoring shows increased loads on the aggregation links from leaf switches to spine switches. To avoid congesting the links, you decide to expand the topology. Which action would be the most appropriate to make?","o":["To mitigate congestion of aggregation links, you add a leaf switch to the network.","To mitigate congestion of aggregation links, you throttle the bandwidth available to servers.","To mitigate congestion of aggregation links, you add a spine switch to the network.","To mitigate congestion of aggregation links, you increase the capacity of the links connecting servers to the leaf switches."],"c":"To mitigate congestion of aggregation links, you add a spine switch to the network.","cat":"Network Fundamentals & Tools","e":"In a Spine-Leaf (Clos) architecture, the links between the **Leaf** switches and the **Spine** switches form the aggregation layer. Adding a new **Spine** switch immediately increases the total available bandwidth and the number of paths (via Equal-Cost Multipathing, ECMP) between all Leaf switches, directly mitigating congestion at the aggregation layer. Adding a Leaf switch would only increase the *source* of the traffic (the servers) and worsen the congestion."},{"q":"Which number represents the default encryption type of the protected password used to restrict access to the privileged EXEC mode?","o":["4","5","8","9"],"c":"4","cat":"Security AAA & ACL","e":"Cisco uses numbers to indicate the encryption type for passwords (like 'enable secret'). Type 4 historically represented SHA-256 protection, but note that current best practices favor Type 8 or 9 (newer SHA-256 and SHA-512) for strong security."},{"q":"Which of the following are benefits of VLANs? (Select all that apply.)","o":["Segmentation of broadcast domains","Improved network security","Increased collision domains","Reduced cabling"],"c":["Segmentation of broadcast domains","Improved network security"],"cat":"Network Fundamentals & Tools","e":"VLANs divide a network into separate broadcast domains and improve security by isolating traffic."},{"q":"What is the first action the router performs after it is powered up?","o":["finds and loads IOS","finds and applies configuration statements","runs POST to test the hardware","displays command line prompt"],"c":"runs POST to test the hardware","cat":"Network Fundamentals & Tools","e":"The boot sequence of a Cisco device begins with the **Power-On Self-Test (POST)**, which is firmware that verifies the presence and operation of basic hardware components like CPU, memory, and network interfaces."},{"q":"What does the term per-hop behavior (PHB) signify?","o":["a set of node requirements for compliance with the DiffServ model","a set of packet markings applied to different classes of traffic","a set of techniques for traffic shaping","a set of traffic classes defined in the network"],"c":"a set of techniques for traffic shaping","cat":"Network Fundamentals & Tools","e":"The term PHB refers to how a node will treat traffic having the same Differentiated Services Code Point (DSCP) values. The DiffServ model itself does not specify how PHBs must be implemented. A variety of techniques may be used to implement the desired traffic conditioning and PHB."},{"q":"Which protocol is used for secure remote access to a switch/router?","o":["Telnet","SSH","FTP","HTTP"],"c":"SSH","cat":"Security AAA & ACL","e":"**SSH (Secure Shell)** krypterar både autentiseringsuppgifter och all datatrafik under fjärradministrationssessionen, till skillnad från det oskyddade Telnet."},{"q":"Which statement regarding switch characteristics is correct?","o":["A generic CPU is too slow for forwarding traffic in a switch.","A generic ASIC is too slow for forwarding traffic in a switch.","A generic CPU is too fast for forwarding traffic in a switch.","A switch has smaller frame buffers to avoid network congestion."],"c":"A generic CPU is too slow for forwarding traffic in a switch.","cat":"Switching & VLAN","e":"Modern switches achieve wire-speed forwarding performance primarily by using specialized **ASICs (Application-Specific Integrated Circuits)**. A general-purpose CPU is typically too slow for the high-volume, low-latency traffic processing required for layer 2 switching."},{"q":"Which network characteristic indicates the dependability of the components that make up the network?","o":["reliability","scalability","security","availability"],"c":"reliability","cat":"Network Fundamentals & Tools","e":"**Reliability (Pålitlighet)** mäter nätverkskomponenternas förmåga att fungera utan fel under specificerade förhållanden under en viss tidsperiod (dependability). **Availability (Tillgänglighet)** är måttet på den faktiska upptiden, vanligtvis i procent."},{"q":"What information is stored in a switch's MAC address table?","o":["Mappings of IP addresses to MAC addresses","Mappings of MAC addresses to switch ports","Mappings of MAC addresses to IP addresses","Mappings of IP addresses to switch ports"],"c":"Mappings of MAC addresses to switch ports","cat":"Switching & VLAN","e":"En switchs **MAC-adresstabell (CAM-tabell)** lagrar en mappning mellan en **MAC-adress** och den **port** som MAC-adressen senast sågs på. Detta gör att switchen kan vidarebefordra ramar selektivt."},{"q":"Which severity level is used when a system is unusable?","o":["Emergency","Alert","Critical","Error"],"c":"Emergency","cat":"Network Fundamentals & Tools","e":"Syslog-meddelanden använder 8 allvarlighetsnivåer (0-7). **Emergency** (nivå 0) är den högsta allvarlighetsgraden, vilket indikerar att systemet är oanvändbart och omedelbar uppmärksamhet krävs (ofta kallat 'panik'-meddelanden)."},{"q":"Which three characteristics apply to the 802.1Q protocol? (Choose three.)","o":["It carries untagged frames.","It modifies the 802.3 frame header.","It includes an 8-bit field for TTL (Time to Live).","It is a messaging protocol that carries a VLAN configuration.","It uses an internal tagging mechanism."],"c":["It carries untagged frames.","It modifies the 802.3 frame header.","It uses an internal tagging mechanism."],"cat":"Switching & VLAN","e":"802.1Q (VLAN tagging) inserts a 4-byte tag into the standard Ethernet frame (modifies the header). It uses a tagging mechanism to identify the VLAN. It can also carry untagged frames (the native VLAN)."},{"q":"Which data format is common in REST APIs?","o":["XML","JSON","CSV","YAML"],"c":"JSON","cat":"Automation & DevOps","e":"**JSON (JavaScript Object Notation)** is a lightweight data interchange format that is widely used due to its simplicity and readability, making it the dominant format for data transfer in REST APIs."},{"q":"What protocol is used to dynamically assign IP addresses?","o":["DNS","DHCP","HTTP","FTP"],"c":"DHCP","cat":"TCP/IP/DNS Protocols","e":"DHCP (Dynamic Host Configuration Protocol) is used to automatically assign IP addresses to devices on a network."},{"q":"Which type of cabling is immune to electromagnetic interference (EMI)?","o":["Unshielded twisted pair (UTP)","Shielded twisted pair (STP)","Fiber optic cable","Coaxial cable"],"c":"Fiber optic cable","cat":"Network Fundamentals & Tools","e":"Fiber optic cable carries data as light rather than electrical signals, so it is not affected by electromagnetic interference. Copper-based cables (UTP, STP, coax) can suffer from EMI to varying degrees."},{"q":"Ethernet networks use which method to control access to the medium and handle collisions on shared links?","o":["Token passing","CSMA/CD","CSMA/CA","Polling"],"c":"CSMA/CD","cat":"Switching & VLAN","e":"Traditional Ethernet (half-duplex, e.g., when using hubs) uses CSMA/CD (Carrier Sense Multiple Access with Collision Detection) to control access. Devices listen before transmitting and detect collisions so they can retransmit. Token passing is used in Token Ring/FDDI, CSMA/CA in Wi-Fi, and polling in other systems."},{"q":"Which command on a Cisco router removes a static route?","o":["no ip route 192.168.1.0 255.255.255.0 10.0.0.1","clear ip route 192.168.1.0","remove ip route 192.168.1.0","delete ip route 192.168.1.0"],"c":"no ip route 192.168.1.0 255.255.255.0 10.0.0.1","cat":"Network Fundamentals & Tools","e":"To remove a static route, use the command \"no ip route\" followed by network, mask and next hop."},{"q":"Where in the network should you implement QoS packet classification?","o":["at the input interface of a device at the LAN access edge of the network","at the input interface of a device at the WAN edge of the network","at the output interface of a device at the LAN access edge of the network","at the output interface of a device at the WAN edge of the network"],"c":"at the input interface of a device at the LAN access edge of the network","cat":"Network Fundamentals & Tools","e":"**Classification and marking** (the start of the QoS process) should occur as close to the **source** as possible (the access edge **input** interface). This ensures the packet is marked consistently and can be trusted throughout the rest of the network."},{"q":"Which three options are classified as internet-based WAN connectivity options? (Choose three.)","o":["MPLS","Metro Ethernet","xDSL","cable","T1/E1","cellular 4G"],"c":["xDSL","cable","cellular 4G"],"cat":"WAN & SDN/Virtualization","e":"Internet-based WAN connectivity (also called Public WAN) relies on the shared, public Internet infrastructure for transport. \n\n1. **cable:** Uses HFC (Hybrid Fiber-Coaxial) networks and a cable modem (DOCSIS) to provide access via the public Internet.\n2. **xDSL:** Uses copper telephone lines (ADSL, VDSL) to deliver broadband access via the public Internet.\n3. **cellular 4G/5G (WWAN):** Uses mobile network towers to connect remote sites to the public Internet over a wireless medium.\n\nConversely, T1/E1, MPLS, and Metro Ethernet are classified as **private, provider-managed WAN solutions** because they use dedicated circuits or secured carrier networks that bypass the public Internet, offering higher performance and security guarantees."},{"q":"Which layer in the OSI model handles encryption and data representation?","o":["Layer 5","Layer 6","Layer 7","Layer 4"],"c":"Layer 6","cat":"Network Fundamentals & Tools","e":"Presentationslagret (Layer 6) hanterar datarepresentation, inklusive kryptering och kompression."},{"q":"Which command displays all VLANs and trunk ports on a Cisco switch?","o":["show vlan brief","show interfaces trunk","show vlan id 1","show running-config"],"c":"show vlan brief","cat":"Switching & VLAN","e":"\"show vlan brief\" visar en översikt av alla VLAN och de access-portar som är tilldelade dem. För en exakt lista över trunk-portar och de VLAN de bär, används dock kommandot 'show interfaces trunk'."},{"q":"Which protocol is used to send AVS in IPv6?","o":["ND (Neighbor Discovery)","ARP","ICMPv6","DNS"],"c":"ICMPv6","cat":"IP Addressing IPv4/Ipv6","e":"ICMPv6 is used for Neighbor Discovery and other control messages in IPv6."},{"q":"Which command on a Cisco switch shows the MAC address table?","o":["show mac address-table","show arp","show ip route","show running-config"],"c":"show mac address-table","cat":"Network Fundamentals & Tools","e":"**show mac address-table** displays the dynamic and static MAC address entries learned by the switch and associated with specific ports/VLANs."},{"q":"Which protocol can be used to automatically distribute VLAN configuration information across multiple switches?","o":["VTP","DTP","STP","LLDP"],"c":"VTP","cat":"Switching & VLAN","e":"**VTP (VLAN Trunking Protocol)** is a Cisco protocol that propagates VLAN configurations to other switches in the same VTP domain. DTP is used to negotiate trunk links, STP prevents loops, and LLDP is a link discovery protocol."},{"q":"Which three are the most reliable network practices used in Networking? (Choose three.)","o":["automated systems testing","copying and pasting configuration from a text editor to a device","manual system testing","using programmability tools to automate network configuration","using version controls for all configuration changes"],"c":["automated systems testing","using programmability tools to automate network configuration","using version controls for all configuration changes"],"cat":"Network Fundamentals & Tools","e":"Reliable and modern network practices focus on automation (programmability tools), validation (automated testing), and accountability (version control) to minimize human error and track changes."},{"q":"Which wireless technology provides host connectivity within a large geographic area, such as a city or a suburb?","o":["WPAN","WLAN","IEEE 802.11","WMAN"],"c":"WMAN","cat":"Network Fundamentals & Tools","e":"WMAN (Wireless Metropolitan Area Network) är designat för trådlös anslutning över stora geografiska områden (stad/förort). WLAN (802.11) täcker endast ett lokalt område (LAN)."},{"q":"What protocol is used to transfer email between servers?","o":["SMTP","POP3","IMAP","FTP"],"c":"SMTP","cat":"TCP/IP/DNS Protocols","e":"**SMTP (Simple Mail Transfer Protocol)** is the primary protocol used to send e-mail between mail servers. POP3 and IMAP are used by clients to retrieve email from a server."},{"q":"Which command on a Cisco switch shows MAC address-table aging-time?","o":["show mac address-table aging-time","show mac address-table","show arp","show vlan brief"],"c":"show mac address-table aging-time","cat":"Network Fundamentals & Tools","e":"\"show mac address-table aging-time\" shows the current setting for how long dynamically learned MAC address records are kept in the table before being flushed."},{"q":"What is the function of the default gateway?","o":["Assign IP addresses","Receive DNS queries","Route traffic to external networks","Monitor traffic"],"c":"Route traffic to external networks","cat":"Network Fundamentals & Tools","e":"The **default gateway** is the device (usually a router) on a local network that hosts use to send traffic destined for any network outside their local segment. It acts as the pathway to external networks."},{"q":"Which command displays IP addresses and status for all interfaces on a Cisco router?","o":["show ip route","show ip interface brief","show interfaces status","show ip arp"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"The 'show ip interface brief' command gives a quick summary of all interfaces, their IP addresses and status."},{"q":"Which two numbers could you use in the numbered configuration method, or a number as a name in the named configuration method, to configure standard IPv4 access lists? (Choose two.)","o":["150","100","305","2000","2300","75","1305"],"c":["75","1305"],"cat":"Security AAA & ACL","e":"Standard IPv4 ACLs use the number ranges 1–99 and the extended 1300–1999. \n75 is in 1–99, and 1305 in 1300–1999. \nOther numbers are for Extended ACLs."},{"q":"Which two options are classified as link-state routing protocols? (Choose two.)","o":["IS-IS","OSPF","EIGRP","RIPv2","BGP"],"c":["IS-IS","OSPF"],"cat":"Routing & Protocols","e":"**OSPF** and **IS-IS** are the two primary protocols that generate a complete map of the network topology (link state) and use Dijkstra's algorithm to calculate the shortest path."},{"q":"Which Rapid PVST+ Spanning Tree Protocol roles correspond to a forwarding port state? (Choose two.)","o":["alternate","backup","designated","disabled","root"],"c":["designated","root"],"cat":"Switching & VLAN","e":"In RSTP/Rapid PVST+, only the **Designated Port** and the **Root Port** roles are in a **Forwarding** state, actively sending and receiving user traffic. Alternate and Backup ports are in a Discarding state (blocking)."},{"q":"In an enterprise environment, which guideline should be implemented to manage passwords securely, and why?","o":["A centralized password repository should be avoided, because it is a single point of failure.","A local password repository should be used, because it is more secure, and there is no need to transmit passwords using a AAA protocol.","Access to passwords should be logged along with the user information, in order to have visibility of password usage.","Passwords should NOT be used, because digital certificates are more secure and scale better."],"c":"Access to passwords should be logged along with the user information, in order to have visibility of password usage.","cat":"Security AAA & ACL","e":"In large enterprise environments, strong security practices emphasize **accountability** and **auditing** (the 'Accounting' part of the AAA framework). \n\nLogging and monitoring **access to sensitive passwords** (often managed via a Privileged Access Management or PAM solution) is essential. This log, which includes the user, the time, and the resource accessed, provides crucial **visibility** for security teams, ensures non-repudiation, helps maintain compliance, and is vital data for any forensic analysis following an incident. While a centralized repository presents a single point of failure risk, that risk is typically mitigated through redundancy and is preferred over decentralized management for consistency."},{"q":"What must you ensure when configuring two ends of an 802.1Q trunk?","o":["The native VLAN must be tagged.","The native VLAN must be the same.","DTP must be disabled.","DTP modes on both ends must be the same."],"c":"The native VLAN must be the same.","cat":"Switching & VLAN","e":"För att en 802.1Q trunk-länk ska fungera korrekt måste **native VLAN ID matcha på båda anslutna switchportarna**. Ett mismatch orsakar ett native VLAN-mismatch-fel och kan leda till kommunikationsproblem."}]};

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmtTime(s){if(!s||isNaN(s))return '0s';let r=Math.round(s),m=Math.floor(r/60),sec=r%60;return m>0?`${m}m ${sec<10?'0'+sec:sec}s`:`${r}s`;}

function loadQuestions(){
  let allQ = [];
  if(state.onlyWrong){
    allQ = state.wrongQs.map(q=>({...q,sourceFile:'wrong'}));
  } else {
    for(let f of state.selectedFiles){
      const bank = QUESTION_BANKS[f];
      if(bank) bank.forEach(q=>allQ.push({question:q.q,options:q.o,correct:q.c,category:q.cat,explanation:q.e,sourceFile:f}));
    }
  }
  // Dedup
  const seen={};
  allQ.forEach(q=>{const k=q.question.toLowerCase().trim();if(!seen[k])seen[k]=q;});
  state.allLoaded = Object.values(seen);
  // Extract categories
  const cats = new Set();
  state.allLoaded.forEach(q=>cats.add(q.category||'Other'));
  state.selectedCats = new Set(cats);
}

// ====== CONFETTI ======
function fireConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];const colors=['#22d3ee','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c'];
  for(let i=0;i<120;i++){
    pieces.push({x:canvas.width*.5+((Math.random()-.5)*200),y:canvas.height*.6,vx:(Math.random()-.5)*12,vy:-(Math.random()*14+6),r:Math.random()*6+3,c:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-.5)*10,life:1});
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      if(p.life<=0)return;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.rot+=p.rv;p.life-=.008;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.life;ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
    });
    if(alive&&frame<300){frame++;requestAnimationFrame(draw);}
    else{ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  draw();
}

    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text"><h1>${t('title')}</h1><span>${t('sub')}</span></div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="tagCurrentQ()">📌 ${state.lang==='sv'?'Tagga':'Tag'}</button>
      <button class="hdr-btn" style="border-color:var(--red-border);color:var(--red)" onclick="showAbortModal()">⏹ ${t('abort')}</button>
    </div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="progress-info">
    <span>${t('qOf').replace('[C]',state.current+1).replace('[T]',state.questions.length)}</span>
    <span>${isMulti?'Multiple select':'Single answer'}</span>
  </div>

  <div class="q-card fade-in">
    <div class="q-text">${esc(q.question)}</div>
    <div class="q-options">
      ${opts.map((opt,i)=>{
        const letter = String.fromCharCode(65+i);
        const isSelected = state.selected.has(opt);
        const correctSet = new Set(Array.isArray(q.correct)?q.correct:[q.correct]);
        let cls = 'q-opt';
        if(isSelected) cls += ' selected';
        if(state.locked){
          cls += ' locked';
          if(correctSet.has(opt)) cls += ' correct-show';
          else if(isSelected && !correctSet.has(opt)) cls += ' wrong-show';
        }
        if(isMulti){
          return `<div class="${cls}" onclick="selectOpt('${esc(opt).replace(/'/g,"\\'")}',${isMulti})">
            <span class="q-chk">✓</span>
            <span class="q-opt-letter">${letter}</span>
            <span class="q-opt-text">${esc(opt)}</span>
          </div>`;
        }
        return `<div class="${cls}" onclick="selectOpt('${esc(opt).replace(/'/g,"\\'")}',${isMulti})">
          <span class="q-opt-letter">${letter}</span>
          <span class="q-opt-text">${esc(opt)}</span>
        </div>`;
      }).join('')}
    </div>
    ${state.locked && state.showExplanation?`
      <div class="explanation-box">
        <strong>${t('expl')}</strong>
        ${esc(q.explanation||t('noExpl'))}
      </div>
    `:''}
  </div>

  <div class="quiz-bar">
    <div></div>
    <div class="flex gap-8">
      ${isMulti && !state.locked?`<button class="btn btn-primary" ${state.selected.size===0?'disabled':''} onclick="submitMulti()">${t('submit')}</button>`:''}
      ${state.locked && state.showExplanation?`<button class="btn btn-primary" onclick="nextQuestion()">${t('next')} →</button>`:''}
    </div>
  </div>`;
}

function renderResult(){
  let totalCorrect=0, totalTime=0;
  const catData={}, misses=[];
  state.scoreList.forEach((s,idx)=>{
    totalTime+=s.time;
    if(s.correct)totalCorrect++;
    else misses.push({question:state.questions[idx],userAnswer:s.userSelected});
    if(!catData[s.category])catData[s.category]={correct:0,total:0};
    catData[s.category].total++;
    if(s.correct)catData[s.category].correct++;
  });
  const pct = state.scoreList.length?(totalCorrect/state.scoreList.length*100).toFixed(1):0;
  const tips = Object.entries(catData).filter(([c,d])=>(d.total-d.correct)>=3);

  return `
  <div class="header">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text"><h1>${t('title')}</h1><span>${t('sub')}</span></div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="toggleLang()">${state.lang==='en'?'🇸🇪 SV':'🇬🇧 EN'}</button>
      <button class="hdr-btn" onclick="toggleTheme()">${state.theme==='dark'?'☀️ Light':'🌙 Dark'}</button>
    </div>
  </div>

  <div class="result-hero fade-in">
    <div class="result-score">${pct}%</div>
    <div class="result-sub">${totalCorrect} / ${state.scoreList.length} ${t('correct').toLowerCase()}</div>
  </div>

  <div class="result-stats fade-in fade-in-d1">
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${totalCorrect}</div><div class="stat-label">${t('correct')}</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${state.scoreList.length-totalCorrect}</div><div class="stat-label">${t('wrong')}</div></div>
    <div class="stat-box"><div class="stat-val">${fmtTime(totalTime)}</div><div class="stat-label">${t('time')}</div></div>
    <div class="stat-box"><div class="stat-val">${(totalTime/state.scoreList.length||0).toFixed(1)}s</div><div class="stat-label">${t('avg')}</div></div>
  </div>

  <div class="card fade-in fade-in-d2">
    <div class="card-head"><h2>${t('results')} by Category</h2></div>
    <div class="card-body">
      ${Object.entries(catData).sort((a,b)=>{
        const pa=a[1].total?a[1].correct/a[1].total:0;
        const pb=b[1].total?b[1].correct/b[1].total:0;
        return pa-pb;
      }).map(([cat,d])=>{
        const p=d.total?(d.correct/d.total*100):0;
        const col=p>=80?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
        return `<div class="cat-result">
          <span class="cat-name">${esc(cat)}</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${p}%;background:${col}"></div></div>
          <span class="cat-pct">${d.correct}/${d.total}</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${tips.length>0?`
  <div class="card fade-in fade-in-d3" style="border-color:var(--yellow)">
    <div class="card-head"><h2>💡 ${t('tips')}</h2></div>
    <div class="card-body">
      <div class="cat-grid">${tips.map(([c,d])=>`<span class="cat-pill" style="border-color:var(--yellow);color:var(--yellow)">${esc(c)} (${d.total-d.correct} miss)</span>`).join('')}</div>
    </div>
  </div>`:''}

  ${misses.length>0?`
  <h3 style="font-family:var(--mono);font-size:.95rem;margin:28px 0 16px;color:var(--text2)">🔍 ${t('summary')} (${misses.length})</h3>
  ${misses.map(m=>`
    <div class="miss-card fade-in">
      <div class="miss-q">${esc(m.question.question)}</div>
      <div class="miss-ans wrong">✘ ${t('yourAns')} ${esc(Array.isArray(m.userAnswer)?m.userAnswer.join(', '):m.userAnswer)}</div>
      <div class="miss-ans right">✔ ${t('correctAns')} ${esc(Array.isArray(m.question.correct)?m.question.correct.join(', '):m.question.correct)}</div>
      ${m.question.explanation?`<div class="miss-exp">${esc(m.question.explanation)}</div>`:''}
    </div>
  `).join('')}`:''}

  <div style="text-align:center;margin-top:32px">
    <button class="btn btn-primary btn-start" onclick="restart()">🔁 ${t('restart')}</button>
  </div>`;
}

function renderModal(){
  if(state.modal==='abort'){
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">${t('abortTitle')}</div>
        <p style="color:var(--text2);font-size:.9rem">${t('abortBody')}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
          <button class="btn btn-ghost" onclick="restart()">${t('returnBtn')}</button>
          <button class="btn btn-primary" onclick="abortWithScore()">${t('scoreBtn')}</button>
        </div>
      </div>
    </div>`;
  }
  if(state.modal==='tag'){
    const q = state.questions[state.current];
    return `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">📌 ${t('tagQ')}</div>
        <p style="color:var(--text2);font-size:.88rem;margin-bottom:12px">${esc(q?q.question:'')}</p>
        <div style="margin-bottom:8px;font-size:.85rem;color:var(--text3)">${t('tagNote')}</div>
        <textarea class="tag-input" id="tagInput" rows="3">${state.tagComment}</textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
          <button class="btn btn-primary" onclick="saveTag()">${t('save')}</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

// ====== ACTIONS ======
window.toggleLang = ()=>{state.lang=state.lang==='en'?'sv':'en';render();};
window.toggleTheme = ()=>{
  state.theme=state.theme==='dark'?'light':'dark';
  document.body.className=state.theme;
  render();
};
window.toggleFile = (name)=>{
  if(state.selectedFiles.has(name))state.selectedFiles.delete(name);else state.selectedFiles.add(name);
  loadQuestions();render();
};
window.toggleAllFiles = ()=>{
  const all=Object.keys(QUESTION_BANKS);
  const allSel=all.every(n=>state.selectedFiles.has(n));
  if(allSel)state.selectedFiles.clear();else all.forEach(n=>state.selectedFiles.add(n));
  loadQuestions();render();
};
window.toggleOnlyWrong = ()=>{state.onlyWrong=!state.onlyWrong;loadQuestions();render();};
window.toggleCat = (cat)=>{
  if(state.selectedCats.has(cat))state.selectedCats.delete(cat);else state.selectedCats.add(cat);
  render();
};
window.toggleAllCats = ()=>{
  const cats=new Set();state.allLoaded.forEach(q=>cats.add(q.category||'Other'));
  const allSel=[...cats].every(c=>state.selectedCats.has(c));
  if(allSel)state.selectedCats.clear();else state.selectedCats=new Set(cats);
  render();
};
window.setNumQ = (v)=>{state.numQuestions=v;};
window.toggleHS = ()=>{state.showHS=!state.showHS;render();};
window.toggleTagsView = ()=>{state.showTags=!state.showTags;render();};

window.startQuiz = ()=>{
  let filtered=state.allLoaded.filter(q=>state.selectedCats.has(q.category||'Other'));
  if(filtered.length===0)return;
  let qs=shuffle(filtered);
  const num=parseInt(state.numQuestions);
  if(num&&num<qs.length)qs=qs.slice(0,num);
  // Pre-shuffle options for each question
  qs.forEach(q=>{q._shuffledOpts=shuffle([...q.options]);});
  state.questions=qs;state.current=0;state.scoreList=[];state.quizStart=Date.now();
  state.qStart=Date.now();state.selected=new Set();state.locked=false;state.showExplanation=false;
  state.screen='quiz';render();
};

window.selectOpt = (opt, isMulti)=>{
  if(state.locked)return;
  if(isMulti){
    if(state.selected.has(opt))state.selected.delete(opt);else state.selected.add(opt);
    render();
  } else {
    state.selected=new Set([opt]);
    checkSingle(opt);
  }
};

function checkSingle(opt){
  const q=state.questions[state.current];
  const time=(Date.now()-state.qStart)/1000;
  const isCorrect=(opt===q.correct);
  state.scoreList.push({category:q.category||'Other',correct:isCorrect,time,userSelected:opt});
  state.locked=true;

  if(isCorrect){
    state.wrongQs=state.wrongQs.filter(w=>w.question!==q.question&&w.q!==q.question);
    saveWrong();
    state.showExplanation=false;
    render();
    setTimeout(()=>{nextQ();},700);
  } else {
    if(!state.wrongQs.some(w=>(w.question||w.q)===q.question)){
      state.wrongQs.push({question:q.question,options:q.options,correct:q.correct,category:q.category,explanation:q.explanation});
      saveWrong();
    }
    state.showExplanation=true;
    render();
  }
}

window.submitMulti = ()=>{
  if(state.locked||state.selected.size===0)return;
  const q=state.questions[state.current];
  const time=(Date.now()-state.qStart)/1000;
  const correctSet=new Set(q.correct);
  const isCorrect=state.selected.size===correctSet.size&&[...state.selected].every(s=>correctSet.has(s));
  state.scoreList.push({category:q.category||'Other',correct:isCorrect,time,userSelected:[...state.selected].join(', ')});
  state.locked=true;

  if(isCorrect){
    state.wrongQs=state.wrongQs.filter(w=>w.question!==q.question&&w.q!==q.question);
    saveWrong();
    state.showExplanation=false;
    render();
    setTimeout(()=>{nextQ();},900);
  } else {
    if(!state.wrongQs.some(w=>(w.question||w.q)===q.question)){
      state.wrongQs.push({question:q.question,options:q.options,correct:q.correct,category:q.category,explanation:q.explanation});
      saveWrong();
    }
    state.showExplanation=true;
    render();
  }
};

window.nextQuestion = ()=>{nextQ();};
function nextQ(){
  state.current++;
  if(state.current>=state.questions.length){showResults();return;}
  state.selected=new Set();state.locked=false;state.showExplanation=false;state.qStart=Date.now();
  render();
  // Scroll to top
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResults(){
  // Save highscore
  let totalCorrect=0;let totalTime=0;
  state.scoreList.forEach(s=>{totalTime+=s.time;if(s.correct)totalCorrect++;});
  const pct=state.scoreList.length?(totalCorrect/state.scoreList.length*100).toFixed(1):0;
  const now=new Date();
  const dateStr=now.toLocaleString(state.lang==='sv'?'sv-SE':'en-US');
  state.highscores.push({date:dateStr,score:Math.round(parseFloat(pct)),total:`${totalCorrect}/${state.scoreList.length}`,time:totalTime,files:[...state.selectedFiles]});
  saveHS();

  state.screen='result';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
  if(parseFloat(pct)>=85)setTimeout(fireConfetti,300);
}

window.showAbortModal = ()=>{state.modal='abort';render();};
window.tagCurrentQ = ()=>{state.modal='tag';state.tagComment='';render();};
window.closeModal = (e)=>{if(e&&e.target!==e.currentTarget)return;state.modal=null;render();};
window.abortWithScore = ()=>{state.modal=null;showResults();};
window.restart = ()=>{
  state.screen='start';state.modal=null;state.questions=[];state.scoreList=[];
  state.selected=new Set();state.locked=false;state.showExplanation=false;
  loadQuestions();render();
  window.scrollTo({top:0,behavior:'smooth'});
};

window.saveTag = ()=>{
  const q=state.questions[state.current];
  const input=document.getElementById('tagInput');
  const comment=input?input.value.trim():'';
  const now=new Date().toLocaleString(state.lang==='sv'?'sv-SE':'en-US');
  state.tags.push({question:q.question,category:q.category,source:q.sourceFile,comment,date:now});
  saveTags();
  state.modal=null;
  render();
};

window.removeTag = (i)=>{
  const realIdx=state.tags.length-1-i;
  state.tags.splice(realIdx,1);
  saveTags();
  render();
};

function bind(){
  // Keyboard navigation
}

// Boot
async function boot(){
  document.body.className=state.theme;
  await loadStorage();
  initFileCounts();
  loadQuestions();
  render();
  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if(state.screen!=='quiz'||state.modal)return;
    if(e.key==='Enter'&&state.locked&&state.showExplanation)nextQ();
  });
}

boot();
})();
</script>
</body>
</html>
