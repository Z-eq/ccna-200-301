 and how the service provider appears from the perspective of the customer? (Choose two.)","o":["The service provider is implementing MPLS L2VPN.","The service provider is implementing MPLS L3VPN.","The service provider is implementing MPLS VPLS.","The service provider network can be represented as a router from the customer perspective.","The service provider network can be represented as a switch from the customer perspective."],"c":["The service provider is implementing MPLS L3VPN.","The service provider network can be represented as a router from the customer perspective."],"cat":"WAN & SDN/Virtualization","e":"In an MPLS L3VPN (Layer 3 VPN) service, the service provider's router (PE) participates in IP routing with the customer's router (CE). This means the customer sees the provider's network as a router that handles the routing function between sites. If the answer were L2VPN or VPLS, the provider network would appear as a switch (a transparent Layer 2 segment)."}],"cisco5":[{"q":"Which statement is true regarding tokens in the context of splitting text into smaller pieces?","o":["Tokens are always single characters.","Tokens are always whole sentences, ensuring that the context is fully preserved during text processing.","Tokens are only created by removing punctuation from text, simplifying the input for text analysis software.","Tokens can be characters, words, phrases, or even parts of words, depending on the tokenizer used."],"c":"Tokens can be characters, words, phrases, or even parts of words, depending on the tokenizer used.","cat":"AI & Machine Learning","e":"Tokenization breaks text into meaningful units called tokens. The size and nature of a token are highly dependent on the specific tokenizer algorithm employed, which can range from individual characters to entire phrases."},{"q":"What is the ICMP type for echo reply packets?","o":["1","0","2","3"],"c":"0","cat":"TCP/IP/DNS Protocols","e":"ICMP type 0 is for echo reply. ICMP type 8 is for echo request. ICMP type 3 is for destination unreachable."},{"q":"What is the purpose of a DMZ (Demilitarized Zone) in network security?","o":["To isolate external-facing services from internal networks","To secure wireless communications","To create a separate IP address pool for internal networks","To encrypt traffic between devices"],"c":"To isolate external-facing services from internal networks","cat":"Security AAA & ACL","e":"A DMZ is a buffer network zone designed to host public services (like web and email servers). It acts as an intermediate layer, preventing direct access from the public internet to the organization's secured internal network."},{"q":"What are the two characteristics of the overlay network? (Choose two.)","o":["It is a logical topology.","It is a physical topology.","It is used to connect devices virtually.","It is used to connect devices physically.","It provides underlay routing."],"c":["It is a logical topology.","It is used to connect devices virtually."],"cat":"Network Fundamentals & Tools","e":"An **Overlay network** is a virtual network built **on top of** an underlying physical network (the **Underlay**). Therefore, it represents a **logical topology** and is used to connect devices **virtually** (often via tunneling protocols like VXLAN or GRE), independent of the physical infrastructure path."},{"q":"When using the modified EUI-64 format to create the interface ID of an IPv6 unicast address, which two portions of the Ethernet MAC are used unchanged? (Choose two.)","o":["Organizational Unique Identifier (OUI) octets","network interface card (NIC) specific octets","the universal/local bit","the unicast/multicast bit","the protocol type octet"],"c":["network interface card (NIC) specific octets","the unicast/multicast bit"],"cat":"IP Addressing IPv4/Ipv6","e":"The EUI-64 process converts the 48-bit MAC address into a 64-bit Interface ID by:\n\n1.  **Inserting FFFE:** The hex sequence FFFE is inserted between the third and fourth octets.\n2.  **Inverting the U/L bit:** The **Universal/Local (U/L) bit** (the 7th bit of the first octet, part of the OUI) is **inverted** to indicate a globally unique ID. Therefore, the **OUI octets** are not used unchanged.\n\nThe two portions that remain unchanged are:\n\n* **network interface card (NIC) specific octets:** The last 24 bits of the MAC address (the serial number part) are used without modification.\n* **the unicast/multicast bit:** This is the 8th bit of the first octet (part of the OUI). It is used to identify the MAC address type and is **not inverted** during the EUI-64 conversion."},{"q":"What are two main benefits of using spine-leaf architecture compared to traditional data center architectures, which use virtual Port Channel (vPC)? (Choose two.)","o":["It is cheaper to implement.","It is easier to scale.","The oversubscription of links is reduced.","The configuration is simplified.","The troubleshooting is simplified."],"c":["It is easier to scale.","The oversubscription of links is reduced."],"cat":"Network Fundamentals & Tools","e":"Spine-leaf architecture is a two-tier, non-blocking topology designed to handle the east-west traffic patterns prevalent in modern data centers, offering significant advantages over the traditional three-tier model (even when enhanced with vPC):\n\n1.  **Easier to Scale:** Capacity is scaled linearly by adding more spine switches (for increased bandwidth) or more leaf switches (for increased port density). This modularity simplifies network growth.\n2.  **Reduced Oversubscription:** Every leaf switch connects to every spine switch, utilizing Equal-Cost Multi-Pathing (ECMP) routing. This allows traffic to be distributed across all available links simultaneously, resulting in highly efficient bandwidth utilization and a very low oversubscription ratio."},{"q":"A host has the MAC address of 11:22:33:aa:bbcc. It uses a modified EUI-64 format to create its global unicast IPv6 address. Which IPv6 address is a correctly created global unicast IPv6 address of the device?","o":["2001:db8:aaaa:bbbb:1122:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1322:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1d22:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1d22:33ff:ffaa:bbcc","2001:db8:aaaa:bbbb:887d:9eb8:437d:3456"],"c":"2001:db8:aaaa:bbbb:1322:33ff:feaa:bbcc","cat":"IP Addressing IPv4/Ipv6","e":"The EUI-64 process converts the 48-bit MAC address (11:22:33:aa:bb:cc) into a 64-bit Interface ID in two main steps:\n\n1. **Insertion:** The hexadecimal sequence **FFFE** is inserted in the middle, resulting in 1122:33ff:feaa:bbcc.\n2. **Inversion:** The **7th bit** of the first octet (11) is inverted to indicate that the address is globally unique (U/L bit). The first octet '11' becomes '13' (since the first byte, 11, is 00010001 in binary, and inverting the 7th bit [from 0 to 1] results in 00010011, which is 13 hex).\n\nThe final Interface ID is **1322:33ff:feaa:bbcc**, which is then appended to the network prefix."},{"q":"Which bit in the MAC address is referred as the U/L bit?","o":["least significant bit in the first octet","most significant bit in the first octet","second least significant bit in the first octet","second least significant bit in the second octet"],"c":"second least significant bit in the first octet","cat":"Network Fundamentals & Tools","e":"The **Universal/Local (U/L) bit** is the 7th bit of the MAC address (counting from the most significant bit, or the second least significant bit of the first octet). It indicates whether the address is globally unique (Universal, U/L=0) or locally administered (Local, U/L=1)."},{"q":"What is the function of a WLAN controller?","o":["monitor and control the incoming and outgoing network traffic","automatically handle the configuration of wireless access point","allow wireless devices to connect to a wired network","connect networks and intelligently choose the best paths between networks"],"c":"automatically handle the configuration of wireless access point","cat":"Wireless","e":"The WLAN Controller (WLC) centralizes the management and configuration of multiple Access Points (APs)."},{"q":"Which command displays OSPF neighbors on a Cisco router?","o":["show ip ospf neighbor","show ip ospf database","show ip ospf interface","show ip protocols"],"c":"show ip ospf neighbor","cat":"Routing & Protocols","e":"\"show ip ospf neighbor\" displays the list of direct OSPF neighbors and their states."},{"q":"For a router, which of the following is the preferred source of information about a destination network?","o":["an active local interface connected to the network","Enhanced Interior Gateway Routing Protocol (EIGRP)","Open Shortest Path First (OSPF)","the ip route configuration command"],"c":"an active local interface connected to the network","cat":"Routing & Protocols","e":"Correct: A directly connected (local) interface is always the most preferred source of route information because the router has direct access to that network. Dynamic and static routes are only used when the network is not locally connected.\n- 'EIGRP' and 'OSPF' are dynamic routing protocols used for learned routes, not for directly connected networks.\n- 'ip route' defines a static route, which has a lower priority than directly connected routes."},{"q":"When using a AAA server along with an access switch, which two features benefit from centralized authentication? (Choose two.)","o":["IPsec VPN access","management access","network access","network telemetry authentication","spanning tree authentication"],"c":["management access","network access"],"cat":"Security AAA & ACL","e":"AAA servers primarily handle Network Access (802.1X for users connecting to the network) and Management Access (SSH/Telnet login for administrators to manage the switch). VPN access is typically handled by a gateway/firewall, not an access switch."},{"q":"Which option enables you to check if the Cisco IOS image on a router is corrupt or compromised?","o":["MD5 digests","HTTPS","SSL","SSH"],"c":"MD5 digests","cat":"Network Fundamentals & Tools","e":"An MD5 digest (or hash) is a cryptographic checksum that provides a unique signature for a file. By comparing the calculated MD5 hash of the installed IOS image with the known correct hash from Cisco, an administrator can verify the integrity and detect corruption or tampering."},{"q":"Which option describes an intent-driven policy?","o":["Examine the network policy configuration to derive the intent of the device configuration.","Translate business rules about the intent of the overall system into device-specific network policy configuration.","Label the intent of a specific element of device configuration for organizational purposes.","This design enables linear scalability and robust multipathing within the fabric, optimized for the east-to-west traffic that applications require."],"c":"Translate business rules about the intent of the overall system into device-specific network policy configuration.","cat":"Automation & DevOps","e":"Intent-based networking (IBN) translates high-level business requirements (intent) into low-level device configurations automatically, ensuring the network always meets the desired business outcome."},{"q":"Which three options are Layer 2 Ethernet characteristics? (Choose three.)","o":["Ethernet uses MAC addresses.","Layer 2 addressing identifies end devices in LAN.","Layer 2 enables the packet to be carried av local media across each segment.","Ethernet uses IPv4 addresses.","Layer 2 identifies applications in LAN."],"c":["Ethernet uses MAC addresses.","Layer 2 addressing identifies end devices in LAN.","Layer 2 enables the packet to be carried av local media across each segment."],"cat":"Switching & VLAN","e":"At Layer 2 (Data Link), Ethernet uses MAC addresses for local addressing within a LAN segment and frames (PDUs) are carried directly on the physical media across each segment."},{"q":"What is the default gateway address if your network is 10.0.0.0/8?","o":["10.0.0.1","10.0.0.255","10.0.0.0","10.0.0.254"],"c":"10.0.0.1","cat":"TCP/IP/DNS Protocols","e":"Usually, the first available address (10.0.0.1) is used as the default gateway."},{"q":"Which QoS tools analyze the traffic and decide which category the packet belongs in?","o":["link-specific tools","policing and shaping tools","congestion management and scheduling tools","classification and marking tools"],"c":"classification and marking tools","cat":"Network Fundamentals & Tools","e":"**Classification** is the process of examining a packet's attributes (e.g., source/destination IP, port) to determine its traffic class. **Marking** is the process of writing the classification result into a packet header field (like CoS or DSCP)."},{"q":"Which command verifies the IP routing table on a Cisco router?","o":["show ip route","show ip interface brief","ping","traceroute"],"c":"show ip route","cat":"Routing & Protocols","e":"The 'show ip route' command is the direct command used to display and verify the contents of the router's current IP routing table, which is used for all Layer 3 forwarding decisions."},{"q":"Which feature of PVST+ is not available in RSTP?","o":["fast convergence on topology changes","per-port STP","per-VLAN STP instance","edge ports"],"c":"per-VLAN STP instance","cat":"Switching & VLAN","e":"**PVST+ (Per-VLAN Spanning Tree Plus)** kör en separat, oberoende STP-instans för **varje VLAN**, vilket möjliggör lastbalansering. **RSTP (Rapid Spanning Tree Protocol)**, som är standardbaserat, kör endast en enda instans av STP för hela det överbryggade nätverket (CST - Common Spanning Tree)."},{"q":"Which type of traffic inspection uses pattern matching?","o":["signature-based inspection","statistical-anomaly detection","protocol verification","policy-based inspection"],"c":"signature-based inspection","cat":"Security AAA & ACL","e":"Signature-based inspection involves comparing network traffic patterns or file hashes against a database of known threats (signatures) to identify matches."},{"q":"If POST completes during a startup of a Cisco device and there is no configuration file, what does the router do?","o":["It reboots.","It initiates initial configuration through \"setup.\"","It creates a configuration file with default settings and boots that file.","It shuts down the router."],"c":"It initiates initial configuration through \"setup.\"","cat":"Network Fundamentals & Tools","e":"If the device cannot find a 'startup-config' file in NVRAM, it assumes it is unconfigured and automatically enters the initial configuration dialog (System Configuration Dialog or 'setup' mode)."},{"q":"Which layer of the OSI model handles troubleshooting and diagnostic tools such as ping?","o":["Layer 3","Layer 4","Layer 5","Layer 6"],"c":"Layer 3","cat":"OSI Model","e":"**Ping** utilizes the ICMP (Internet Control Message Protocol), which operates at **Layer 3 (the Network Layer)**, to test network connectivity and reachability between IP hosts."},{"q":"What is a /64 network prefix in IPv6 typically associated with?","o":["Global Unicast","Link-Local","Multicast","Anycast"],"c":"Global Unicast","cat":"IP Addressing IPv4/Ipv6","e":"**Global Unicast Addresses (GUA)**, som används för att kommunicera över Internet, tilldelas vanligtvis med en **$/64$-prefixlängd**. Detta ger 64 bitar för subnätprefixet och 64 bitar för Interface ID (värddelen), vilket möjliggör **SLAAC** (Stateless Address Autoconfiguration)."},{"q":"Refer to the exhibit. PC_A wants to communicate with PC_B, which resides on a different network. The hosts are connected via a router that acts as the default gateway for both. The ARP tables on all three devices are empty. When PC_A sends the first frame, which two things happen in the process? (Choose two.)","o":["PC_A broadcasts the frame intended for PC_B.","PC_A sends a broadcast ARP request looking for the MAC address of the router.","The router adds an IPv4 address to the MAC address's mapping for PC_A to its ARP table.","The router drops the packet after checking for the mapping of PC_B's IP address.","The router receives a frame with its own MAC and mismatched IP address, and drops it."],"c":["PC_A sends a broadcast ARP request looking for the MAC address of the router.","The router adds an IPv4 address to the MAC address's mapping for PC_A to its ARP table."],"cat":"Network Fundamentals & Tools","e":"Eftersom PC_A och PC_B är i olika nätverk skickar PC_A paketet till sin **Default Gateway (routern)**. Eftersom PC_A:s ARP-tabell är tom, måste den först skicka en **ARP-broadcast** för att hitta routerns MAC-adress. När routern tar emot denna ARP-förfrågan, lägger den till PC_A:s IP/MAC-par i sin egen **ARP-tabell**."},{"q":"What is the administrative distance (AD) of a directly connected route?","o":["0","1","5","255"],"c":"0","cat":"TCP/IP/DNS Protocols","e":"The administrative distance of a directly connected route is 0, as it is the most reliable route."},{"q":"Which command on a Cisco switch shows trunk ports and allowed VLANs?","o":["show interfaces trunk","show vlan brief","show ip interface brief","show running-config"],"c":"show interfaces trunk","cat":"Network Fundamentals & Tools","e":"`show interfaces trunk` visar vilka portar som är konfigurerade som trunk-länkar, det aktuella trunking-läget och vilka VLAN som är tillåtna över dem."},{"q":"Which command would you use to enable LLDP globally on a router?","o":["lldp transmit","lldp run","LLDs receive","cdp run","cdp enable"],"c":"lldp run","cat":"Network Fundamentals & Tools","e":"Correct: 'lldp run' enables Link Layer Discovery Protocol (LLDP) globally. The options:\n- 'lldp transmit' is used in interface mode to allow TX, but does not enable LLDP globally.\n- 'LLDs receive' is incorrect syntax.\n- 'cdp run' enables Cisco Discovery Protocol, not LLDP.\n- 'cdp enable' enables CDP per interface, not LLDP."},{"q":"You have been assigned a task to configure two routers as part of an HSRP group. Since you did not configure priority on the routers, which statement is correct?","o":["Both routrar kommer vara i ACTIVE state.","Both routrar kommer vara i STANDBY state.","Both routrar kommer vara i LISTEN state.","One router kommer vara i ACTIVE och den andra i STANDBY state."],"c":"One router kommer vara i ACTIVE och den andra i STANDBY state.","cat":"Routing & Protocols","e":"Om ingen prioritet är konfigurerad i HSRP, väljs den router som har den högsta IP-adressen (för HSRP-gruppen) som den aktiva (`ACTIVE`). Den näst högsta blir standbyn (`STANDBY`)."},{"q":"Which protocol is used to handle certificate and key exchange in IPsec?","o":["IKEv2","SSL","TLS","PPTP"],"c":"IKEv2","cat":"Security AAA & ACL","e":"IKEv2 (Internet Key Exchange version 2) is used to handle key exchange in IPsec."},{"q":"Which option happens first when a switch is powered on?","o":["Cisco IOS is booted up.","Linux is booted up.","POST begins.","Command line appears."],"c":"POST begins.","cat":"Network Fundamentals & Tools","e":"The Power-On Self-Test (POST) is the very first step in the boot sequence of a Cisco device, ensuring that the hardware components are functional before attempting to load the operating system (Cisco IOS)."},{"q":"What is the solicited-node multicast IPv6 address for 2001:db8:1001:f:2c0:10ff:fe17:fc0f?","o":["ff02:0000:0000:0000:0000:0001:ff17:fc0f","2001:0000:0000:0000:0000:0001:ff17:fc0f","ff02:0000:0000:0000:0000:0001:fe17:fc0f","ff02:0000:0000:0000:0000:10ff:fe17:fc0f"],"c":"ff02:0000:0000:0000:0000:0001:ff17:fc0f","cat":"IP Addressing IPv4/Ipv6","e":"Solicited-Node Multicast-adressprefixet är **ff02::1:ff00:0/104**. De sista 24 bitarna av unicast-adressens interface ID (`17:fc0f`) kombineras med `ff` för att bilda grupp-ID:t. Därmed blir det `ff02::1:ff17:fc0f` (med nollor utökade)."},{"q":"Which statement regarding buffer overflow attack is correct?","o":["A buffer overflow attack cannot result in a DoS attack.","Buffer overflow attacks cannot be used for client-side attacks.","When a buffer overflows due to buffer overflow attack, it overwrites adjacent memory.","The memory space used to store user input in the application can never be flooded."],"c":"When a buffer overflows due to buffer overflow attack, it overwrites adjacent memory.","cat":"Security AAA & ACL","e":"A buffer overflow occurs when a program writes more data to a fixed-length buffer than the buffer is designed to hold. This excess data overflows and overwrites adjacent memory spaces, which can lead to various security vulnerabilities, including DoS or executing arbitrary code."},{"q":"What does DHCP Option 43 provide for in a Cisco WLAN?","o":["DNS server name","DNS domain name","default gateway","WLC IP address"],"c":"WLC IP address","cat":"Wireless","e":"DHCP Option 43 is a Vendor-Specific Information Option used by Cisco Access Points (APs) to dynamically discover the IP address of the **Wireless LAN Controller (WLC)**, allowing the AP to establish a CAPWAP tunnel."},{"q":"Which three IEEE 802.11 amendments specify the 5-GHz frequency band for Wi-Fi operation? (Choose three.)","o":["802.11a","802.11b","802.11g","802.11n","802.11ac"],"c":["802.11a","802.11n","802.11ac"],"cat":"Wireless","e":"The 802.11a standard was the first to specify the 5 GHz band. \n802.11n supports both 2.4 GHz and 5 GHz (dual-band) operation. \n802.11ac operates exclusively in the 5 GHz band to achieve higher speeds. \n802.11b and 802.11g are 2.4 GHz-only standards."},{"q":"Which two characteristics describe HTTP? (Choose two.)","o":["HTTP uses a peer-to-peer model of communication.","HTTP is a stateless protocol.","HTTP is using only UDP protocol.","HTTP is a stateful protocol.","HTTP works on the application layer."],"c":["HTTP is a stateless protocol.","HTTP works on the application layer."],"cat":"TCP/IP/DNS Protocols","e":"HTTP (Hypertext Transfer Protocol) operates at the **Application layer (Layer 7)** and is a **stateless** protocol, meaning each request/response transaction is treated independently, without knowledge of previous requests."},{"q":"Two computers are connected to a Cisco Catalyst Layer 2 switch. PC1 is assigned the address 10.250.20.20/26 and PC2 is assigned the address 10.250.20.50/26. When a user on PC1 issues the ping 10.250.20.63 command, will PC2 respond to it?","o":["No, because 10.250.20.63 is not in the subnet that PC1 belongs to.","No, because 10.250.20.63 is not the IP of PC2.","Yes, the PC2 will respond to the 10.250.20.63 broadcast if both ports are operationally in access mode and the same VLAN.","Yes, if the ip routing command is configured on the switch."],"c":"Yes, the PC2 will respond to the 10.250.20.63 broadcast if both ports are operationally in access mode and the same VLAN.","cat":"IP Addressing IPv4/Ipv6","e":"PC1 is in subnet **$10.250.20.0/26$** (range $10.250.20.1$ to $10.250.20.62$, broadcast $10.250.20.63$). PC2 is in subnet **$10.250.20.0/26$** (since $10.250.20.50$ is in the range). The address **$10.250.20.63$** is the **broadcast address** for this subnet. When PC1 pings the broadcast address, the switch floods the packet, and all hosts in that subnet (including PC2) receive the ICMP request and send an ICMP reply."},{"q":"Which Cisco IOS global configuration command is needed to enable IPv6 routing on routers?","o":["ipv6 unicast-routing","ipv6 routing","enable ipv6-routing","ipv6 address"],"c":"ipv6 unicast-routing","cat":"Network Fundamentals & Tools","e":"'ipv6 unicast-routing' enables IPv6 routing globally on a Cisco router."},{"q":"In an 802.1X implementation, what are the roles of the devices shown? PC on the left side conneted to switch in the middle and server on the right!","o":["A: authenticator, B: supplicant, C: authentication server","A: client device, B: supplicant, C: authentication server","A: supplicant, B: authenticator, C: authentication server","A: supplicant, B: client device, C: authentication server"],"c":"A: supplicant, B: authenticator, C: authentication server","cat":"Security AAA & ACL","e":"In 802.1X (port-based network access control): The PC (A) is the **Supplicant** (the device requesting access). The Switch (B) is the **Authenticator** (the relay point). The Server (C, usually RADIUS) is the **Authentication Server** (which verifies the user/device credentials)."},{"q":"What is the purpose of Web reputation filters?","o":["ensure that only authorized parties can read a message","analyze web server behavior and assign a reputation score to a URL","scan email traffic","monitor and inspect FTP traffic"],"c":"analyze web server behavior and assign a reputation score to a URL","cat":"Security AAA & ACL","e":"Web reputation filters analyze a website's history, content, and behavior to assign a security score, blocking access to sites deemed malicious or risky."},{"q":"Which of the following provides a channel for data to travel from one point to another in the network?","o":["hosts","interconnections","network devices","TCP"],"c":"interconnections","cat":"Network Fundamentals & Tools","e":"Interconnections (cables, wireless links) are the physical or logical media that form the channel for data transmission."},{"q":"For configuring EtherChannel on switch SW3, the administrator is starting the configuration by shutting down a range of interfaces, as shown below. Why is the administrator doing so?\n\nSW3(config)# interface range Ethernet0/2 - 3\nSW3(config-if-range)# shutdown","o":["The interfaces must be shut down when they are bundled into EtherChannel.","The interfaces must be shut down to change their speed and duplex.","The shutdown interfaces do not create activity on the link, so incomplete configuration will not produce undesired results.","The interfaces that are not part of the EtherChannel must be shut down."],"c":"The shutdown interfaces do not create activity on the link, so incomplete configuration will not produce undesired results.","cat":"Switching & VLAN","e":"It is considered a best practice to **shut down** interfaces before configuring them into an EtherChannel. This prevents the links from coming up individually with inconsistent parameters, which could temporarily lead to traffic disruption or Layer 2 loops before the channel is fully formed."},{"q":"Which two of the following protocols does the distribution layer use to provide default gateway redundancy? (Choose two.)","o":["Device Control Protocol (DCP)","Distributed Network Protocol (DNP3)","Dynamic Source Routing Protocol (DSR)","First Hop Redundancy Protocol (FHRP)","Hot Standby Router Protocol (HSRP)"],"c":["First Hop Redundancy Protocol (FHRP)","Hot Standby Router Protocol (HSRP)"],"cat":"Routing & Protocols","e":"FHRP protocols like HSRP provide default gateway redundancy at the distribution layer."},{"q":"Which of the following is a private IP address?","o":["172.32.0.1","10.255.0.1","192.169.1.1","169.254.0.5"],"c":"10.255.0.1","cat":"Network Fundamentals & Tools","e":"De reserverade privata adressintervallen är:\n* **Klass A:** `10.0.0.0/8` (10.0.0.0 till 10.255.255.255)\n* **Klass B:** `172.16.0.0/12` (172.16.0.0 till 172.31.255.255)\n* **Klass C:** `192.168.0.0/16` (192.168.0.0 till 192.168.255.255)\nEndast **10.255.0.1** ligger inom ett privat intervall."},{"q":"Which STP port state forwards traffic and listens for BPDU messages after the learning state?","o":["Forwarding","Blocking","Listening","Disabled"],"c":"Forwarding","cat":"Switching & VLAN","e":"After the learning state, a port enters the forwarding state where it can send and receive data while still processing BPDUs to maintain the spanning-tree topology."},{"q":"What is the role of a default gateway in an IP network?","o":["To provide DNS services for name resolution","To allow devices to communicate with devices on other networks","To physically connect a PC to a switch","To assign IP addresses to hosts on the network"],"c":"To allow devices to communicate with devices on other networks","cat":"IP Addressing IPv4/Ipv6","e":"The default gateway is typically the IP address of a router on the local network. It allows devices in one network to send traffic to other networks by routing the packets. It doesn't provide DNS (that's a DNS server) or assign IPs (that's DHCP)."},{"q":"Refer to the exhibit. Which type of NAT is being configured?\n\nRouter(config)# access-list 1 permit 172.16.1.0 0.0.0.255\nRouter(config)# ip nat pool NAT-POOL 209.165.201.10 209.165.201.14 netmask 255.255.255.224\nRouter(config)# interface Gi 0/1\nRouter(config-if)# ip address 209.165.201.1 255.255.255.224\nRouter(config-if)# ip nat outside\nRouter(config-if)# exit\nRouter(config)# interface Gi 0/0\nRouter(config-if)# ip address 172.16.1.1 255.255.255.0\nRouter(config-if)# ip nat inside\nRouter(config-if)# exit\nRouter(config)# ip nat inside source list 1 pool NAT-POOL overload","o":["static inside NAT","dynamic inside NAT","port forwarding","dynamic outside NAT","inside PAT","outside PAT"],"c":"inside PAT","cat":"WAN & SDN/Virtualization","e":"The key command is `ip nat inside source list 1 pool NAT-POOL overload`. The **overload** keyword signifies **Port Address Translation (PAT)**, where multiple private addresses are mapped to one or a few public addresses using different port numbers. The `inside source` means traffic originating from the inside is being translated."},{"q":"Which layer in the OSI model is responsible for segmentation and reassembly of data?","o":["Layer 2","Layer 3","Layer 4","Layer 5"],"c":"Layer 4","cat":"OSI Model","e":"The **Transport layer (Layer 4)** is responsible for taking data from the Application layer, segmenting it into smaller units, and adding sequence numbers to ensure correct reassembly at the destination."},{"q":"Which IPv6 address type is used to represent a group of interfaces?","o":["Unicast","Multicast","Anycast","Broadcast"],"c":"Multicast","cat":"IP Addressing IPv4/Ipv6","e":"Multicast addresses in IPv6 identify a group o...nterfaces to receive a packet sent to that group."},{"q":"What are the default OSPF hello and dead timer values on point-to-point links?","o":["Hello value is 10 seconds, dead value is 20 seconds.","Hello value is 10 seconds, dead value is 40 seconds.","Hello value is 20 seconds, dead value is 50 seconds.","Hello value is 30 seconds, dead value is 120 seconds."],"c":"Hello value is 10 seconds, dead value is 40 seconds.","cat":"Routing & Protocols","e":"OSPF default hello on broadcast and point-to-point links is 10 seconds and dead interval is 4 times the hello (40s)."},{"q":"You configured an important host in your company with a static default gateway pointing to one of the routers in the network. You have a second router that can provide connectivity to other subnets. What happens when the primary router fails and there is only a dynamic routing protocol configured between the routers?","o":["The host will automatically detect the failure and update its default gateway to the second router's IP.","The second router will use the dynamic routing protocol to instruct the host to change its default gateway.","The host should rely on DHCP to provide the default gateway, so it can be updated dynamically after a failure.","The host will lose connectivity to other subnets because it cannot dynamically update its default gateway."],"c":"The host will lose connectivity to other subnets because it cannot dynamically update its default gateway.","cat":"Routing & Protocols","e":"A static gateway does not change automatically; the host will lose access if the primary router fails. To solve this, a First Hop Redundancy Protocol (FHRP) like HSRP or VRRP should be used."},{"q":"What is the standard interface for trunking in 802.1Q?","o":["GigabitEthernet0/1","FastEthernet0/1","Trunk0/1","no specific standard interface"],"c":"no specific standard interface","cat":"Switching & VLAN","e":"IEEE 802.1Q defines the frame tagging mechanism for VLANs, but it does not specify a particular physical or logical interface type. **Any** port can be configured to use 802.1Q trunking."},{"q":"Which protocol does SNMP use?","o":["TCP 161","UDP 161","TCP 162","UDP 162"],"c":"UDP 161","cat":"TCP/IP/DNS Protocols","e":"SNMP uses **UDP port 161** for communication (Get/Set/GetNext requests) between the manager and the agent. UDP port 162 is used for traps."},{"q":"Which command displays the current OSPF area that a router belongs to?","o":["show ip ospf interface","show ip ospf neighbor","show ip ospf database","show ip ospf"],"c":"show ip ospf interface","cat":"Routing & Protocols","e":"\"show ip ospf interface\" shows interfaces and their associated OSPF areas."},{"q":"Which command shows all VLANs on a Cisco switch?","o":["show vlan brief","show vlan id 1","show interface trunk","show running-config"],"c":"show vlan brief","cat":"Network Fundamentals & Tools","e":"The \"show vlan brief\" command displays an overview of all VLANs and their status on a Cisco switch."},{"q":"How are NETCONF messages encoded?","o":["CSS","JSON","SQL","XML"],"c":"XML","cat":"Network Fundamentals & Tools","e":"**NETCONF (Network Configuration Protocol)** is an XML-based protocol. It uses **XML (Extensible Markup Language)** to encode the configuration data and protocol messages."},{"q":"Which command would you use to verify that a VLAN is active and has ports assigned on a Cisco switch?","o":["show vlan brief","show interfaces status","show running-config","show ip route"],"c":"show vlan brief","cat":"Switching & VLAN","e":"The 'show vlan brief' command lists all VLANs on a switch, their status (active or suspended), and the ports assigned to each VLAN."},{"q":"What is the TTL value in an IP header for?","o":["Encryption","Error checking","Prevent infinite loops","Quality of service"],"c":"Prevent infinite loops","cat":"Network Fundamentals & Tools","e":"Time To Live (TTL) decreases by 1 at each hop, and when it reaches 0, the packet is discarded."},{"q":"Which statement is true about an SD-Access campus fabric underlay network?","o":["Implementation of a Layer 2 foundation to the campus edge is recommended.","In the SD-Access architecture, end-user subnets are part of the underlay network.","The underlay network is defined by Layer 3 devices only.","All network elements must establish IPv4 connectivity via a routing protocol."],"c":"All network elements must establish IPv4 connectivity via a routing protocol.","cat":"WAN & SDN/Virtualization","e":"The SD-Access underlay network uses a Layer 3 approach across the entire fabric, requiring all network devices (fabric edges, control planes) to establish IPv4 connectivity and routing adjacency (e.g., OSPF or IS-IS)."},{"q":"Which BID would win election as the root, assuming that the switches with these BIDs were in the same network?","o":["32768:0200.1111.1111","32768:0200.2222.2222","4096:0200.1111.1111","4096:0200.2222.2222"],"c":"4096:0200.1111.1111","cat":"Switching & VLAN","e":"The Root Bridge election is based on the **lowest BID** (Bridge ID). The BID is composed of **Priority** (the first number) and **MAC address**. The lowest Priority wins (4096 is lower than 32768), and if priorities are tied, the lowest MAC address wins (0200.1111.1111 is lower than 0200.2222.2222)."},{"q":"Which application of an ACL is indicated by the statement \"ACLs can permit or deny user access to FTP or HTTP servers\"?","o":["selection of traffic for prioritization","selection of traffic for analyzing","filtering of traffic to control access to network services","restricting the delivery of routing updates"],"c":"filtering of traffic to control access to network services","cat":"Security AAA & ACL","e":"Access Control Lists (ACLs) are primarily used to filter traffic based on criteria like source/destination IP, port number, or protocol, thereby controlling access to specific network resources and services."},{"q":"Which layer is responsible for routing?","o":["Network","Transport","Session","Data Link"],"c":"Network","cat":"OSI Model","e":"The Network layer handles logical addressing and routing."},{"q":"What is the primary purpose of NAT (Network Address Translation)?","o":["To translate private IP addresses to public IP addresses","To encrypt network traffic","To assign dynamic IP addresses","To create VLANs"],"c":"To translate private IP addresses to public IP addresses","cat":"Network Fundamentals & Tools","e":"NAT allows private IP addresses to be mapped to public IP addresses, enabling devices on a local network to communicate with external networks and conserving public IPv4 address space."},{"q":"Which command would you use to configure a device as an NTP client?","o":["ntp client","ntp server","ntp master","ntp source"],"c":"ntp server","cat":"Network Fundamentals & Tools","e":"On Cisco devices, **`ntp server <ip>`** sets the device to synchronize its time (act as a client) with the specified external NTP server."},{"q":"What are two possible sources of fiber media issues? (Choose two.)","o":["wiring becomes damaged","macrobend losses","new EMI sources are introduced","traffic patterns change","splice losses"],"c":["macrobend losses","splice losses"],"cat":"Network Fundamentals & Tools","e":"Fiber optic cable issues are commonly related to physical light loss (attenuation). Macrobend losses (excessive bending) and splice losses (improper connection of fiber segments) directly reduce light signal strength."},{"q":"Which of the following best describes the difference between a network switch and a network hub?","o":["A switch forwards frames based on MAC address, and a hub broadcasts to all ports","A hub routes traffic, a switch only bridges","A switch increases collision domains, a hub decreases them","A hub operates at Layer 3, a switch operates at Layer 2"],"c":"A switch forwards frames based on MAC address, and a hub broadcasts to all ports","cat":"Switching & VLAN","e":"A switch makes forwarding decisions based on MAC addresses and creates separate collision domains for each port. A hub is a Layer 1 device that broadcasts incoming frames to all ports (causing collisions) in a single collision domain."},{"q":"Which protocol translates IP addresses to MAC addresses?","o":["DNS","DHCP","ARP","ICMP"],"c":"ARP","cat":"TCP/IP/DNS Protocols","e":"**ARP (Address Resolution Protocol)** operates at Layer 2/3 to translate an IPv4 address to its corresponding physical **MAC address** within a local network segment."},{"q":"Which of these is a disadvantage of static routing?","o":["scalability","security","simplicity","conserving router resources"],"c":"scalability","cat":"Routing & Protocols","e":"Static routing becomes difficult and time-consuming to manage in large, complex networks because every change requires manual updates across multiple routers, making it poor for scalability."},{"q":"You plan to implement an iACL on the internet router in your company to protect the infrastructure devices. Which three options should you use when configuring the iACL? (Choose three.)","o":["Deny all noninitial fragments.","Permit all noninitial fragments.","Permit RFC 1918 IPv4 address space.","Implement ingress filtering according to RFC 2827.","Deny the flow of transit traffic to noninfrastructure destinations.","Permit protocols that are used on the devices, such as BGP, SSH, and SNMP, from specific source addresses."],"c":["Deny all noninitial fragments.","Implement ingress filtering according to RFC 2827.","Permit protocols that are used on the devices, such as BGP, SSH, and SNMP, from specific source addresses."],"cat":"Security AAA & ACL","e":"An Infrastructure ACL (iACL) should deny malformed packets (non-initial fragments), implement ingress filtering (anti-spoofing via RFC 2827) to block traffic from the Internet with internal source addresses, and explicitly permit legitimate management traffic to infrastructure devices."},{"q":"Which DHCP message type is used by the client to request an IP address?","o":["DHCPDISCOVER","DHCPOFFER","DHCPREQUEST","DHCPACK"],"c":"DHCPDISCOVER","cat":"TCP/IP/DNS Protocols","e":"DHCPDISCOVER is the first message a client sends to find a DHCP server."},{"q":"What is the expected result of the show running-config | exclude ! command executed on the Cisco IOS device?","o":["CLI will display the negated versions of the commands in the running configuration file.","CLI will display the running configuration file but without any lines containing “!” in them","CLI will display only the lines copied from the external source.","CLI will display only the lines different to the lines in the startup-config file."],"c":"CLI will display the running configuration file but without any lines containing “!” in them","cat":"Network Fundamentals & Tools","e":"The '| exclude !' filter removes lines containing the exclamation mark, which is used in Cisco IOS configuration files as a comment or section separator."},{"q":"What is the function of HSRP?","o":["Provides redundancy for default gateway","Enables routing between VLANs","Balances load between routers","Encrypts network traffic"],"c":"Provides redundancy for default gateway","cat":"Routing & Protocols","e":"**HSRP (Hot Standby Router Protocol)** is a First Hop Redundancy Protocol (FHRP) that provides high availability and **redundancy for the default gateway** by presenting a single virtual IP address to hosts, while two or more routers share the responsibility."},{"q":"Which network automation use case verifies that all networking devices only communicate with each other using secured mechanisms?","o":["pre- and post-validation","continuous compliance","Reporting","configuration management"],"c":"continuous compliance","cat":"Automation & DevOps","e":"**Continuous compliance** ensures that the network configuration and operational status are constantly monitored and verified against a defined secure baseline, flagging any deviations, such as insecure communication methods."},{"q":"What is the default gateway address if you have the network 192.168.2.0/24?","o":["192.168.2.1","192.168.2.255","192.168.2.0","192.168.2.254"],"c":"192.168.2.1","cat":"IP Addressing IPv4/Ipv6","e":"Usually, the first available address (192.168.2.1) is used as the default gateway."},{"q":"When creating and maintaining the MAC address table, which two activities does a switch perform? (Choose two.)","o":["It adds the destination MAC address in the frame and the incoming port number.","It adds the destination MAC address in the frame and the outgoing port number.","It adds the source MAC address in the frame and the incoming port number.","It resets the aging timer of all the entries related to the incoming port.","It resets the aging time of the MAC table entry for the source MAC address."],"c":["It adds the source MAC address in the frame and the incoming port number.","It resets the aging time of the MAC table entry for the source MAC address."],"cat":"Switching & VLAN","e":"A switch learns by examining the **Source MAC Address** and recording it along with the **Incoming Port Number**. Every time a frame is received from a known source MAC, the switch resets the aging timer for that specific entry to keep it active in the table."},{"q":"Which protocol is used to automate the configuration of network devices over a network?","o":["NETCONF","HTTP","FTP","SNMP"],"c":"NETCONF","cat":"Automation & DevOps","e":"NETCONF (Network Configuration Protocol) is a network management protocol that allows automation of network device configuration."},{"q":"Which command on a Cisco router shows routing protocol configuration snippet?","o":["show running-config | section router","show ip protocols","show ip route","show version"],"c":"show running-config | section router","cat":"Network Fundamentals & Tools","e":"This command filters \"show running-config\" to show only the router section (eg OSPF, EIGRP)."},{"q":"Which option is a Layer 2 QoS marking?","o":["CoS","DSCP","EXP","QoS group"],"c":"CoS","cat":"Network Fundamentals & Tools","e":"**CoS** (Class of Service) uses 3 bits in the 802.1Q tag header, making it a Layer 2 marking. **DSCP** is a Layer 3 marking, and **EXP** is an MPLS marking."},{"q":"What do VLANs do to improve network performance?","o":["separate large broadcast domains into smaller broadcast domains","create large broadcast domains out of smaller broadcast domains","create one large virtual switch out of many physical switches","allow users to connect over radio frequency"],"c":"separate large broadcast domains into smaller broadcast domains","cat":"Switching & VLAN","e":"VLANs segmenterar ett enda fysiskt LAN i flera logiska broadcastdomäner. Mindre broadcastdomäner reducerar onödig trafik och förbättrar prestandan."},{"q":"What is the corresponding MAC address for the solicited node multicast address ff02:0000:0000:0000:0000:0001:ff17:fc0f?","o":["33-33-33-17-fc-0f","00-00-33-17-fc-0f","33-33-ff-17-fc-0f","ff-02-ff-17-fc-0f"],"c":"33-33-ff-17-fc-0f","cat":"IP Addressing IPv4/Ipv6","e":"The Solicited-Node Multicast MAC address always starts with '33-33', followed by the last 32 bits (4 octets) of the IPv6 multicast address (ff-17-fc-0f)."},{"q":"An attacker has bypassed physical security and was able to connect a laptop to an Ethernet interface on a switch. If all the switch ports are configured with port security and the violation mode is set to the default, which action is taken against the attacker?","o":["Packets with unknown source addresses are dropped and there is no notification that a security violation has occurred.","Packets with unknown source addresses are dropped and there is a notification that a security violation has occurred.","Packets with unknown source addresses are dropped, there is a notification that a security violation has occurred, and the interface becomes error-disabled.","Packets with unknown source addresses are forwarded and there is a notification to the syslog server."],"c":"Packets with unknown source addresses are dropped, there is a notification that a security violation has occurred, and the interface becomes error-disabled.","cat":"Security AAA & ACL","e":"The default Port Security violation mode is **shutdown**. This mode disables the port (error-disabled state), drops violating traffic, and sends a syslog notification or SNMP trap."},{"q":"Which statements about the layered model of communication are true? (Choose two.)","o":["Layering makes communication itself less complex.","Layer processes on a host logically communicate with the same layer processes on another host.","Layer processes on a host are independent and communicate with any of the other layers.","Layering facilitates troubleshooting by making it possible to diagnose and narrow a cause to specific layers.","Layering of functions is only theoretical and not implemented in real-world."],"c":["Layer processes on a host logically communicate with the same layer processes on another host.","Layering facilitates troubleshooting by making it possible to diagnose and narrow a cause to specific layers."],"cat":"Network Fundamentals & Tools","e":"Layering enables logical **peer-to-peer communication** between corresponding layers on different hosts (e.g., Layer 3 to Layer 3). It also simplifies **troubleshooting** by isolating problems to a single layer."},{"q":"Which three options are UDP benefits when compared to TCP? (Choose three.)","o":["higher performance","lower-overhead data communications between hosts","higher-overhead data communications between hosts","lower-latency data transmission","higher-latency data transmission"],"c":["higher performance","lower-overhead data communications between hosts","lower-latency data transmission"],"cat":"TCP/IP/DNS Protocols","e":"UDP (User Datagram Protocol) is a connectionless protocol that lacks the reliability mechanisms of TCP (e.g., Three-way Handshake, flow control, and acknowledgments). This results in: 1. **Lower-overhead:** Smaller UDP header. 2. **Lower-latency:** No time spent on connection setup or waiting for acknowledgments. 3. **Higher performance:** The combined effect allows applications to achieve higher throughput for data that doesn't require guaranteed delivery."},{"q":"The copper cabling used in your network is too close to electrical interferences. Consequently, the interface statistics show an unusually large number of compromised frames. While you attempt to solve the issue, which frame forwarding method should you implement on the Cisco switches in order to lower the number of compromised frames?","o":["cut-through","express forwarding","process switching","store-and-forward"],"c":"store-and-forward","cat":"Switching & VLAN","e":"Store-and-forward switching receives the entire frame and performs a CRC (Cyclic Redundancy Check). If the frame is corrupted (compromised) due to interference, it is dropped, preventing bad frames from propagating further into the network. Cut-through methods do not perform this check."}],"cisco6":[{"q":"Which protocol uses TCP three-way handwriting to establish a connection?","o":["UDP","TCP","ICMP","ARP"],"c":"TCP","cat":"TCP/IP/DNS Protocols","e":"**TCP (Transmission Control Protocol)** är ett anslutningsorienterat protokoll som använder den **trevägshandskakningen** (SYN, SYN-ACK, ACK) för att tillförlitligt etablera en session innan dataöverföring påbörjas."},{"q":"Which advantage does a switch bring to a LAN environment?","o":["combines segments together","breaks up segments","forces full-duplex on all ports","allows only one-way communication on a segment"],"c":"breaks up segments","cat":"Switching & VLAN","e":"A switch forwards traffic based on the destination MAC address, creating a separate **collision domain** for each port. By isolating traffic in this way, it logically **breaks up a single collision domain** (segment), increasing performance and efficiency compared to a hub."},{"q":"Which protocol is used by the ping utility to test connectivity between network devices?","o":["ICMP","TCP","UDP","DNS"],"c":"ICMP","cat":"IP Addressing IPv4/Ipv6","e":"**Ping** sends **ICMP (Internet Control Message Protocol) Echo Request** messages and waits for Echo Replies to determine if a host is reachable. It does not use TCP or UDP ports."},{"q":"Which command on a Cisco router clears the ARP cache?","o":["clear ip arp","clear arp-cache","clear mac address-table","clear interface arp"],"c":"clear ip arp","cat":"Network Fundamentals & Tools","e":"The \"clear ip arp\" command clears the ARP cache on a Cisco device."},{"q":"Which command shows VLANs and which ports belong to them?","o":["show vlan brief","show vlan id 1","show interfaces trunk","show interfaces status"],"c":"show vlan brief","cat":"Switching & VLAN","e":"\"show vlan brief\" visar en översikt av alla VLAN och de access-portar som är tilldelade dem. För en exakt lista över trunk-portar och de VLAN de bär, används dock kommandot 'show interfaces trunk'."},{"q":"Which layer in the OSI model is responsible for session management?","o":["Layer 4","Layer 5","Layer 6","Layer 7"],"c":"Layer 5","cat":"OSI Model","e":"The **Session layer (Layer 5)** handles the establishment, management, and termination of dialogue between two applications, including synchronization and checkpoints."},{"q":"In Cisco routing implementations, what is the role of the administrative distance?","o":["It identifies how much time has passed since the route was learned.","It identifies how the route was learned.","It identifies the measure used to calculate the best path.","It identifies the trustworthiness of the route source."],"c":"It identifies the trustworthiness of the route source.","cat":"Routing & Protocols","e":"Administrative Distance (AD) is a value (0-255) used to rate the **trustworthiness** of different routing sources (e.g., Static, OSPF, EIGRP). The route with the lowest AD is always preferred when multiple sources provide a path to the same destination."},{"q":"Match the operations used by SNMP agent to their explanation.","o":["set: This operation is used to put information in the MIB from an SNMP manager.","trap: This operation is used by the SNMP agent to send a triggered piece of information to the SNMP manager.","get: This operation is used to retrieve information from the MIB.","inform: This operation is the same as a trap, but it adds an acknowledgment that a trap does not provide."],"c":["set: This operation is used to put information in the MIB from an SNMP manager.","trap: This operation is used by the SNMP agent to send a triggered piece of information to the SNMP manager.","get: This operation is used to retrieve information from the MIB.","inform: This operation is the same as a trap, but it adds an acknowledgment that a trap does not provide."],"cat":"Network Fundamentals & Tools","e":"SNMP operations include get, set, trap, and inform, each with a specific function between managers and agents."},{"q":"Which Cisco IOS command can you use to examine the configuration register?","o":["show running-config","show startup-config","show version","show config-register"],"c":"show version","cat":"Network Fundamentals & Tools","e":"The **`show version`** command displays the configuration register value, which dictates how the device boots (e.g., whether to load the startup-config or ignore it)."},{"q":"Which type of address is automatically assigned to a physical interface when IPv6 is enabled on that interface?","o":["global unicast address","link-local address","loopback address","unique local address"],"c":"link-local address","cat":"IP Addressing IPv4/Ipv6","e":"A **link-local address** (starting with **FE80::**) is automatically generated and assigned to every IPv6-enabled interface. It's used for communication only on the local segment, such as for Neighbor Discovery Protocol (NDP)."},{"q":"Which of the following is the main purpose of the ARP (Address Resolution Protocol)?","o":["To resolve IP addresses to MAC addresses","To resolve MAC addresses to IP addresses","To assign IP addresses to devices dynamically","To encrypt network traffic"],"c":"To resolve IP addresses to MAC addresses","cat":"TCP/IP/DNS Protocols","e":"ARP is a Layer 2 protocol used to dynamically map a known Layer 3 address (IPv4) to an unknown Layer 2 address (MAC address) so that devices can communicate on the local segment."},{"q":"Which cloud service model offers customers the most control over their cloud-hosted services?","o":["Function as a Service (FaaS)","Infrastructure as a Service (IaaS)","Platform as a Service (PaaS)","Software as a Service (SaaS)"],"c":"Infrastructure as a Service (IaaS)","cat":"WAN & SDN/Virtualization","e":"The three main cloud service models represent a spectrum of control and management responsibilities. **Infrastructure as a Service (IaaS)** provides the customer with the most control. In the IaaS model, the provider manages the underlying networking, storage, and virtualization layers, but the customer retains full control over the **operating systems**, middleware, runtime, applications, and data. This is akin to having virtual data center components. **SaaS** offers the least control, while **PaaS** and **FaaS** offer medium control by abstracting away the OS and underlying infrastructure."},{"q":"Which protocol is used to secure web traffic?","o":["HTTP","HTTPS","FTP","SSH"],"c":"HTTPS","cat":"Security AAA & ACL","e":"HTTPS (Hypertext Transfer Protocol Secure) använder SSL/TLS-kryptering för att säkra webbtrafik, vilket säkerställer integritet och dataintegritet mellan klienten och servern."},{"q":"Which two statements about the Dynamic Multipoint Virtual Private Network (DMVPN) are true? (Choose two.)","o":["DMVPN creates hub-to-spoke tunnels.","DMVPN creates spoke-to-spoke tunnels.","DMVPN is used for connection between an enterprise and a provider.","DMVPN is used for connection between enterprises.","DMVPN is used within a branch network."],"c":["DMVPN creates hub-to-spoke tunnels.","DMVPN creates spoke-to-spoke tunnels."],"cat":"WAN & SDN/Virtualization","e":"DMVPN supports both hub-to-spoke and dynamic spoke-to-spoke VPN tunnels within an enterprise network."},{"q":"In a WLAN, a common key can be used for which three things? (Choose three.)","o":["authentication only","authorization only","accounting only","encryption only","authentication and encryption"],"c":["authentication and encryption","authentication only","encryption only"],"cat":"Wireless","e":"A Pre-Shared Key (PSK) is used for authentication and is the basis for key derivation, which enables encryption. Authorization is typically handled by policy, but may be included depending on the context/standard."},{"q":"Which two ports must a firewall allow for CAPWAP operations? (Choose two.)","o":["UDP 5246","UDP 5247","UDP 5426","UDP 5470","UDP 5530"],"c":["UDP 5246","UDP 5247"],"cat":"Wireless","e":"**CAPWAP (Control and Provisioning of Wireless Access Points)** använder **UDP-port 5246** för **kontrollmeddelanden** (hantering av accesspunkten) och **UDP-port 5247** för **datatrafik** (tunneling av användardata)."},{"q":"Which two symptoms are characteristic of a duplex mismatch? (Choose two.)","o":["The full-duplex side of the link will experience increased collision rates.","The half-duplex side of the link will experience increased collision rates.","TCP data transfer will perform better than UDP data transfer.","The connection will not be operational.","The full-duplex side of the link will have a large number of CRC errors."],"c":["The half-duplex side of the link will experience increased collision rates.","The full-duplex side of the link will have a large number of CRC errors."],"cat":"Network Fundamentals & Tools","e":"A duplex mismatch occurs when one side operates half-duplex and the other operates full-duplex. The half-duplex side will detect high collisions, while the full-duplex side receives the resulting corrupted frames, leading to high CRC errors."},{"q":"A client issues a DNS request to its local DNS server. The local DNS server does not have the information required. Which entity will finally send a DNS response to the client?","o":["the authoritative DNS server for the top-level domain","the authoritative top-level domain and subdomain DNS servers","the client's local DNS server","the Internet Service Provider's DNS server"],"c":"the client's local DNS server","cat":"TCP/IP/DNS Protocols","e":"The local DNS server (often called a recursive resolver) handles all recursive lookups to root, TLD, and authoritative servers on behalf of the client. It caches the final answer and is the only entity that sends the final response back to the client."},{"q":"Which two symptoms indicate a duplex mismatch between a client and an Ethernet switch? (Choose two.)","o":["Auto-negotiation will report speed and duplex mismatch errors on the client NIC interface.","Interface statistics for the full-duplex side of the link will show increasing late collision errors.","The full-duplex interface will report increasing numbers of FCS errors or runts on the port.","The full-duplex side of the link will slow as CSMA/CD will force it to wait for incoming packets from the other side of the link.","The half-duplex side of the link will waste bandwidth due to increased packet retransmissions caused by increasing collisions."],"c":["The full-duplex interface will report increasing numbers of FCS errors or runts on the port.","The half-duplex side of the link will waste bandwidth due to increased packet retransmissions caused by increasing collisions."],"cat":"Network Fundamentals & Tools","e":"A duplex mismatch (one side Full, the other Half) causes severe communication problems:\n\n1.  **Full-Duplex Side (Switch):** Since the switch sends and receives simultaneously without running CSMA/CD, when the half-duplex client sends data while the switch is also transmitting, the switch receives fragmented or garbled packets. This results in the switch reporting an increasing number of **FCS Errors** (Frame Check Sequence failures) and **Runts** (frames smaller than 64 bytes).\n2.  **Half-Duplex Side (Client):** The client must run CSMA/CD. When the full-duplex switch sends traffic at any time, it causes collisions on the client side, forcing the client to continuously retransmit packets, leading to poor throughput and wasted bandwidth."},{"q":"You have been assigned a task to configure two routers as part of an HSRP group. Because you have not configured priority on the routers, which statement is correct?","o":["Both routers will be in ACTIVE state.","Both routers will be in STANDBY state.","Both routers will be in LISTEN state.","One router will be in ACTIVE and the other in STANDBY state."],"c":"One router will be in ACTIVE and the other in STANDBY state.","cat":"Routing & Protocols","e":"If HSRP priority is not configured, the router with the **highest IPv4 address** for the HSRP group interface becomes the **Active** router. The other becomes the Standby router. Only one can be Active."},{"q":"You have entered the following commands in global configuration mode:\nRouter(config)# logging host 10.1.1.1\nRouter(config)# logging host 172.16.1.1\nWhich statement regarding the syslog configuration is true?","o":["The server that is specified in the command entered last will be the only one used.","The server that is specified in the command entered first will be the only one used.","The router will forward syslog messages to both syslog servers specified in the commands.","The router will overwrite the first command with the second."],"c":"The router will forward syslog messages to both syslog servers specified in the commands.","cat":"Network Fundamentals & Tools","e":"The 'logging host' command is additive. Each command specifies an additional destination for syslog messages. Therefore, the router will forward messages to all configured syslog servers."},{"q":"To configure NAT, one of the commands the administrator used was ip nat pool NAT-POOL 209.165.201.5 209.165.201.10 netmask 255.255.255.240. Assume that outside routers do not have a default route configured. Which two networks could be present in the routing tables of outside routers so that the two-way reachability exists between inside and outside hosts? (Choose two.)","o":["route to 209.165.201.4/28 network","route to 209.165.201.0/28 network","route to 209.165.201.0/24 network","route to 172.16.1.0/24 network","route to 172.16.0.0/16 network","route to 209.165.201.1/32 network"],"c":["route to 209.165.201.0/28 network","route to 209.165.201.0/24 network"],"cat":"WAN & SDN/Virtualization","e":"The NAT pool uses public addresses 209.165.201.5 to 209.165.201.10 with a /28 mask (255.255.255.240). The 209.165.201.0/28 network encompasses the entire pool. For return traffic, outside routers need a route to this public NAT address space. The 209.165.201.0/24 network is a summary route that also covers the pool. The private address space (172.16.x.x) should not be routed over the Internet."},{"q":"Which command would you use to verify VLAN membership on a Cisco switch port?","o":["show vlan brief","show ip route","show interfaces status","show running-config"],"c":"show vlan brief","cat":"Switching & VLAN","e":"The 'show vlan brief' command displays all VLANs configured on the switch and shows which ports are assigned to each VLAN."},{"q":"What is a concern of the default OSPF metric on Cisco routers?","o":["Links with speeds greater than 10 Gbps will not be supported until the release of OSPFv4.","Links with speeds greater than 1 Gbps are converted to 10 Mbps for the purposes of OSPF cost calculation.","Links with speeds greater than 100 Mbps have a cost of 1.","Links with speeds greater than 1 Gbps require additional memory in the OSPF router or switch to calculate the larger costs."],"c":"Links with speeds greater than 100 Mbps have a cost of 1.","cat":"Routing & Protocols","e":"The default OSPF **reference bandwidth is $100 \text{ Mbps}$**. This means that any link with an actual speed of $100 \text{ Mbps}$ or greater (e.g., $1 \text{ Gbps}$ or $10 \text{ Gbps}$) is assigned a calculated cost of **1** (Cost = $10^8 / \text{Bandwidth}$). This leads to **suboptimal routing** because OSPF cannot distinguish between fast links."},{"q":"What is the first action the router does after it is powered up?","o":["finds and loads IOS","finds and applies the configuration statements","runs POST to test the hardware","displays command line prompt"],"c":"runs POST to test the hardware","cat":"Network Fundamentals & Tools","e":"When a router is powered on, the first step is executing the **POST (Power-On Self-Test)**, which is a diagnostic program to check the hardware components (CPU, memory, interfaces, etc.) before attempting to boot the IOS."},{"q":"Which protocol is used for device discovery and address resolution in IPv6?","o":["ARP","ND (Neighbor Discovery)","ICMPv6","DHCPv6"],"c":"ND (Neighbor Discovery)","cat":"Network Fundamentals & Tools","e":"ND (Neighbor Discovery) is part of ICMPv6 and is used for neighbor discovery and address resolution in IPv6."},{"q":"What are four problems with IPv4 addressing workarounds? (Choose four.)","o":["NAT breaks the end-to-end model of IP.","DHCP breaks the end-to-end model of IP.","NAT inhibits end-to-end network security.","VLSM inhibits end-to-end network security.","Some applications are not NAT-friendly.","Some applications are NAT-friendly.","The merging of private networks is difficult if overlapping IPv4 address ranges are used."],"c":["NAT breaks the end-to-end model of IP.","NAT inhibits end-to-end network security.","Some applications are not NAT-friendly.","The merging of private networks is difficult if overlapping IPv4 address ranges are used."],"cat":"IP Addressing IPv4/Ipv6","e":"NAT (Network Address Translation) is the primary workaround that causes these problems by hiding the source address and breaking the original IP end-to-end principle."},{"q":"Which of the following is a common network automation tool? (Select all that apply.)","o":["Puppet","Ansible","Wireshark","SolarWinds"],"c":["Puppet","Ansible"],"cat":"Network Fundamentals & Tools","e":"**Puppet** and **Ansible** are both widely used, agentless (Ansible) or agent-based (Puppet) configuration management and network automation tools. Wireshark is an analyzer, and SolarWinds is a monitoring platform."},{"q":"On a Cisco switch, which two commands would you use to identify ports that are configured as trunks? (Choose two.)","o":["show interfaces status","show interfaces summary","show interfaces trunk","show ip interface brief","show vlan brief"],"c":["show interfaces status","show interfaces trunk"],"cat":"Network Fundamentals & Tools","e":"The **`show interfaces trunk`** command lists only active trunk ports. The **`show interfaces status`** command provides a concise summary where the 'Mode' column explicitly identifies ports as 'trunk' or 'trnk'."},{"q":"Which command is used to save the configuration?","o":["copy running-config startup-config","write erase","reload","show config"],"c":"copy running-config startup-config","cat":"Network Fundamentals & Tools","e":"This command saves the current active configuration (**running-config** in RAM) to the non-volatile memory (**startup-config** in NVRAM), ensuring the configuration persists after a reboot."},{"q":"What does a POST request in REST API do?","o":["Fetches data","Creates new resource","Updates existing resource","Deletes resource"],"c":"Creates new resource","cat":"Automation & DevOps","e":"HTTP **POST** is used to **create** new resources on the server in RESTful APIs."},{"q":"In which network implementations is the spine-leaf topology most commonly used?","o":["enterprise LAN","enterprise edge","data centers","ISP backbone"],"c":"data centers","cat":"Network Fundamentals & Tools","e":"The spine-leaf architecture is optimized for East-West traffic (server-to-server) with low, predictable latency and high scalability, which are critical requirements for modern, high-density data centers."},{"q":"Which of the following protocols operate at the Application layer of the OSI model? (Choose three.)","o":["HTTP","FTP","TCP","SMTP","IP"],"c":["HTTP","FTP","SMTP"],"cat":"OSI Model","e":"The application layer (Layer 7) contains protocols that interact directly with user applications:\n- **HTTP**, **FTP** and **SMTP** operate at the application layer.\n- **TCP** operates on the Transport Layer (Layer 4).\n- **IP** operates on the Network Layer (Layer 3)."},{"q":"Which subnet mask corresponds to a /24 network?","o":["255.255.255.0","255.255.0.0","255.0.0.0","255.255.255.128"],"c":"255.255.255.0","cat":"IP Addressing IPv4/Ipv6","e":"A $/24$ CIDR notation indicates that $24$ bits are used for the network portion of the address. In binary, this is $24$ ones, which translates to $255.255.255.0$ in dotted-decimal notation."},{"q":"Which three represent common vectors that can inflict data loss and exfiltration of unauthorized transfer of company data? (Choose three.)","o":["monitoring systems","database servers","removable storage devices","fixed storage devices","cloud storage services","email attachments"],"c":["removable storage devices","cloud storage services","email attachments"],"cat":"Security AAA & ACL","e":"Common exfiltration channels are physical media like removable storage (USB sticks), internet channels like cloud services (Dropbox/Google Drive), and common communication methods like email attachments. Monitoring systems and database servers are typically targets or infrastructure, not the exfiltration vector itself."},{"q":"You want to control the severity of the event that determines when a syslog message should be sent. Which command do you use?","o":["logging {hostname | ip address}","logging trap severity","logging severity","logging level severity"],"c":"logging trap severity","cat":"Network Fundamentals & Tools","e":"The **`logging trap <severity>`** command sets the **minimum severity level** for syslog messages that the device will send (trap) to a remote syslog server. Messages with this level or lower (more critical) will be sent."},{"q":"Which three commands would enable you to enter extended ACL statements on a router? (Choose three.)","o":["Router(config-ext-nacl)#10 permit tcp host 192.168.1.1 host 209.165.201.1 eq 22","Router(config-ext-nacl)# deny ip any any host 209.165.201.0 eq 10","Router(config-ext-nacl)# permit icmp any host 200.165.201.1","Router(config-ext-nacl)# deny tcp host 209.165.201.0 host 192.168.1.1 eq 22","Router(config-ext-nacl)# deny tcp any host 201.165.201.0 0.0.0.31 host 192.168.1.1 eq 22","Router(config-ext-nacl)# permit udp host any eq dns"],"c":["Router(config-ext-nacl)#10 permit tcp host 192.168.1.1 host 209.165.201.1 eq 22","Router(config-ext-nacl)# permit icmp any host 200.165.201.1","Router(config-ext-nacl)# deny tcp host 209.165.201.0 host 192.168.1.1 eq 22"],"cat":"Security AAA & ACL","e":"Correct answers are properly formed extended ACL statements: a numbered TCP permit with source and destination hosts and port eq 22, a permit ICMP specifying any to a host, and a UDP permit using eq dns. The other options contain invalid ACL syntax or misuse of keywords (for example using 'eq' with 'ip', incorrect host/network placements, or malformed wildcard mask ordering)."},{"q":"Which two statements about a network that uses subnetworks are true? (Choose two.)","o":["It is more complex to apply network security policies.","Smaller networks are easier to manage.","Overall traffic is increased.","Smaller networks are harder to manage.","Overall traffic is reduced."],"c":["Smaller networks are easier to manage.","Overall traffic is reduced."],"cat":"IP Addressing IPv4/Ipv6","e":"Subnetting creates smaller broadcast domains, which reduces overall broadcast traffic and results in more manageable networks."},{"q":"Which three commands would enable you to enter extended ACL statements on a router? (Choose three.)","o":["Router(config)# access-list 101","Router(config)# access-list 1300","Router(config)# ip access-list extended 1300","Router(config)# ip access-list extended 101","Router(config)# ip access-list extended EXT_ACL"],"c":["Router(config)# access-list 101","Router(config)# ip access-list extended 101","Router(config)# ip access-list extended EXT_ACL"],"cat":"Security AAA & ACL","e":"Extended Access Control Lists (ACLs) filter traffic based on source, destination, protocol, and port number. The modern, recommended syntax uses the 'ip access-list extended' command. \n\n1. **Numbered Extended ACLs:** Use the range **100-199** (e.g., 101) or **1300-1999** (e.g., 1300). Both 'ip access-list extended 1300' and 'ip access-list extended 101' are correct modern commands.\n2. **Named Extended ACLs:** Using a descriptive name (e.g., EXT_ACL) is best practice, activated by 'ip access-list extended EXT_ACL'.\n\nWhile 'access-list 101' is technically a valid *classic* way to define an extended ACL, the three modern, named/numbered commands are the explicit and preferred choices."},{"q":"How many LEDs on each port of a Catalyst switch are used to show the status detail?","o":["Two LEDs are used on each port.","Three LEDs are used on each port.","Ports on the Cisco Catalyst switch do not have LEDs.","Each port on a Catalyst switch has only one LED."],"c":"Two LEDs are used on each port.","cat":"Network Fundamentals & Tools","e":"Typically, each port on a Cisco Catalyst switch uses two LEDs to display status details:\n\n1.  **Status/Link LED (Green/Amber):** This LED indicates the link status (solid green for an active link) and port activity (flashing green when data is being transferred). It also turns amber if the port is blocked by Spanning Tree Protocol (STP).\n2.  **Speed LED (Various Colors):** This LED indicates the connection speed (e.g., green for 1000 Mbps, orange for 100 Mbps, off for 10 Mbps). The specific color codes vary slightly depending on the switch model."},{"q":"Which is standard port for SMTP?","o":["25","110","143","53"],"c":"25","cat":"TCP/IP/DNS Protocols","e":"SMTP (Simple Mail Transfer Protocol) uses port 25 by default."},{"q":"Which three operations can an SNMP manager process perform in a network? (Choose three.)","o":["authenticate users accessing a device","configure a device","construct a management information base (MIB) on a device","retrieve data about the license of the device","retrieve data about the environmental parameters of a device"],"c":["configure a device","retrieve data about the license of the device","retrieve data about the environmental parameters of a device"],"cat":"Network Fundamentals & Tools","e":"En **SNMP Manager** använder **GET** (hämta data), **SET** (ändra/konfigurera) och **TRAPS** (ta emot händelsemeddelanden) för att hantera enheter. Licens- och miljödata (temperatur, fläktar) hämtas via GET-kommandon, och konfiguration kan utföras via SET-kommandon."},{"q":"What is duplex mismatch?","o":["Incorrect VLAN configuration","Switch and device have different duplex settings","IP address conflict","Incorrect subnet mask"],"c":"Switch and device have different duplex settings","cat":"Network Fundamentals & Tools","e":"Duplex mismatch causes collisions and performance issues."},{"q":"Which is the correct subnet mask for a host route?","o":["0.0.0.0","255.254.0.0","255.255.255.254","255.255.255.255"],"c":"255.255.255.255","cat":"IP Addressing IPv4/Ipv6","e":"A host route is a route that points to a specific, single host address. This requires a 32-bit prefix length, represented by the subnet mask 255.255.255.255 (/32), ensuring no host bits are left for a network range."},{"q":"Which type of automation use case is appropriate if you need to shut down an interface when errors are found on that interface?","o":["configuration management","Automated backups","continuous compliance","event-driven network automation","reporting"],"c":"event-driven network automation","cat":"Automation & DevOps","e":"**Event-driven automation** triggers actions based on specific network conditions or events, such as interface errors or state changes reported via SNMP or Syslog."},{"q":"According to the command output, how are packets that are bound for the network 192.168.2.0 forwarded?\n\nRouterX# show ip route\nD 192.168.1.0/24 [90/25789217] via 10.1.1.1\nR 192.168.2.0/24 [120/4] via 10.1.1.2\nO 192.168.3.0/24 [110/229840] via 10.1.1.3","o":["via 10.1.1.2, an IPv4 address on this router (RouterX)","via 10.1.1.2, an IPv4 address on a remote router","via 10.1.1.3 an IPv4 address on a remote router","via 10.1.1.3, an IPv4 address on this router (RouterX)"],"c":"via 10.1.1.2, an IPv4 address on a remote router","cat":"Routing & Protocols","e":"The entry `R 192.168.2.0/24 [120/4] via 10.1.1.2` indicates a route learned via the RIP protocol ('R') and specifies that the **next hop** to reach $192.168.2.0/24$ is the remote router at IP address **$10.1.1.2$**."},{"q":"Which statement about ACLs is true?","o":["An ACL must have at least one permit action, or else it blocks all traffic.","ACLs process statements from bottom up looking for a match.","An ACL has an implicit permit at the end.","ACLs will check the packet against all entries looking for the best match."],"c":"An ACL must have at least one permit action, or else it blocks all traffic.","cat":"Security AAA & ACL","e":"Correct: In Cisco IOS, the ACL must have at least one 'permit'; otherwise all traffic is implicitly denied by the implicit 'deny all' at the end. ACLs are processed top-down and stop at the first match."},{"q":"Which encryption protocol is used to secure communications in a WPA2 wireless network?","o":["WEP","TKIP","AES","SSH"],"c":"AES","cat":"Wireless","e":"**WPA2** (Wi-Fi Protected Access 2) uses **AES (Advanced Encryption Standard)** with CCMP (Counter Mode with Cipher Block Chaining Message Authentication Code Protocol) for encrypting Wi-Fi traffic, providing strong security."},{"q":"Two routers, A and B, are part of the Hot Standby Router Protocol (HSRP) standby group. There was no priority configured, and router A with the highest IP address for this HSRP group. Which statement is correct?","o":["Router A will be in the ACTIVE state and router B will be in the ACTIVE state.","Router A will be in the ACTIVE state and router B will be in the STANDBY state.","Router A will be in the LISTEN state and router B will be in the STANDBY state","Router A will be in the STANDBY state and router B will be in the STANDBY state."],"c":"Router A will be in the ACTIVE state and router B will be in the STANDBY state.","cat":"Routing & Protocols","e":"In HSRP, the router with the highest configured priority becomes the Active router. If the priority is not configured (or tied), the router with the highest interface IP address for the HSRP group will become the Active router. The second highest router becomes Standby."},{"q":"A device has been assigned an IPv6 address through the Stateless Address Autoconfiguration (SLAAC) process. Which three statements about SLAAC are correct? (Choose three.)","o":["It generates link-local addresses.","It generates global unicast IPv6 addresses.","It must be used in combination with a DHCPv6 server.","It relies on ICMPv6 router advertisements.","It requires a device to use the EUI-64 format in the process.","It relies on a DHCPv6 server for duplicate address detection (DAD)."],"c":["It generates link-local addresses.","It generates global unicast IPv6 addresses.","It relies on ICMPv6 router advertisements."],"cat":"IP Addressing IPv4/Ipv6","e":"SLAAC is an autoconfiguration mechanism that automatically configures the IPv6 address of a device.\n\nThe correct answers are It generates link-local addresses, It generates global unicast IPv6 addresses, and It relies on ICMPv6 router advertisements. As defined in RFC 4862, the autoconfiguration process includes generating a link-local address, generating global addresses through SLAAC, and the duplicate address detection procedure to verify the uniqueness of the addresses on a link
