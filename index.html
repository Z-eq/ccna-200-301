 received on.","cat":"Switching & VLAN","e":"When a switch receives a frame with an unknown destination MAC address, it floods the frame out of all ports belonging to the same VLAN, except the port it was received on (ingress port). This process is known as 'Unknown Unicast Flooding' and is necessary to locate the destination device."},{"q":"When a router is calculating the network portion of an IPv4 address, which bitwise operation is performed on the IPv4 address and the subnet mask?","o":["AND","NAND","OR","XOR"],"c":"AND","cat":"IP Addressing IPv4/Ipv6","e":"The bitwise AND operation (where 1 AND 1 = 1, and all others = 0) is performed between the IP address and the subnet mask. This operation effectively isolates the network bits (where the mask is '1') and sets the host bits to zero, yielding the network address."},{"q":"When using a AAA server along with an access switch, which two features benefit from centralized authentication? (Choose two.)","o":["IPsec VPN access","management access","network access","network telemetry authentication","spanning tree authentication"],"c":["management access","network access"],"cat":"Security AAA & ACL","e":"AAA servers primarily handle Network Access (802.1X for users connecting to the network) and Management Access (SSH/Telnet login for administrators to manage the switch). VPN access is typically handled by a gateway/firewall, not an access switch."},{"q":"What command displays the routing protocol used by the router?","o":["show ip protocols","show ip route","show version","show running-config"],"c":"show ip protocols","cat":"Routing & Protocols","e":"The command 'show ip protocols' shows which routing protocols (like RIP, OSPF, EIGRP) are active."},{"q":"Which layer does the core layer interconnect?","o":["access layer switches","access points","distribution layer switches","end point devices"],"c":"distribution layer switches","cat":"Network Fundamentals & Tools","e":"The core layer provides high-speed backbone connectivity and interconnects distribution layer devices."},{"q":"Which command would you use to verify VLAN membership on a Cisco switch port?","o":["show vlan brief","show ip route","show interfaces status","show running-config"],"c":"show vlan brief","cat":"Switching & VLAN","e":"The 'show vlan brief' command displays all VLANs configured on the switch and shows which ports are assigned to each VLAN."},{"q":"Which three security services does the Counter Mode with Cipher Block Chaining Message Authentication Code Protocol (CCMP) provide? (Choose three.)","o":["access control","authentication","authorization","data confidentiality","data redundancy"],"c":["data confidentiality","authentication","access control"],"cat":"Wireless","e":"CCMP (Counter Mode with Cipher Block Chaining Message Authentication Code Protocol) is the encryption protocol used within the WPA2/WPA3 framework. Although CCMP's core function is Data Confidentiality and ensuring Data Integrity (which is missing as an option), when restricted to the list provided, the most relevant services it supports within the 802.11i standard are:\n\n1.  **Data Confidentiality:** Achieved through AES encryption (the 'Counter Mode' part).\n2.  **Authentication:** Achieved implicitly through its Message Integrity Check (MIC/MAC), which verifies the source of the data.\n3.  **Access Control:** CCMP is the technical mechanism that enforces the session security after the initial access control (handled by PSK or 802.1X) has been established."},{"q":"Which two statements regarding the Root Guard are correct? (Choose two.)","o":["Root Guard can be enabled globally","Root Guard can only be enabled per interface","Root Guard can only be used on root and alternate ports","Root Guard can only be used on root ports","Root Guard is deployed on interfaces that connect to switches that should never be the root"],"c":["Root Guard can only be enabled per interface","Root Guard is deployed on interfaces that connect to switches that should never be the root"],"cat":"Switching & VLAN","e":"Root Guard is an STP (Spanning Tree Protocol) feature designed to enforce the hierarchical structure of the network and prevent external switches from becoming the root bridge. \n\n1.  **Deployment:** Root Guard is applied to interfaces (ports) that connect to network segments where the root bridge is *not* expected to be found (e.g., ports leading to access layers or external networks). If a superior BPDU (suggesting a new, better root) is received on a Root Guard-enabled port, the port is transitioned to a special blocking state (Root-Inconsistent state) to prevent the topology change.\n2.  **Configuration:** It can only be configured **per interface** (using the command `spanning-tree guard root`). It is not a global command."},{"q":"What is the benefit of Mobility Express wireless access points (APs)?","o":["multiple SSIDs","multiple VLANs","Quality of Service (QoS)","reduced initial cost"],"c":"reduced initial cost","cat":"Wireless","e":"Cisco Mobility Express is a controller-less solution designed primarily for Small to Midsize Businesses (SMBs). Its main benefit is the **reduced initial cost** because it eliminates the need to purchase a dedicated physical Wireless LAN Controller (WLC). Instead, one of the Access Points (APs) assumes the role of the master controller, managing the other APs in the network. Features like multiple SSIDs, VLANs, and QoS are standard capabilities across most modern Cisco wireless solutions, regardless of whether a separate controller is used."},{"q":"What are the default OSPF hello and dead timer values on point-to-point links?","o":["Hello value is 10 seconds, dead value is 20 seconds.","Hello value is 10 seconds, dead value is 40 seconds.","Hello value is 20 seconds, dead value is 50 seconds.","Hello value is 30 seconds, dead value is 120 seconds."],"c":"Hello value is 10 seconds, dead value is 40 seconds.","cat":"Routing & Protocols","e":"OSPF default hello on broadcast and point-to-point links is 10 seconds and dead interval is 4 times the hello (40s)."},{"q":"Which authentication type in REST-based APIs uses pregenerated keys?","o":["Basic HTTP authentication","API key Authentication","Custom token authentication","Biometric authentication"],"c":"API key Authentication","cat":"Automation & DevOps","e":"API Key Authentication uses a single, long, pregenerated string that the client includes in requests (via headers or query parameters) to identify itself and control access to the API."},{"q":"From a network perspective, how is a server a different endpoint than a user workstation?","o":["A server requires lower latency.","A server requires more bandwidth.","A server requires Power over Ethernet (PoE) connectivity.","A server requires stricter network access control."],"c":"A server requires more bandwidth.","cat":"Network Fundamentals & Tools","e":"The correct answer is A server requires more bandwidth. Since a server is a convergent point on the network that connects multiple devices, it consumes more bandwidth.\n\nLow latency is not a differentiator for a server, since it is also a requirement for IP phones, for instance. Servers cannot be powered through PoE, since their power requirements surpass PoE capabilities. Servers are deployed in secured environments (locked closets or server rooms), where network access control is not a focus, since other security measures are implemented."},{"q":"What alternative to Cisco Meraki Dashboard can you use to manage Cisco Meraki network devices?","o":["Cisco Meraki Dashboard API","RESTCONF","SNMP","Telnet"],"c":"Cisco Meraki Dashboard API","cat":"Automation & DevOps","e":"Cisco Meraki is primarily cloud-managed via the Dashboard web interface. The official, modern alternative for bulk configuration, monitoring, and integration is the Meraki Dashboard API (Application Programming Interface), which is a RESTful interface."},{"q":"Which cloud service model offers customers the most control over their cloud-hosted services?","o":["Function as a Service (FaaS)","Infrastructure as a Service (IaaS)","Platform as a Service (PaaS)","Software as a Service (SaaS)"],"c":"Infrastructure as a Service (IaaS)","cat":"WAN & SDN/Virtualization","e":"The three main cloud service models represent a spectrum of control and management responsibilities. **Infrastructure as a Service (IaaS)** provides the customer with the most control. In the IaaS model, the provider manages the underlying networking, storage, and virtualization layers, but the customer retains full control over the **operating systems**, middleware, runtime, applications, and data. This is akin to having virtual data center components. **SaaS** offers the least control, while **PaaS** and **FaaS** offer medium control by abstracting away the OS and underlying infrastructure."},{"q":"Where does a router that runs OSPFv2, and that has neighbor adjacencies established, store link-state advertisements (LSAs)?","o":["LSDB","Neighbors table","Routing table","SPF tree"],"c":"LSDB","cat":"Routing & Protocols","e":"LSAs (Link-State Advertisements) are stored in the **Link-State Database (LSDB)**. This database contains a full map of the OSPF area. The router then uses Dijkstra's Shortest Path First (SPF) algorithm on the LSDB to calculate the best paths, which are placed in the Routing table."},{"q":"In an 802.1X implementation, what are the roles of the devices shown? PC on the left side conneted to switch in the middle and server on the right!","o":["A: authenticator, B: supplicant, C: authentication server","A: client device, B: supplicant, C: authentication server","A: supplicant, B: authenticator, C: authentication server","A: supplicant, B: client device, C: authentication server"],"c":"A: supplicant, B: authenticator, C: authentication server","cat":"Security AAA & ACL","e":"In 802.1X (port-based network access control): The PC (A) is the **Supplicant** (the device requesting access). The Switch (B) is the **Authenticator** (the relay point). The Server (C, usually RADIUS) is the **Authentication Server** (which verifies the user/device credentials)."},{"q":"Which two parameters can be used for metric calculations? (Choose two.)","o":["IP Address","Hop count","Link Up/Downtime","Bandwidth","Default Route","Local Routes"],"c":["Hop count","Bandwidth"],"cat":"Routing & Protocols","e":"Routing protocols use metrics to determine the best path. Simple protocols like RIP use Hop Count (number of routers). Advanced protocols like OSPF and EIGRP use more complex metrics that include Bandwidth and Delay."},{"q":"Which three fields are included in a TCP header? (Choose three.)","o":["destination address","destination port","flags","frame check sequence","window size"],"c":["destination port","flags","window size"],"cat":"TCP/IP/DNS Protocols","e":"Destination port (Layer 4), Flags (control bits like SYN, ACK), and Window Size (flow control) are key TCP header fields. Destination address is in the IP header (L3), and Frame Check Sequence (FCS) is in the Ethernet trailer (L2)."},{"q":"What is the main purpose of a default route?","o":["To route packets to unknown networks","To limit routing updates","To summarize routes","To create static VLANs"],"c":"To route packets to unknown networks","cat":"Routing & Protocols","e":"A default route provides a path when no specific route to a destination network exists."},{"q":"Which command displays VLANs configured on a switch?","o":["show vlan brief","show interfaces trunk","show running-config","show mac address-table"],"c":"show vlan brief","cat":"Switching & VLAN","e":"The 'show vlan brief' command displays VLAN IDs, names, and associated ports."},{"q":"What is the severity level of the syslog message '%LINK-3-UPDOWN: Interface FastEthernet0/0, changed state to down'?","o":["Error","Log alert","Log audit","Warning"],"c":"Error","cat":"Network Fundamentals & Tools","e":"The number '3' indicates the syslog severity level 'Error'."},{"q":"In a wireless IEEE 802.11 implementation, what is the most secure option to protect user traffic?","o":["WEP","WPA","WPA2","WPA3"],"c":"WPA3","cat":"Wireless","e":"WPA3 (Wi-Fi Protected Access 3) is the current and most secure standard, using stronger encryption and the Simultaneous Authentication of Equals (SAE) handshake to protect against offline dictionary attacks, which WPA2's PSK (Pre-Shared Key) is vulnerable to."},{"q":"Which IPv6 command on a Cisco router can be used to provide the name-to-IP address resolution in case the DNS service in the network fails?","o":["hostname TFTP-SERVER 2001:db8:a:a::69","ipv6 host TFTP-SERVER interface Gi0/0","ipv6 host TFTP-SERVER 2001:db8:a:a::69 2001:db8:a:a::169","ipv6 hostname TFTP-SERVER 2001:db8:a:a::69"],"c":"ipv6 host TFTP-SERVER 2001:db8:a:a::69 2001:db8:a:a::169","cat":"Network Fundamentals & Tools","e":"The `ipv6 host` command is used to manually configure a static name-to-address mapping (similar to a local DNS entry) on a Cisco router. The command can include one or more IPv6 addresses for a given hostname, which the router will use if DNS fails."},{"q":"Which state does a port with PortFast and BPDU guard transition into if BPDU is received on that port?","o":["discarding","errdisable","forwarding","learning"],"c":"errdisable","cat":"Switching & VLAN","e":"The primary function of **BPDU Guard** is to protect the integrity of the Spanning Tree Protocol (STP) root path by shutting down ports that are not expected to receive BPDUs. When a port is configured with **PortFast** (meaning it's expected to connect only to an end device like a PC) and receives a BPDU from an adjacent switch, BPDU Guard immediately transitions the port into the **errdisable** state. In the errdisable state, the port is logically shut down and requires manual intervention (or automated recovery) to become active again."},{"q":"Refer to the exhibit. Which two options are common IPsec or SSL VPN implementations? (Choose two.)","o":["IPsec Tunnel VPN (between Firewall and Router)","SSL VPN (between Firewall and Router)","IPsec VTI VPN (between Client and Server)","DMVPN (between Firewall and Server)","SSL VPN (between Client and Firewall)"],"c":["IPsec Tunnel VPN (between Firewall and Router)","SSL VPN (between Client and Firewall)"],"cat":"WAN & SDN/Virtualization","e":"Correct: IPsec Tunnel VPNs are typically used for site-to-site connections (for example, between a firewall and a router), providing secure communication between networks. SSL VPNs, on the other hand, are most commonly used for remote access connections between a client and a firewall.\n- 'SSL VPN (between Firewall and Router)' is uncommon because SSL VPNs are designed for user-based remote access.\n- 'IPsec VTI VPN (between Client and Server)' is not a standard remote access implementation.\n- 'DMVPN (between Firewall and Server)' is incorrect because DMVPN is used for dynamic multipoint connections between routers, not servers."},{"q":"The console of a device you are administering displays the following syslog message: %LINK-3-UPDOWN: Interface FastEthernet0/0, changed state to down. What is the severity level of the displayed syslog message?","o":["Error","Log alert","Log audit","System daemon","Warning"],"c":"Error","cat":"Network Fundamentals & Tools","e":"Syslog severity levels are numbered 0 to 7. The number '3' in the message (%LINK-3-UPDOWN) corresponds to the 'Error' level. This level indicates an error condition that should be addressed immediately."},{"q":"Which feature of PVST+ is not available in RSTP?","o":["fast convergence on topology changes","per-port STP","per-VLAN STP instance","edge ports"],"c":"per-VLAN STP instance","cat":"Switching & VLAN","e":"RSTP (Rapid Spanning Tree Protocol) is an evolution of STP that provides faster convergence, but it only runs one single instance of STP for the entire bridged network. PVST+ (Per-VLAN Spanning Tree Plus) maintains a separate, independent STP instance for *each* VLAN, allowing for load balancing and more granular control, a feature not available in pure RSTP."},{"q":"What is the default STP priority value?","o":["32768","4096","8192","24576"],"c":"32768","cat":"Switching & VLAN","e":"All switches start with a default STP bridge priority of 32768."},{"q":"Which two attack categories does the smurf attack belong to? (Choose two.)","o":["amplification","brute-force","man-in-the-middle","exfiltration","reflection"],"c":["amplification","reflection"],"cat":"Security AAA & ACL","e":"A Smurf attack uses a spoofed source IP address (the victim's) to send ICMP Echo Requests to a large network. That network then 'reflects' a massive number of ICMP Echo Replies back to the victim's spoofed address, 'amplifying' the attack volume."},{"q":"Which three commands should you use to configure data and voice VLAN on the same interface? (Choose three.)","o":["Switch(config-if)# switchport access vlan 2","Switch(config-if)# switchport data vlan 2","Switch(config-if)# switchport mode access","Switch(config-if)# switchport mode trunk","Switch(config-if)# switchport trunk allowed vlan 2,3","Switch(config-if)# switchport voice vlan 3"],"c":["Switch(config-if)# switchport access vlan 2","Switch(config-if)# switchport mode access","Switch(config-if)# switchport voice vlan 3"],"cat":"Switching & VLAN","e":"To configure a port for both data and voice traffic (a typical setup for IP phones), you must set the port to access mode, define the data VLAN (access vlan), and define the voice VLAN (voice vlan). The 'switchport data vlan' is an equivalent to 'switchport access vlan' in many contexts, but 'access vlan' is the primary command for data traffic."},{"q":"After the Cisco IOS Software image is loaded and started, from which three components can the device load its configuration? (Choose three.)","o":["NVRAM","SCP server","TFTP server","RAM only","DHCP URL"],"c":["NVRAM","SCP server","TFTP server"],"cat":"Network Fundamentals & Tools","e":"Configuration is loaded from NVRAM if startup-config exists; otherwise, it can be retrieved from network sources such as TFTP or SCP. RAM only stores running config after loading. DHCP can provide a URL but is not a primary source."},{"q":"Which three operations can an SNMP manager process perform in a network? (Choose three.)","o":["authenticate users accessing a device","configure a device","construct a management information base (MIB) on a device","retrieve data about the license of the device","retrieve data about the environmental parameters of a device"],"c":["configure a device","retrieve data about the license of the device","retrieve data about the environmental parameters of a device"],"cat":"Network Fundamentals & Tools","e":"An SNMP manager can configure devices and collect information such as license and environmental data. It cannot authenticate users, and the MIB is predefined on the device."},{"q":"Which number represents the default encryption type of the protected password used to restrict access to the privileged EXEC mode?","o":["4","5","8","9"],"c":"4","cat":"Security AAA & ACL","e":"Cisco uses numbers to indicate the encryption type for passwords (like 'enable secret'). Type 4 historically represented SHA-256 protection, but note that current best practices favor Type 8 or 9 (newer SHA-256 and SHA-512) for strong security."},{"q":"Which three statements are correct about the JSON data format? (Choose three.)","o":["Empty values cannot be used in the JSON data format.","JSON arrays separate elements using a semicolon.","JSON can be used when data is sent from a server to a web page.","JSON does not support comments.","JSON is a hierarchical data format."],"c":["JSON can be used when data is sent from a server to a web page.","JSON does not support comments.","JSON is a hierarchical data format."],"cat":"Automation & DevOps","e":"JSON (JavaScript Object Notation) is widely used for data exchange over the web. It has a clear hierarchical structure (objects within objects). It is strictly defined and does not support comments. Array elements must be separated by commas, not semicolons."},{"q":"Which command sets a VLAN as the native VLAN on a trunk port?","o":["switchport trunk native vlan 99","switchport access vlan 99","switchport mode trunk","switchport trunk allowed vlan 99"],"c":"switchport trunk native vlan 99","cat":"Switching & VLAN","e":"This command specifies which VLAN is untagged on a trunk port."},{"q":"Which two statements describe examples of social engineering attacks? (Choose two.)","o":["Cracking a user password using personal data related to the victim.","Defacing a website and explaining the political ideology behind the attack.","Delivering a DoS attack from a server trusted by all company users.","Sending an email from a seemingly legitimate address with writing that adopts typical sender language.","Sending an infected USB with a magazine."],"c":["Sending an email from a seemingly legitimate address with writing that adopts typical sender language.","Sending an infected USB with a magazine."],"cat":"Security AAA & ACL","e":"Social engineering relies on manipulating users to gain access or information. Both sending a highly believable (spear-phishing) email and leaving an infected physical item (like a USB) for a user to find and plug in are classic examples of deceiving human users."},{"q":"Which Rapid PVST+ Spanning Tree Protocol role is used only when switches are connected to a shared segment?","o":["alternate","backup","designated","root"],"c":"backup","cat":"Switching & VLAN","e":"In Rapid PVST+ (which uses RSTP principles), the **Backup port** role is unique because it only exists in multi-access networks (like those using a shared segment, although this is rare in modern Ethernet). A Backup port is a port that connects to the same segment as the **Designated port** on the **same switch**. It provides a redundant connection to that segment. \n\n* If the Designated port fails, the Backup port immediately takes over and transitions to the **Forwarding** state.\n* It is always in the **Discarding** state in the active topology.\n\nThis role is distinct from the **Alternate port**, which provides a redundant path to the root bridge via a *different* switch."},{"q":"What is the purpose of the metric parameter of a route?","o":["It binds a numeric value to the path to a network.","It identifies the next hop IP to reach the destination network.","It identifies the subnet mask of the remote network.","It tells us how many routers the packet must pass through."],"c":"It binds a numeric value to the path to a network.","cat":"Routing & Protocols","e":"Korrekt: **Metric** anger ett numeriskt värde som används för att rangordna flera möjliga vägar till ett nätverk — lägre värde indikerar en mer önskvärd väg.\nFelaktiga alternativ:\n- **Next hop IP** är en separat parameter som anger nästa router på vägen.\n- **Subnet mask** beskriver nätverkets storlek, inte dess prioritet.\n- **Antal routers** kan användas som en del av vissa metriker (t.ex. hop count i RIP), men metrikens syfte är bredare: att representera kostnaden för vägen oavsett mätmetod."},{"q":"How many bits does the subnet mask consist of?","o":["16","24","32","48"],"c":"32","cat":"IP Addressing IPv4/Ipv6","e":"An IPv4 address and its corresponding subnet mask both consist of 32 bits, typically represented in four octets (8 bits each) separated by periods."},{"q":"Which subnet mask corresponds to a /24 network?","o":["255.255.255.0","255.255.0.0","255.0.0.0","255.255.255.128"],"c":"255.255.255.0","cat":"IP Addressing IPv4/Ipv6","e":"A /24 network has 24 bits for the network portion, equal to the subnet mask 255.255.255.0."},{"q":"Which two of the following protocols does the distribution layer use to provide default gateway redundancy? (Choose two.)","o":["Device Control Protocol (DCP)","Distributed Network Protocol (DNP3)","Dynamic Source Routing Protocol (DSR)","First Hop Redundancy Protocol (FHRP)","Hot Standby Router Protocol (HSRP)"],"c":["First Hop Redundancy Protocol (FHRP)","Hot Standby Router Protocol (HSRP)"],"cat":"Routing & Protocols","e":"FHRP protocols like HSRP provide default gateway redundancy at the distribution layer."},{"q":"Which issue is eliminated when using PortFast?","o":["bandwidth throttling","DHCP timeout","duplex mismatch","native VLAN mismatch"],"c":"DHCP timeout","cat":"Switching & VLAN","e":"The primary purpose of configuring **PortFast** on a Cisco switch port is to eliminate the delay associated with the Spanning Tree Protocol (STP) transitioning a port through its listening and learning states. When a host (like a PC or server) connects to a port, it expects immediate network access to acquire an IP address via DHCP. Without PortFast, the delay (up to 50 seconds in classic STP) can cause the host's DHCP request to time out before the port enters the forwarding state, thus failing to acquire an address. PortFast immediately moves the port to the **forwarding** state, solving the **DHCP timeout** issue for end-devices."},{"q":"You are configuring an IPv6 static route using the link-local IPv6 address as the next-hop. Which command has the correct syntax?","o":["ipv6 route 2001:0db8:beef:: 2001:0db8:feed::1","ipv6 route 2001:0db8:beef:: fa1/0 fe80::2","ipv6 route 2001:0db8:beef::/32 2001:0db8:feed::1","ipv6 route 2001:0db8:beef::/32 fa1/0 fe80::2"],"c":"ipv6 route 2001:0db8:beef::/32 fa1/0 fe80::2","cat":"Network Fundamentals & Tools","e":"When using a link-local IPv6 address (which starts with fe80::) as the next hop in a static route, the outgoing interface must be explicitly specified (fa1/0 in this case) because the link-local address is not globally unique."},{"q":"For a router, which of the following is the preferred source of information about a destination network?","o":["an active local interface connected to the network","Enhanced Interior Gateway Routing Protocol (EIGRP)","Open Shortest Path First (OSPF)","the ip route configuration command"],"c":"an active local interface connected to the network","cat":"Routing & Protocols","e":"Routers prefer directly connected interfaces as the most reliable source of reachability information."},{"q":"Which two Microsoft Windows commands will display the DNS server address configured on the host? (Choose two.)","o":["ipconfig","ipconfig /all","net config","netstat -f","nslookup"],"c":["ipconfig /all","nslookup"],"cat":"Network Fundamentals & Tools","e":"The 'ipconfig /all' and 'nslookup' commands show DNS server details. 'ipconfig' alone gives basic info, while 'net config' and 'netstat -f' are unrelated to DNS configuration."},{"q":"Which is the correct subnet mask for a host route?","o":["0.0.0.0","255.254.0.0","255.255.255.254","255.255.255.255"],"c":"255.255.255.255","cat":"IP Addressing IPv4/Ipv6","e":"A host route is a route that points to a specific, single host address. This requires a 32-bit prefix length, represented by the subnet mask 255.255.255.255 (/32), ensuring no host bits are left for a network range."},{"q":"When configuring an IPv4 static route pointing to the next-hop IPv4, which command should you use?","o":["ip route 172.16.1.0 255.255.255.0 172.16.2.1","ip route 172.16.1.0 net-mask 255.255.255.0 next-hop 172.16.2.1","ip route 172.16.1.0/24 172.16.2.1","ip route static 172.16.1.0 net-mask 255.255.255.0 next-hop 172.16.2.1"],"c":"ip route 172.16.1.0 255.255.255.0 172.16.2.1","cat":"Network Fundamentals & Tools","e":"The standard Cisco IOS command syntax for configuring a static route specifying the next-hop IP address is `ip route [destination-network] [subnet-mask] [next-hop-ip]`."},{"q":"What is the function of HSRP?","o":["Provides redundancy for default gateway","Enables routing between VLANs","Balances load between routers","Encrypts network traffic"],"c":"Provides redundancy for default gateway","cat":"Routing & Protocols","e":"HSRP (Hot Standby Router Protocol) provides gateway redundancy by using a virtual IP address shared by routers."},{"q":"A client issues a DNS request to its local DNS server. The local DNS server does not have the information required. Which entity will finally send a DNS response to the client?","o":["the authoritative DNS server for the top-level domain","the authoritative top-level domain and subdomain DNS servers","the client's local DNS server","the Internet Service Provider's DNS server"],"c":"the client's local DNS server","cat":"TCP/IP/DNS Protocols","e":"The local DNS server (often called a recursive resolver) handles all recursive lookups to root, TLD, and authoritative servers on behalf of the client. It caches the final answer and is the only entity that sends the final response back to the client."},{"q":"In which network implementations is the spine-leaf topology most commonly used?","o":["enterprise LAN","enterprise edge","data centers","ISP backbone"],"c":"data centers","cat":"Network Fundamentals & Tools","e":"The spine-leaf architecture is optimized for East-West traffic (server-to-server) with low, predictable latency and high scalability, which are critical requirements for modern, high-density data centers."},{"q":"What does the 'spanning-tree vlan 10 priority 24576' command do?","o":["Changes STP priority for VLAN 10","Sets VLAN 10 as root","Disables STP for VLAN 10","Assigns VLAN 10 to port-channel 10"],"c":"Changes STP priority for VLAN 10","cat":"Switching & VLAN","e":"This command changes the STP bridge priority for VLAN 10 to influence root bridge election."},{"q":"In an enterprise environment, which guideline should be implemented to manage passwords securely, and why?","o":["A centralized password repository should be avoided, because it is a single point of failure.","A local password repository should be used, because it is more secure, and there is no need to transmit passwords using a AAA protocol.","Access to passwords should be logged along with the user information, in order to have visibility of password usage.","Passwords should NOT be used, because digital certificates are more secure and scale better."],"c":"Access to passwords should be logged along with the user information, in order to have visibility of password usage.","cat":"Security AAA & ACL","e":"In large enterprise environments, strong security practices emphasize **accountability** and **auditing** (the 'Accounting' part of the AAA framework). \n\nLogging and monitoring **access to sensitive passwords** (often managed via a Privileged Access Management or PAM solution) is essential. This log, which includes the user, the time, and the resource accessed, provides crucial **visibility** for security teams, ensures non-repudiation, helps maintain compliance, and is vital data for any forensic analysis following an incident. While a centralized repository presents a single point of failure risk, that risk is typically mitigated through redundancy and is preferred over decentralized management for consistency."},{"q":"Which multicast address is used by OSPF 'DROTHER' routers to send updates to the Designated Router (DR) and Backup Designated Router (BDR)?","o":["224.0.0.5","224.0.0.6","224.0.0.9","224.0.0.10"],"c":"224.0.0.6","cat":"Routing & Protocols","e":"**224.0.0.6** is the multicast address for **AllDRouters**. Non-DR routers (DROTHERs) use this to send Link State Updates to the DR/BDR. The DR then relays this info to others using 224.0.0.5."},{"q":"A router has no manually configured OSPF Router ID. It has Loopback 0 (1.1.1.1), Loopback 1 (2.2.2.2), and FastEthernet 0/0 (192.168.1.1). What is the Router ID?","o":["1.1.1.1","2.2.2.2","192.168.1.1","The highest MAC address"],"c":"2.2.2.2","cat":"Routing & Protocols","e":"The OSPF Router ID selection follows this order: 1. Manual config, 2. **Highest IP on an active Loopback**, 3. Highest IP on an active physical interface."},{"q":"Which fields does the 802.1Q header add to an Ethernet frame?","o":["CRC","EtherType","preamble","VLAN ID"],"c":["VLAN ID","EtherType"],"cat":"Switching & VLAN","e":"The 802.1Q standard inserts a 4-byte Tag into the Ethernet frame. While the Tag contains two main functional fields (TPID/EtherType and VLAN ID), the **VLAN ID** (a 12-bit sub-field) is the unique identifier that specifically enables the separation and forwarding of traffic based on VLAN membership. It is the core functional component that the 802.1Q process adds to the frame to implement network segmentation."},{"q":"What are the two main WLAN deployment types? (Choose two.)","o":["centralized","router-based","standalone","Wi-Fi Direct","Zero Touch Provisioning (ZTP)"],"c":["centralized","standalone"],"cat":"Wireless","e":"The correct answers are centralized and standalone. When an AP is configured as centralized, all the traffic goes through the Cisco Wireless LAN Controller (WLC), which is not the case with standalone APs. The basic premise of a Wi-Fi Direct deployment is the creation of peer-to-peer Wi-Fi connections between devices, without the need for an AP. It is another example of a wireless personal area network (WPAN). ZTP is a process of automatically configuring network equipment."},{"q":"You are tasked with installing and configuring a new PoE-supported IP camera with a power consumption of 20 W. After connecting it to a PoE-enabled switch, the camera does not turn on. What is the likely cause of the problem?","o":["The cable connecting the switch and the camera is too long.","The camera requires additional configuration to work with PoE.","The switch does not support the PoE Plus standard.","The switch requires additional configuration to enable PoE on the interface."],"c":"The switch does not support the PoE Plus standard.","cat":"Switching & VLAN","e":"Standard PoE (802.3af) delivers up to 15.4W. PoE+ (802.3at) delivers up to 30W. A camera requiring 20W exceeds the 15.4W limit of standard PoE. Therefore, the switch must support PoE Plus (802.3at) for the camera to power on."},{"q":"A device running a Windows OS has the IP address 169.254.254.254. Which of the following statements is true?","o":["The address is automatically configured by the device itself.","The device is reachable via the internet.","The IP address is used to communicate with the default gateway.","The IP address is a loopback address."],"c":"The address is automatically configured by the device itself.","cat":"IP Addressing IPv4/Ipv6","e":"The 169.254.x.x range is for Automatic Private IP Addressing (APIPA). A Windows device self-assigns this address when it is set to use DHCP but fails to find a DHCP server on the network."},{"q":"You are asked to design a small LAN. You decide to follow the three-tier architecture model, and your goal is to build a secure network. Which statement is true?","o":["Security features should be implemented only in the distribution layer devices.","Security features should be implemented only in the core layer devices.","Security features should be implemented in the distribution and core layer devices.","Security features should be implemented in all three layers, access, distribution and core.","Security features should be implemented only in the access layer devices.","Security features should be implemented in the access and distribution layer devices."],"c":"Security features should be implemented in the access and distribution layer devices.","cat":"Network Fundamentals & Tools","e":"In many practical three-tier network designs, particularly in smaller LANs, the **Access** and **Distribution** layers are the primary points for implementing security policies. The Access layer provides device-level security (e.g., 802.1X, Port Security), while the Distribution layer acts as the aggregation point and policy enforcement boundary (e.g., ACLs, inter-VLAN filtering). The Core layer is typically reserved for high-speed switching with minimal or no policy processing."},{"q":"When is an architecture design called a collapsed core architecture?","o":["When the core and the distribution layer are merged into one layer.","When the core layer fails to provide fault tolerance.","When the backbone and the access layer are merged into one layer.","When the distribution and access layer are merged into the core layer."],"c":"When the core and the distribution layer are merged into one layer.","cat":"Network Fundamentals & Tools","e":"A **collapsed core architecture** is a two-tier network design common in smaller to mid-sized campus networks. It is created by **merging the Core and Distribution layers** of the traditional three-tier hierarchical model into a single layer. This approach simplifies the topology, reduces equipment costs, and lowers latency while retaining the key functions of both layers, such as high-speed switching (Core) and policy enforcement/routing aggregation (Distribution). The **Access layer** remains separate."},{"q":"Which command displays IP addresses and status for all interfaces on a Cisco router?","o":["show ip route","show ip interface brief","show interfaces status","show ip arp"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"The 'show ip interface brief' command gives a quick summary of all interfaces, their IP addresses and status."},{"q":"You have restarted a router, which has the default booting procedure. During the reboot, the following messages appear on the console: %Error opening tftp://255.255.255.255/network-confg (Timed out) %Error opening tftp://255.255.255.255/cisconet.cfg (Timed out). What can you conclude based on the messages?","o":["The configuration file is not found on the TFTP server","The router successfully loaded the configuration","The IOS image is corrupted","The interface is administratively down"],"c":"The configuration file is not found on the TFTP server","cat":"Network Fundamentals & Tools","e":"If startup-config is missing, the router searches for a network source. TFTP is attempted but not found, hence the error messages."},{"q":"Which two types of cables can be used to connect to the console port of a Cisco router? (Choose two.)","o":["Crossover","Rollover","Serial","Straight-through","USB"],"c":["Rollover","USB"],"cat":"Network Fundamentals & Tools","e":"Rollover and USB cables are used for console connections. Rollover is the traditional console cable, while modern devices also support USB console ports."},{"q":"Which type of address is automatically assigned to a physical interface when IPv6 is enabled on that interface?","o":["global unicast address","link-local address","loopback address","unique local address"],"c":"link-local address","cat":"IP Addressing IPv4/Ipv6","e":"A link-local address (starting with FE80::) is automatically generated and assigned to every IPv6-enabled interface, even without configuration. It's used for communication only on the local segment (link), such as for Neighbor Discovery Protocol (NDP)."},{"q":"Which three characteristics apply to the 802.1Q protocol? (Choose three.)","o":["It carries untagged frames.","It modifies the 802.3 frame header.","It includes an 8-bit field for TTL (Time to Live).","It is a messaging protocol that carries a VLAN configuration.","It uses an internal tagging mechanism."],"c":["It carries untagged frames.","It modifies the 802.3 frame header.","It uses an internal tagging mechanism."],"cat":"Switching & VLAN","e":"802.1Q (VLAN tagging) inserts a 4-byte tag into the standard Ethernet frame (modifies the header). It uses a tagging mechanism to identify the VLAN. It can also carry untagged frames (the native VLAN)."},{"q":"What does a VLAN do?","o":["Increases bandwidth","Creates logical broadcast domains","Reduces cabling","Uses DHCP"],"c":"Creates logical broadcast domains","cat":"Switching & VLAN","e":"VLANs (Virtual Local Area Networks) segment a single physical switch or network into multiple, smaller, isolated **logical broadcast domains** . Devices within the same VLAN can communicate directly, but broadcast traffic is contained within that specific VLAN, reducing network congestion and increasing security. This provides the functionality of multiple separate networks without needing additional physical hardware."},{"q":"Presume that there are multiple paths to a given destination network. Which of the following does a dynamic routing protocol use to determine which route to the destination network is best?","o":["administrative distance","metrics","parameters","variables"],"c":"metrics","cat":"Routing & Protocols","e":"A dynamic routing protocol uses a **metric** to calculate the most efficient or 'best' path to a given destination when multiple routes are available **within that same routing protocol**. The metric is a quantifiable value representing the cost of a route. Different protocols use different metrics:\n\n* **OSPF** uses **Cost** (based on bandwidth).\n* **EIGRP** uses a complex calculation involving **Bandwidth** and **Delay**.\n* **RIP** uses **Hop Count**.\n\nThe route with the lowest metric is considered the best path and is installed in the routing table. **Administrative Distance** is only used when comparing routes learned from *different* routing sources."},{"q":"Refer to the exhibit. Which menu item should you select to configure a pre-shared key for a wireless network?","o":["Commands","Security","Wireless","WLANs"],"c":"WLANs","cat":"Wireless","e":"In a Cisco Wireless Controller (WLC) interface, the Pre-Shared Key (PSK) is a security setting appliced to an individual Wireless LAN (WLAN), which corresponds to the SSID. Therefore, you must navigate to the 'WLANs' menu to access and configure this setting for a specific network."},{"q":"Which command sets a router interface IP address?","o":["ip address 192.168.1.1 255.255.255.0","interface vlan 10","ip route 0.0.0.0 0.0.0.0","switchport access vlan 10"],"c":"ip address 192.168.1.1 255.255.255.0","cat":"Routing & Protocols","e":"The 'ip address' command is used under an interface to assign an IP address and mask."},{"q":"How are NETCONF messages encoded?","o":["CSS","JSON","SQL","XML"],"c":"XML","cat":"Network Fundamentals & Tools","e":"NETCONF uses XML encoding to exchange configuration data between devices and management systems."},{"q":"Which layer of the OSI model provides reliable delivery using acknowledgments?","o":["Transport","Session","Network","Data Link"],"c":"Transport","cat":"OSI Model","e":"The Transport layer ensures reliable data delivery through mechanisms such as TCP acknowledgments."},{"q":"The copper cabling used in your network is too close to electrical interferences. Consequently, the interface statistics show an unusually large number of compromised frames. While you attempt to solve the issue, which frame forwarding method should you implement on the Cisco switches in order to lower the number of compromised frames?","o":["cut-through","express forwarding","process switching","store-and-forward"],"c":"store-and-forward","cat":"Switching & VLAN","e":"Store-and-forward switching receives the entire frame and performs a CRC (Cyclic Redundancy Check). If the frame is corrupted (compromised) due to interference, it is dropped, preventing bad frames from propagating further into the network. Cut-through methods do not perform this check."},{"q":"What are two characteristics of a pre-shared key wireless implementation? (Choose two.)","o":["Access control is centralized.","An authentication server is required.","Encryption uses an optional Advanced Encryption Standard (AES).","Encryption uses the Temporal Key Integrity Protocol (TKIP).","The authentication key is rotated automatically."],"c":["Encryption uses an optional Advanced Encryption Standard (AES).","Encryption uses the Temporal Key Integrity Protocol (TKIP)."],"cat":"Wireless","e":"PSK (Pre-Shared Key) mode, also known as WPA/WPA2 Personal, uses a static passphrase for authentication. The two valid encryption mechanisms associated with this mode are:\n\n1.  **AES (Advanced Encryption Standard):** This is the modern and highly secure cipher used by WPA2 and WPA3. Its use is often preferred.\n2.  **TKIP (Temporal Key Integrity Protocol):** This is the older, less secure cipher associated with the original WPA (WPA1) but is commonly supported in WPA2 implementations for backward compatibility.\n\nPSK does not use centralized access control and does not require an external authentication server (like RADIUS)."},{"q":"Which three statements describe characteristics of solicited-node IPv6 addresses? (Choose three.)","o":["There can be only one per device.","They are automatically created by the device.","They are created using the device's MAC address.","They are multicast addresses.","They are valid within an organization.","They have a recognizable prefix."],"c":["They are automatically created by the device.","They are multicast addresses.","They have a recognizable prefix."],"cat":"IP Addressing IPv4/Ipv6","e":"Solicited-node IPv6 addresses are automatically created multicast addresses with the prefix ff02::1:ff00::/104."},{"q":"Refer to the exhibit. It represents the Cisco Enterprise Architecture model. In this model, where is the firewall located?","o":["between the edge router and the core switch","between the edge router and the distribution switch","between the internet and the core switch","between the internet and the edge router"],"c":"between the internet and the edge router","cat":"Security AAA & ACL","e":"The correct answer is between the internet and the edge router. Putting the edge router between the internet and the firewall exposes the router to attacks. The connection sequence should be: internet, firewall, edge router, switch."},{"q":"When an enterprise has to comply with strict data security regulations, which cloud deployment model should they use for their services?","o":["community","hybrid","private","public"],"c":"private","cat":"WAN & SDN/Virtualization","e":"A Private Cloud offers the highest level of isolation, control, and governance because the infrastructure is dedicated solely to one organization. This makes it the ideal choice for meeting strict regulatory and data security compliance requirements."},{"q":"What is the name typically used to describe virtualization software?","o":["container","distributed resource scheduler (DRS)","hypervisor","HyperFlex","snapshot manager"],"c":"hypervisor","cat":"Network Fundamentals & Tools","e":"A hypervisor is the specific software or firmware that creates and runs virtual machines (VMs). It allows multiple operating systems to share a single physical hardware platform."},{"q":"For which network entity is the OSPF designated router/backup designated router (DR/BDR) selection performed?","o":["for each multi-access segment","for each OSPF router ID","for the entire OSPF area","per transmission state of the link"],"c":"for each multi-access segment","cat":"Routing & Protocols","e":"OSPF (Open Shortest Path First) uses the Designated Router (DR) and Backup Designated Router (BDR) mechanism to reduce the number of adjacencies that must be formed, which lowers the amount of OSPF traffic (LSAs). This election is performed **independently on every multi-access network segment** (like an Ethernet LAN). The DR/BDR mechanism is only needed on segments where multiple routers could potentially form full adjacencies (broadcast or non-broadcast multi-access). Point-to-point links, for example, do not require a DR/BDR."},{"q":"Where in the network should you implement QoS packet classification?","o":["at the input interface of a device at the LAN access edge of the network","at the input interface of a device at the WAN edge of the network","at the output interface of a device at the LAN access edge of the network","at the output interface of a device at the WAN edge of the network"],"c":"at the input interface of a device at the LAN access edge of the network","cat":"Network Fundamentals & Tools","e":"Packet classification should occur as close to the source as possible, typically on LAN access edge input interfaces."},{"q":"Which command would you use to configure a router ID on a Cisco router?","o":["R1(config-router)# ip router-id ip-address","R1(config-router)# router-id ip-address","R1(config)# ip router-id ip-address","R1(config)# router-id ip-address"],"c":"R1(config-router)# ip router-id ip-address","cat":"Routing & Protocols","e":"The command used to manually configure the **Router ID** for a routing process (such as OSPF or EIGRP) on a Cisco router is `router-id ip-address`. This command is executed within the specific **router configuration mode** (e.g., `config-router`) for the routing protocol being configured. Manually configuring the Router ID ensures predictability and stability in the routing domain."},{"q":"Which algorithm is used to calculate the optimal path to a given destination from data stored in a link-state database (LSDB)?","o":["Rivest, Shamir, and Adleman (RSA)","Secure Hash Algorithm (SHA)","Shortest Path First (SPF)","Quicksort"],"c":"Shortest Path First (SPF)","cat":"Routing & Protocols","e":"Link-state routing protocols like OSPF use Dijkstra's algorithm, commonly referred to as the **Shortest Path First (SPF)** algorithm, to analyze the LSDB and compute the shortest, loop-free path to every network destination."},{"q":"Which type of cable is typically used to connect a core switch with a data center switch, where bandwidth higher than 40 Gbps and low cost are required?","o":["Category 5e UTP","Category 6 UTP","multimode fiber","single-mode fiber"],"c":"multimode fiber","cat":"Network Fundamentals & Tools","e":"Single-mode fiber is used for high-bandwidth, long-distance connections such as core-to-data center links."},{"q":"Which term refers to the strategic use of AI and machine learning (ML) throughout IT operations to simplify and streamline processes and optimize the use of IT resources?","o":["SecOps","ChatOps","NetOps","AIOps"],"c":"AIOps","cat":"AI & Machine Learning","e":"**AIOps** (Artificial Intelligence for IT Operations) combines big data and machine learning to automate IT operations processes, including event correlation, anomaly detection, and causality determination. "},{"q":"Which group of devices in a network receive IPv6 packets with the destination address of ff05::2?","o":["all IPv6 nodes on all the network segments within a site","all IPv6 nodes on the local network segments","all IPv6 routers on all the network segments within a site","all IPv6 routers on the local network segments","all OSPFv3 routers on all the network segments within a site","all OSPFv3 routers on the local network segments"],"c":"all IPv6 routers on all the network segments within a site","cat":"IP Addressing IPv4/IPv6","e":"In the IPv6 multicast address **ff05::2**: \n* **ff** signifies it is a multicast address. \n* **05** defines the scope as **site-local**. \n* **::2** is the well-known multicast group for **all routers**. \nTherefore, it reaches all routers within the entire site. "},{"q":"Which three layers does the hierarchical three-tier model include? (Choose three.)","o":["access","core","data link","distribution","network"],"c":["access","core","distribution"],"cat":"Network Fundamentals & Tools","e":"The Cisco hierarchical design model consists of three layers: \n1. **Core**: High-speed switching backbone. \n2. **Distribution**: Policy-based connectivity and boundary control. \n3. **Access**: Local and remote user access to the network. "},{"q":"What is the default aging timer value on Cisco switches?","o":["180 seconds","240 seconds","300 seconds","360 seconds"],"c":"300 seconds","cat":"Switching & VLAN","e":"By default, Cisco switches keep an entry in the MAC address table for **300 seconds** (5 minutes) before it is removed if no frames are received from that source address during that period."},{"q":"How can a RADIUS server enhance management security in wireless environments?","o":["By enforcing access control list (ACL) configurations.","By preventing brute-force login attempts.","By providing a stronger encryption.","By providing individualized login to specific network devices."],"c":"By providing individualized login to specific network devices.","cat":"Security AAA & ACL","e":"A **RADIUS** server centralizes **AAA (Authentication, Authorization, and Accounting)**. It enhances security by allowing administrators to assign **unique, individualized credentials** to users and devices rather than using shared passwords, and tracks their activity through accounting logs."},{"q":"How many switch ports are designated ports on a root bridge?","o":["all of them","none of them","one","two"],"c":"all of them","cat":"Switching & VLAN","e":"In Spanning Tree Protocol (STP), the **Root Bridge** is the focal point of the network. Because it has the lowest Bridge ID, all of its active ports are placed in a forwarding state and assigned the role of **Designated Ports**. "}],"cisco1":[{"q":"What is an SSID in the context of wireless networking?","o":["The encryption key used in a Wi-Fi network","The broadcast channel of a Wi-Fi network","The name of the wireless network","A security protocol for wireless networks"],"c":"The name of the wireless network","cat":"Wireless","e":"The **SSID (Service Set Identifier)** is the unique, case-sensitive, human-readable identifier (name) of a Wi-Fi network, which is broadcast by the Access Point to allow clients to connect."},{"q":"When is an architecture design called a \"collapsed core architecture\"?","o":["When the core and the distribution layer are merged into one layer.","When the core layer fails to provide fault tolerance.","When the backbone and the access layer are merged into one layer.","When the distribution and access layer are merged into the core layer."],"c":"When the core and the distribution layer are merged into one layer.","cat":"Network Fundamentals & Tools","e":"A **collapsed core architecture** is a two-tier network design common in smaller to mid-sized campus networks. It is created by **merging the Core and Distribution layers** of the traditional three-tier hierarchical model into a single layer. This approach simplifies the topology, reduces equipment costs, and lowers latency while retaining the key functions of both layers, such as high-speed switching (Core) and policy enforcement/routing aggregation (Distribution). The **Access layer** remains separate."},{"q":"In Cisco routing implementations, what is the role of the administrative distance?","o":["It identifies how much time has passed since the route was learned.","It identifies how the route was learned.","It identifies the measure used to calculate the best path.","It identifies the trustworthiness of the route source."],"c":"It identifies the trustworthiness of the route source.","cat":"Routing & Protocols","e":"Administrative Distance (AD) is a value used by a Cisco router to determine the preferred path to a destination when the router learns the same route from two or more different routing sources (e.g., OSPF, EIGRP, Static Route). A lower AD value indicates a more trustworthy or believable source. The AD is locally significant to the router."},{"q":"Which Rapid PVST+ Spanning Tree Protocol role is used only when switches are connected to a shared segment?","o":["alternate","backup","designated","root"],"c":"backup","cat":"Switching & VLAN","e":"In Rapid PVST+ (which uses RSTP principles), the **Backup port** role is unique because it only exists in multi-access networks (like those using a shared segment, although this is rare in modern Ethernet). A Backup port is a port that connects to the same segment as the **Designated port** on the **same switch**. It provides a redundant connection to that segment. \n\n* If the Designated port fails, the Backup port immediately takes over and transitions to the **Forwarding** state.\n* It is always in the **Discarding** state in the active topology.\n\nThis role is distinct from the **Alternate port**, which provides a redundant path to the root bridge via a *different* switch."},{"q":"Which state does a port with PortFast and BPDU guard transition into if BPDU is received on that port?","o":["discarding","errdisable","forwarding","learning"],"c":"errdisable","cat":"Switching & VLAN","e":"The primary function of **BPDU Guard** is to protect the integrity of the Spanning Tree Protocol (STP) root path by shutting down ports that are not expected to receive BPDUs. When a port is configured with **PortFast** (meaning it's expected to connect only to an end device like a PC) and receives a BPDU from an adjacent switch, BPDU Guard immediately transitions the port into the **errdisable** state. In the errdisable state, the port is logically shut down and requires manual intervention (or automated recovery) to become active again."},{"q":"What is the purpose of the blocking state of ports in STP (Spanning Tree Protocol)?","o":["To prevent MITM (man-in-the-middle) attacks.","To prevent retransmission of routing protocol updates.","To prevent path loops.","To prevent unauthorized usage of unused ports."],"c":"To prevent path loops.","cat":"Switching & VLAN","e":"The primary function of the Spanning Tree Protocol (STP) is to prevent Layer 2 switching loops (path loops) that occur when redundant paths exist in a network. STP achieves this by placing certain redundant ports into a **blocking state**. Ports in the blocking state listen to BPDUs but do not forward any data traffic, effectively breaking the loop while maintaining path redundancy."},{"q":"What does the Python library Paramiko do?","o":["Web scraping","SSH client/server implementation","Data analysis","Device simulation"],"c":"SSH client/server implementation","cat":"Automation & DevOps","e":"Paramiko is a well-known Python library that implements the SSHv2 protocol, allowing for secure remote connections, command execution, and file transfer via SCP and SFTP."},{"q":"Which protocol is used to synchronize clocks in the network?","o":["NTP","SNMP","SMTP","DHCP"],"c":"NTP","cat":"TCP/IP/DNS Protocols","e":"NTP (Network Time Protocol) is used to synchronize time across networks."},{"q":"After receiving an Ethernet frame, a switch examines the destination MAC address, and forwards the frame out of all ports except the incoming port. In which communication types can this behavior occur?","o":["in broadcast and multicast communication","in broadcast communication","in broadcast, multicast, and unicast communication","in unicast communication"],"c":"in broadcast and multicast communication","cat":"Switching & VLAN","e":"This behavior is called flooding. A switch floods frames when the destination address is a broadcast (FF:FF:FF:FF:FF:FF), a multicast, or a unicast address that is not present in its MAC address table (unknown unicast)."},{"q":"How do link-state protocols limit the scope of a route changes?","o":["by supporting classless addressing","by sending the mask along with the address","by sending only updates of a topology change","by segmenting the network in areas"],"c":"by sending only updates of a topology change","cat":"Routing & Protocols","e":"Link-state protocols (like OSPF) send an **update (LSA) only when a topological change occurs**, not the entire routing table. Segmenting the network into areas (OSPF) also limits the scope of flooding, but the principle of sending only change updates is fundamental."},{"q":"Which STP version allows per-VLAN instances?","o":["PVST+","MSTP","RSTP","STP"],"c":"PVST+","cat":"Switching & VLAN","e":"**PVST+ (Per-VLAN Spanning Tree Plus)** creates a separate spanning tree instance for **each VLAN**, allowing for different root bridges and topologies per VLAN. MSTP also allows per-VLAN grouping but PVST+ is the per-VLAN solution."},{"q":"What is required for two switches to form an EtherChannel?","o":["Same VLAN configuration","Same duplex and speed","Same channel protocol (LACP/PAgP)","All alternatives are true"],"c":"All alternatives are true","cat":"Network Fundamentals & Tools","e":"EtherChannel requires compatible settings on both switches."},{"q":"What do you call a manually configured route with a subnet mask 255.255.255.255?","o":["host route","dynamic route","floating static route","default route"],"c":"host route","cat":"Routing & Protocols","e":"A host route uses a subnet mask of 255.255.255.255 (or /32 in CIDR) to match and route traffic for only a single specific IP address."},{"q":"A network administrator is writing a standard IPv4 ACL that will deny traffic from the 172.16.0.0/16 network and permit all other traffic. Which two commands should be used? (Choose two.)","o":["Router(config)# access-list 95 deny any","Router(config)# access-list 95 deny 172.16.0.0 0.0.255.255","Router(config)# access-list 95 deny 172.16.0.0 255.255.0.0","Router(config)# access-list 95 permit any","Router(config)# access-list 95 deny host 172.16.0.0","Router(config)# access-list 95 deny 172.16.0.0 255.255.255.255"],"c":["Router(config)# access-list 95 deny 172.16.0.0 0.0.255.255","Router(config)# access-list 95 permit any"],"cat":"Security AAA & ACL","e":"Standard ACLs (numbered 1-99 and 1300-1999) filter traffic based only on the **source IP address**. The task requires denying the entire 172.16.0.0/16 network and permitting everything else.\n\n1.  **Deny Statement:** The network 172.16.0.0/16 translates to the IP address **172.16.0.0** and the wildcard mask **0.0.255.255** (the inverse of the subnet mask 255.255.0.0). Thus, the deny command is `access-list 95 deny 172.16.0.0 0.0.255.255`.\n2.  **Permit Statement:** Every ACL has an implicit `deny any` at the end. To permit all other traffic, an explicit `permit any` statement must be placed at the end of the ACL. Thus, the permit command is `access-list 95 permit any`."},{"q":"Which three fields are included in a TCP header? (Choose three.)","o":["destination address","destination port","flags","frame check sequence","window size"],"c":["destination port","flags","window size"],"cat":"TCP/IP/DNS Protocols","e":"Destination port (Layer 4), Flags (control bits like SYN, ACK), and Window Size (flow control) are key TCP header fields. Destination address is in the IP header (L3), and Frame Check Sequence (FCS) is in the Ethernet trailer (L2)."},{"q":"Which tool is commonly used to automate the management of network configurations across multiple devices?","o":["Ansible","Wireshark","Git","Nmap"],"c":"Ansible","cat":"Automation & DevOps","e":"Ansible is an open-source tool for automating the configuration management of network devices."},{"q":"What type of attack is countered with port security?","o":["DDoS","MAC address spoofing","Phishing","SQL injection"],"c":"MAC address spoofing","cat":"Security AAA & ACL","e":"Port security limits which MAC addresses are allowed to connect to a switch port."},{"q":"Which layer in the OSI model is responsible for logical addressing?","o":["Lager 2","Lager 3","Lager 4","Lager 5"],"c":"Lager 3","cat":"OSI Model","e":"Lager 3 (**Nätverkslagret**) ansvarar för **logisk adressering** (IP-adresser) och kommunikation mellan nätverk."},{"q":"What is the basic principle of SDN in a network?","o":["It separates the control plane from the data plane.","It combines the control plane with the data plane on the same device.","It provides NFV.","It separates the management plane from the control plane."],"c":"It separates the control plane from the data plane.","cat":"Network Fundamentals & Tools","e":"Software-Defined Networking (SDN) is based on the concept of decoupling the control plane (network intelligence and decision-making) from the data plane (physical forwarding of packets)."},{"q":"What are three examples of remote access locations? (Choose three.)","o":["branch offices","head office","small office/home office","main office","a network in an airport lounge"],"c":["branch offices","small office/home office","a network in an airport lounge"],"cat":"Network Fundamentals & Tools","e":"Remote access allows users to connect from locations outside the corporate network, such as home, coffee shops, or airport lounges, using secure connections like VPN."},{"q":"You have set up a small office/home office (SOHO) to work from home. You are using broadband internet with a remote-access Virtual Private Network (VPN) to connect to your company resources. Which statement correctly describes this deployment mode?","o":["A VPN-capable router is required for the SOHO network.","You can use the web browser to establish a VPN tunnel.","A permanent VPN connection is required.","VPN tunneling is performed by the internet service provider (ISP)."],"c":"You can use the web browser to establish a VPN tunnel.","cat":"WAN & SDN/Virtualization","e":"Remote-access VPNs (often SSL/TLS based) allow an individual user to connect securely from anywhere using a client or a web browser, making dedicated VPN routers or permanent connections unnecessary at the home office end."},{"q":"What is the function of the ARP protocol in an IP network?","o":["To resolve IP addresses to MAC addresses","To assign IP addresses to hosts","To route packets to the internet","To translate domain names to IP addresses"],"c":"To resolve IP addresses to MAC addresses","cat":"IP Addressing IPv4/Ipv6","e":"ARP (Address Resolution Protocol) is used to find the MAC (layer 2) address corresponding to a known IP (layer 3) address on a local network. It does not assign IPs (that's DHCP) or resolve hostnames (that's DNS)."},{"q":"Which two options are examples of a DDoS attack? (Choose two.)","o":["email trying to entice users to access multiple malicious websites","attempts to crack username and password from different hosts","large amounts of traffic sent to a website from different hosts","large number of emails sent to an email service from a single host","large number of TCP connections to an email service from different hosts"],"c":["large amounts of traffic sent to a website from different hosts","large number of TCP connections to an email service from different hosts"],"cat":"Security AAA & ACL","e":"A **Distributed Denial of Service (DDoS)** attack involves overwhelming a target resource with excessive traffic or connection attempts originating from many different, distributed source hosts, making the attack much harder to mitigate than a single DoS attack."},{"q":"Which command displays the OSPF routing table on a Cisco router?","o":["show ip route ospf","show running-config | section router ospf","show ip ospf neighbor","show ip protocols"],"c":"show ip route ospf","cat":"Routing & Protocols","e":"`show ip route ospf` filtrerar hela routerns routingtabell (`show ip route`) för att endast visa de rutter som har länkats in av OSPF-protokollet."},{"q":"Which protocol is used to translate IP addresses to MAC addresses?","o":["DNS","DHCP","ARP","ICMP"],"c":"ARP","cat":"Network Fundamentals & Tools","e":"ARP (Address Resolution Protocol) translates an IP address to the corresponding MAC address."},{"q":"Which layer in the OSI model is responsible for logical addressing and routing?","o":["Data Link Layer","Network Layer","Transport Layer","Session Layer"],"c":"Network Layer","cat":"Network Fundamentals & Tools","e":"The Network Layer (Layer 3) handles logical addressing (IP addressing) and routing of data packets."},{"q":"What is the Cisco best practice recommendation for port speed and duplex settings when using Fast Ethernet IEEE 802.3u-compliant devices?","o":["disable auto-negotiation on both sides of the link and manually configure full-duplex on both sides of the link","disable auto-negotiation on both sides of the link and manually configure half-duplex on both sides of the link","enable auto-negotiation on both sides of the link","manually configure one side of the link with duplex and speed and enable auto-negotiation on the other side of the link"],"c":"enable auto-negotiation on both sides of the link","cat":"Network Fundamentals & Tools","e":"Auto-negotiation is the standard best practice for modern networks, including Fast Ethernet, to ensure both sides of the link correctly agree on the highest common speed and duplex setting, thus preventing mismatch issues."},{"q":"Which wireless solution is used for branch and remote office deployments and eliminates the need for a WLC on each location?","o":["AP in FlexConnect mode","AP in Local mode","standalone AP","WLC in FlexConnect mode"],"c":"AP in FlexConnect mode","cat":"Wireless","e":"AP in FlexConnect mode allows an Access Point in a branch office to locally switch client data traffic when its connection to the central Wireless LAN Controller (WLC) is lost, eliminating the need for a WLC at the remote site."},{"q":"Which statement correctly describes NAT?","o":["NAT is only performed for outbound traffic—traffic leaving an enterprise network to the internet.","NAT is performed between differently addressed enterprise network segments, when network segments use private addressing.","NAT is performed for outbound and inbound traffic.","NAT is only performed in home networks. Enterprise networks have dedicated public IPv4 addresses."],"c":"NAT is performed for outbound and inbound traffic.","cat":"WAN & SDN/Virtualization","e":"NAT (Network Address Translation) must be performed for both outbound traffic (when leaving the private network) and for the corresponding inbound return traffic (to translate the public address back to the private address)."},{"q":"The console port on a Cisco device may look like which option?","o":["RJ-11 port","RJ-45 port","serial DB-9 port","RPS connector port"],"c":"RJ-45 port","cat":"Network Fundamentals & Tools","e":"Cisco console ports typically use an RJ-45 connector (8-pin modular connector)."},{"q":"Which command encrypts plaintext passwords on routers?","o":["password encryption","service password-encryption","service encryption","enable secret"],"c":"service password-encryption","cat":"Network Fundamentals & Tools","e":"Kommandot `service password-encryption` applicerar en svag, reversibel kryptering (Typ 7) på alla lösenord i klartext som lagras i konfigurationsfilen (`show running-config`). För stark kryptering bör kommandot `enable secret` användas."},{"q":"What are two PortFast characteristics? (Choose two.)","o":["configured on access ports connected to user device","configured on trunk ports connected to another switch","immediate transition to forwarding state","if BPDU is received, it disables the port","never used in a combination with BPDU guard"],"c":["configured on access ports connected to user device","immediate transition to forwarding state"],"cat":"Switching & VLAN","e":"**PortFast** is designed for **access ports** connected to end hosts (like PCs). It causes the port to bypass the listening and learning states, transitioning almost **immediately to the forwarding state** to speed up host connection time."},{"q":"Which command displays the number of L2 links on a Cisco switch?","o":["show interface status","show interfaces trunk","show mac address-table","show spanning-tree"],"c":"show interfaces trunk","cat":"Switching & VLAN","e":"\"show interfaces trunk\" shows trunked L2 links and their state."},{"q":"What does it mean if an automation tool is an agent-based solution?","o":["The tool requires a master server.","The tool requires a software agent to be installed on every machine that is to be automated.","The tool installs a pseudo stub-agent only during job execution.","The tool requires that a software agent is installed on a master server."],"c":"The tool requires a software agent to be installed on every machine that is to be automated.","cat":"Automation & DevOps","e":"Agent-based automation solutions require a persistent software program (the agent) to be installed and run on every managed device. This agent communicates with the central management server."},{"q":"Which of the following IPv4 addresses is reserved for loopback testing?","o":["127.0.0.1","0.0.0.0","192.168.0.1","224.0.0.1"],"c":"127.0.0.1","cat":"Network Fundamentals & Tools","e":"127.0.0.1 is the loopback address pointing back to the local machine."},{"q":"Which device in a split MAC architecture is responsible for 802.11 association and reassociation?","o":["autonomous AP","lightweight AP","Cisco WLC","switch"],"c":"Cisco WLC","cat":"Wireless","e":"In a Split MAC architecture (used by Cisco's Lightweight Access Points), the MAC sublayer is divided. The **WLC (Wireless LAN Controller)** is responsible for the **management-plane** functions, which include handling all **802.11 association, reassociation, and authentication (802.1X) logic**.\n\nThe **lightweight AP** only handles time-sensitive, **data-plane** functions like frame acknowledgment, retransmission, and sending beacons."},{"q":"Which of the following activation methods is used by RIP?","o":["Triggered","Periodic","Event-Based","Manual"],"c":"Periodic","cat":"Routing & Protocols","e":"RIP (Routing Information Protocol) is a distance-vector protocol that sends its entire routing table to its neighbors on a **periodic** timer, typically every 30 seconds, even if no changes have occurred."},{"q":"Assume that you are traveling and are connected to a public wireless network. Your company uses multiple tunneling policies for a VPN session. To ensure that your internet traffic and traffic when accessing internal resources remains confidential, which policy must you use?","o":["SSL-tunneling","split-tunneling","TLS-tunneling","full-tunneling"],"c":"full-tunneling","cat":"Security AAA & ACL","e":"Full-tunneling routes ALL user traffic (both internet and corporate) through the VPN tunnel to the corporate network. This ensures all traffic is encrypted and inspected by corporate security policies, maintaining confidentiality on public Wi-Fi."},{"q":"Which layer of the OSI model is responsible for encryption and data conversion?","o":["Application","Session","Presentation","Network"],"c":"Presentation","cat":"OSI Model","e":"The Presentation layer (Layer 6) handles data representation, encryption, and compression."},{"q":"Which STP enhancement mechanism should be enabled on a network switch port to prevent it from unexpectedly becoming the root port due to a misconfiguration from a connected device?","o":["BPDU Filter","Loop Guard","Root Guard","Port Security"],"c":"Root Guard","cat":"Switching & VLAN","e":"Root Guard prevents a port from accepting superior BPDUs, thus preventing the connected device from becoming the Root Bridge or causing the local switch to unexpectedly change its Root Port."},{"q":"Which statement about SSL and TLS is true?","o":["TLS is the predecessor of SSL.","Symmetric algorithms are used for authentication and key exchange.","Asymmetric algorithms are used for bulk encryption.","SSL and TLS rely on PKI and digital certificates for authentication."],"c":"SSL and TLS rely on PKI and digital certificates for authentication.","cat":"Security AAA & ACL","e":"Both SSL and TLS use Public Key Infrastructure (PKI) and **digital certificates** to authenticate the parties and verify the authenticity of the certificate during the secure handshake process. **TLS** is the **successor** to SSL, not the predecessor."},{"q":"Which of the following is a primary function of a firewall?","o":["To filter and monitor incoming and outgoing network traffic","To assign IP addresses dynamically","To resolve domain names to IP addresses","To establish secure connections between different networks"],"c":"To filter and monitor incoming and outgoing network traffic","cat":"Security AAA & ACL","e":"A firewall is used to filter and monitor network traffic based on predefined security rules."},{"q":"Which type of ACL is processed first on a Cisco device?","o":["Extended ACL","Standard ACL","Reflexive ACL","Dynamic ACL"],"c":"Extended ACL","cat":"Security AAA & ACL","e":"Vid tillämpning av ACL:er på en Cisco-enhet bör **Extended ACL:er** placeras så nära källan som möjligt (för att filtrera trafik innan den förbrukar resurser), medan Standard ACL:er placeras nära destinationen. Detta för att maximera effektiviteten."},{"q":"Which QoS mechanism will drop the traffic if the flow uses more than the allotted bandwidth?","o":["marking","policing","shaping","congestion management"],"c":"policing","cat":"Network Fundamentals & Tools","e":"**Policing** is a QoS mechanism that strictly enforces traffic rates. If a traffic flow exceeds its configured bandwidth limit (the committed information rate, CIR), the excess packets are immediately **dropped** (or sometimes remarked). In contrast, **Shaping** buffers the excess traffic for later transmission, rather than dropping it. "},{"q":"What is one way that QoS achieves a better and more predictable network service?","o":["By building a separate infrastructure for business critical applications.","By providing tools for managing network congestion.","By virtualizing data center infrastructure.","By upgrading links on access layer."],"c":"By providing tools for managing network congestion.","cat":"Network Fundamentals & Tools","e":"**Quality of Service (QoS)** är en samling tekniker och verktyg som syftar till att **hantera nätverkstockning (congestion)**. Genom att klassificera, märka, köa och shapa trafik, kan QoS garantera att kritisk trafik (som röst eller video) får prioritet framför icke-kritisk trafik, vilket leder till en mer förutsägbar nätverkstjänst även under hög belastning. "},{"q":"Which two options are site-to-site VPN options? (Choose two.)","o":["Frame Relay","DSL","DMVPN","ATM","IPsec"],"c":["DMVPN","IPsec"],"cat":"WAN & SDN/Virtualization","e":"**IPsec (Internet Protocol Security)** is a widely used protocol suite for securing VPN tunnels. **DMVPN (Dynamic Multipoint VPN)** is a scalable architecture built upon IPsec that is designed specifically for dynamic site-to-site connections."},{"q":"Which switch characteristic can accommodate network designs that feature fewer users per segment?","o":["high port density","large frame buffers","port speed","fast internal switching","low per-port cost"],"c":"high port density","cat":"Switching & VLAN","e":""},{"q":"Which type of NAT translates multiple private IP addresses to a single public IP address using different ports?","o":["PAT","Static NAT","Dynamic NAT","NAT64"],"c":"PAT","cat":"TCP/IP/DNS Protocols","e":"Port Address Translation (PAT), a form of NAT overload, allows many internal hosts to share a single public IP address by mapping each connection to a unique port number."},{"q":"A network engineer is investigating a network issue and decides that performing a packet capture on the switch is the best way to start. Using the Cisco WebUI, which menu option should they choose to access the Packet Capture functionality?","o":["Monitoring","Configuration","Administration","Troubleshooting"],"c":"Troubleshooting","cat":"Network Fundamentals & Tools","e":"Packet capture is an essential diagnostic tool used to identify and resolve network faults. Therefore, it is typically located under the **Troubleshooting** or **Diagnostics** menu in a device's WebUI."},{"q":"Which option indicates errors, such as collisions, in received frames?","o":["input queue drops","output queue drops","input errors","output errors"],"c":"input errors","cat":"Network Fundamentals & Tools","e":"**`input errors`** (or receive errors) is a counter that increments when an interface receives frames that are corrupted (e.g., CRC errors), too large, too small, or result from collisions on a shared segment."},{"q":"You have connected your PC through a console cable to a new Cisco switch and you plan to use HyperTerminal to perform the initial configuration. Which HyperTerminal configuration setting should you use for the connection to the Cisco switch?","o":["Speed: 9600 bps, data bits: 8, parity: Even, stop bit: 1, and flow control: Hardware","Speed: 9600 bps, data bits: 8, parity: None, stop bit: 1, and flow control: None","Speed: 115200 bps, data bits: 8, parity: None, stop bit: 1, and flow
