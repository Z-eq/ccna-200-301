 control: Hardware","Speed: 115200 bps, data bits: 8, parity: None, stop bit: 1, and flow control: None"],"c":"Speed: 9600 bps, data bits: 8, parity: None, stop bit: 1, and flow control: None","cat":"Network Fundamentals & Tools","e":"These are the standard console settings (9600 baud, 8 data bits, No parity, 1 stop bit, No flow control) used for initial access to Cisco devices."},{"q":"Which VLAN ID is reserved for system use and cannot be assigned to a user VLAN?","o":["0","1","4095","100"],"c":"0","cat":"Switching & VLAN","e":"VLAN ID 0 och 4095 är reserverade för systemanvändning (VLAN 0 för ramtaggning, VLAN 4095 för att kassera ramar) och kan inte tilldelas användardata. VLAN 1 är standard management VLAN."},{"q":"What are the two advantages of Terraform? (Choose two.)","o":["allows users to use cloud-based apps over the Internet","can manage infrastructure on multiple cloud platforms","removes the need for organizations to maintain applications on their own computers","uses procedural language to describe the desired end-state for your infrastructure","uses a configuration language, designed to be easy for humans to read and write"],"c":["can manage infrastructure on multiple cloud platforms","uses a configuration language, designed to be easy for humans to read and write"],"cat":"Automation & DevOps","e":"Terraform is a multi-cloud Infrastructure as Code (IaC) tool. It uses HCL (HashiCorp Configuration Language), which is declarative and human-readable, to manage resources across various providers."},{"q":"What is the range for IPv6 link-local addresses?","o":["fe80::/10","fc00::/7","fc00::/8","fd00::/8"],"c":"fe80::/10","cat":"IP Addressing IPv4/Ipv6","e":"IPv6 link-local addresses är automatisk konfigurerade på alla gränssnitt och definieras av prefixet **fe80::/10**. De används endast för kommunikation inom det lokala nätverkssegmentet."},{"q":"Which command on a Cisco router shows the running configuration?","o":["show running-config","show startup-config","show config","show system"],"c":"show running-config","cat":"Network Fundamentals & Tools","e":"\"show running-config\" shows the current configuration running in memory (RAM)."},{"q":"A NAT-enabled router is configured to perform inside PAT. The IPv4 packet arrives at the outside interface of the router, as a response to the client in the inside network. Provided that inside PAT is correctly configured, which fields in the received IPv4 packets must match to which NAT mapping element, for the packet to be forwarded to the inside host?","o":["Destination IPv4 address and destination port number must match outside global address and port in the mapping table.","Source IPv4 address and source port number must match inside global address and port number in the mapping table.","Source IPv4 address and source port number must match inside local address and port number in the mapping table.","Destination IPv4 address and destination port number must match inside global address and port in the mapping table."],"c":"Destination IPv4 address and destination port number must match outside global address and port in the mapping table.","cat":"WAN & SDN/Virtualization","e":"When a packet returns from the outside, the router uses the **destination** IP address and **destination** port number in the packet header. These must match the **Outside Global** (the public address and port used for the outbound session) entry in the NAT table to be correctly translated and forwarded to the Inside Local host."},{"q":"Which protocol is used to dynamically assign IP addresses to hosts?","o":["DNS","DHCP","ICMP","FTP"],"c":"DHCP","cat":"Network Fundamentals & Tools","e":"DHCP (Dynamic Host Configuration Protocol) assigns IP addresses and network configuration automatically."},{"q":"Which command on a Cisco router shows the IP routing table?","o":["show ip route","show ip arp","show interfaces status","show version"],"c":"show ip route","cat":"Network Fundamentals & Tools","e":"The 'show ip route' command displays the IP routing table, which contains all learned and directly connected routes used by the router for forwarding Layer 3 packets."},{"q":"Which two attack categories does the smurf attack belong to? (Choose two.)","o":["amplification","brute-force","man-in-the-middle","exfiltration","reflection"],"c":["amplification","reflection"],"cat":"Security AAA & ACL","e":"A **Smurf attack** is a DDoS technique that uses a spoofed source IP (the victim's) to send ICMP requests to a large network. The hosts on that network then send a massive number of ICMP replies back to the victim, resulting in a **reflection** of traffic and an overall **amplification** of the attack volume."},{"q":"What is the default VLAN on Cisco switches?","o":["VLAN 0","VLAN 1","VLAN 100","VLAN 999"],"c":"VLAN 1","cat":"Network Fundamentals & Tools","e":"All ports are assigned to VLAN 1 by default on Cisco switches."},{"q":"Which command on a Cisco router shows BGP neighbor status?","o":["show ip bgp summary","show ip bgp neighbors","show ip route bgp","show ip protocols"],"c":"show ip bgp summary","cat":"Network Fundamentals & Tools","e":"**`show ip bgp summary`** provides a concise summary of all BGP neighbors, their state, and the number of prefixes exchanged."},{"q":"Which layer of the OSI model handles IP addresses?","o":["Transport","Network","Applikation","Data Link"],"c":"Network","cat":"OSI Model","e":"The network layer (Layer 3) is responsible for logical addressing, including IP addressing and routing."},{"q":"Which Cisco SD-WAN component facilitates fabric discovery and implements control plane policies?","o":["vBond","vManage","vSmart","WAN Edge"],"c":"vSmart","cat":"WAN & SDN/Virtualization","e":"The **vSmart** controller is the central component of the Cisco SD-WAN control plane. It establishes secure connections with all WAN Edge routers, facilitates the exchange of routing information via OMP (Overlay Management Protocol), and is responsible for distributing and enforcing **control plane policies** across the entire overlay fabric."},{"q":"What are the three basic purposes of a ping test? (Choose three.)","o":["test reachability","test RTT","test packet loss","test MTU on the path","test hops in the path","test operation system running on each hop"],"c":["test reachability","test RTT","test packet loss"],"cat":"Network Fundamentals & Tools","e":"The basic purposes of the **ping** utility (which uses ICMP Echo Request/Reply) are to determine: **Reachability** (if the host is alive), **Packet Loss** (how many packets failed), and **RTT (Round Trip Time)** (the latency)."},{"q":"What is a security risk with Telnet?","o":["Low speed","Lacks encryption","Limited compatibility","No authentication"],"c":"Lacks encryption","cat":"Security AAA & ACL","e":"Telnet sends all traffic in clear text, including passwords."},{"q":"Which network characteristic describes how well the network would support business critical applications in case of an unexpected increase of traffic?","o":["speed","security","QoS","reliability"],"c":"QoS","cat":"Network Fundamentals & Tools","e":"**QoS (Quality of Service)** mechanisms ensure that critical applications receive preferential treatment, priority, and sufficient bandwidth even during periods of network congestion or traffic spikes."},{"q":"Which of these examples configures a default static route?","o":["ip route 0.0.0.0 0.0.0.0 172.16.2.2","ip route 0.0.0.0/0 172.16.2.2","ip route 0.0.0.0 255.255.255.255 172.16.2.2","default route 0.0.0.0 0.0.0.0 172.16.2.2"],"c":"ip route 0.0.0.0 0.0.0.0 172.16.2.2","cat":"Network Fundamentals & Tools","e":"In Cisco IOS, the correct command to configure a default static route uses the destination network of 0.0.0.0 and the subnet mask of 0.0.0.0 (which means 'match all networks')."},{"q":"In which situation would you choose to use UDP instead of TCP for IP applications?","o":["when ensuring accurate file transfers even in the face of network issues","when ensuring packet headers are not changed during transmission from source to destination","when speed of delivery is more important than error correction in IP packet transmissions","when you require that the recipient of the packets verify that the packets are delivered"],"c":"when speed of delivery is more important than error correction in IP packet transmissions","cat":"TCP/IP/DNS Protocols","e":"UDP is connectionless and does not perform error checking or flow control, which makes it faster but unreliable. It is preferred for applications like streaming video, VoIP, and DNS where speed (low latency) is critical and retransmitting lost packets is counterproductive."},{"q":"Which TCP/IP stack layer provides logical addressing?","o":["Link","Transport","Application","Internet"],"c":"Internet","cat":"TCP/IP/DNS Protocols","e":"The Internet Layer (corresponding to OSI Layer 3) provides logical addressing via IP addresses."},{"q":"Which two data structures do the link-state routing protocols use? (Choose two.)","o":["LSU database","neighbors database","link-state interfaces database","topology database","next-hop database"],"c":["neighbors database","topology database"],"cat":"Routing & Protocols","e":"Link-state protocols like OSPF use two main tables: the **Neighbor Database** (or Adjacency Database) which lists all directly connected OSPF neighbors, and the **Topology Database** (or Link-State Database - LSDB) which holds all the Link State Advertisements (LSAs) describing the entire network topology."},{"q":"Which command is used to display the VLAN configuration on a Cisco switch?","o":["show vlan brief","show ip vlan","show vlan status","show running-config"],"c":"show vlan brief","cat":"Network Fundamentals & Tools","e":"The **`show vlan brief`** command displays a concise summary of the VLAN configuration, including the VLAN ID, name, status, and associated ports."},{"q":"How does the Privileged EXEC Mode restrict the access to the configuration CLI commands?","o":["The Privileged EXEC Mode provides access security by adding an additional password when trying to reach the configuration modes.","By default, the Privileged EXEC Mode asks users to enter passwords for entering the Global Configuration Mode.","Access to the Privileged EXEC Mode can be password protected to allow only authorized users to execute the privileged set of commands","Commands entered in the Privileged EXEC Mode intentionally show false device information for unauthorized users."],"c":"Access to the Privileged EXEC Mode can be password protected to allow only authorized users to execute the privileged set of commands","cat":"Network Fundamentals & Tools","e":"Security is applied by password-protecting the entry into the Privileged EXEC Mode itself, which is required before accessing configuration commands."},{"q":"Which command displays the ARP cache on a Cisco device?","o":["show mac address-table","show arp","show ip arp","clear arp-cache"],"c":"show ip arp","cat":"Network Fundamentals & Tools","e":"The command 'show ip arp' displays the IPv4 to Layer 2 (MAC) address mapping cache on a Cisco router or multilayer switch. The option 'show arp' is often an alias but 'show ip arp' is the explicit standard command."},{"q":"Which command displays the MAC address of the interface?","o":["show interfaces","show running-config","show ip interface","show ip interface brief"],"c":"show interfaces","cat":"Network Fundamentals & Tools","e":"The **`show interfaces`** command displays detailed information for a specified interface (or all interfaces), including its Layer 2 status, protocol status, counters, and the interface's burned-in **MAC address**."},{"q":"Which option is the most scalable solution for inter-VLAN routing?","o":["router with separate interfaces in each VLAN","Layer 3 switch","router on a stick","Layer 2 switch"],"c":"Layer 3 switch","cat":"Switching & VLAN","e":"A **Layer 3 switch** performs routing using hardware (ASICs) at wire speed, offering far greater performance and scalability compared to the 'router on a stick' method, which can create a bottleneck on the router's single trunk link."},{"q":"What command enables trunking on a Cisco switch port?","o":["switchport mode trunk","switchport access vlan 10","switchport trunk native vlan 99","switchport mode access"],"c":"switchport mode trunk","cat":"Switching & VLAN","e":"The **`switchport mode trunk`** command explicitly configures a Cisco switch port to operate as a trunk link, allowing traffic for multiple VLANs (tagged frames) to traverse the link."},{"q":"Which of the following IEEE 802.11 standards operate in the 5 GHz frequency band?","o":["802.11a","802.11b","802.11g","802.11n","802.11ac"],"c":["802.11a","802.11ac"],"cat":"Wireless","e":"**802.11a** var den första standarden som använde 5 GHz-bandet. **802.11ac (Wi-Fi 5)** fungerar *endast* i 5 GHz-bandet. (802.11n/ax är dual-band, 802.11b/g är 2.4 GHz-only)."},{"q":"Which layer in the OSI model is responsible for packet delivery and logical addressing?","o":["Lager 2","Lager 3","Lager 4","Lager 5"],"c":"Lager 3","cat":"OSI Model","e":"**Nätverkslagret** (Lager 3) hanterar logisk adressering (t.ex. IP-adresser) och bestämmer den bästa vägen för paketleverans genom routing."},{"q":"Which command on a Cisco router shows the OSPF database summary?","o":["show ip ospf database summary","show ip ospf neighbor","show ip ospf interface","show ip protocols"],"c":"show ip ospf database summary","cat":"Network Fundamentals & Tools","e":"**`show ip ospf database summary`** displays a summary of the OSPF Link-State Database (LSDB), including the number and types of LSAs received and generated."},{"q":"Which command on a Cisco router displays interface status?","o":["show ip interface brief","show interfaces status","show interface","show ip route"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"\"show ip interface brief\" shows the status and IP address of all interfaces."},{"q":"Which command displays BGP-Peer status on a Cisco router?","o":["show ip bgp summary","show ip bgp neighbors","show ip bgp","show ip route bgp"],"c":"show ip bgp summary","cat":"Routing & Protocols","e":"The 'show ip bgp summary' command provides a concise, high-level overview of the status of all configured BGP neighbors (peers), showing their state and the number of prefixes received."},{"q":"Which command displays the current Cisco router configuration in non-frame mode?","o":["show running-config","show startup-config","show config","show flash:"],"c":"show running-config","cat":"Network Fundamentals & Tools","e":"**`show running-config`** shows the configuration currently loaded and running in RAM (Random Access Memory)."},{"q":"Which protocol uses TCP port 22?","o":["FTP","SSH","Telnet","HTTP"],"c":"SSH","cat":"Network Fundamentals & Tools","e":"SSH (Secure Shell) uses TCP port 22 for secure remote connections."},{"q":"What protocol is used by the ping command?","o":["TCP","UDP","ICMP","ARP"],"c":"ICMP","cat":"TCP/IP/DNS Protocols","e":"Ping uses Internet Control Message Protocol (ICMP) to send ECHO requests."},{"q":"To which ISO OSI model layer or layers does TCP/IP model application layer correspond?","o":["network","transport","session","session, presentation, and application"],"c":"session, presentation, and application","cat":"OSI Model","e":"The Application layer of the TCP/IP model encompasses the functions of three separate OSI layers: Layer 7 (Application), Layer 6 (Presentation), and Layer 5 (Session)."},{"q":"Which protocol is used to discover DHCP servers in the network?","o":["DHCPDISCOVER","DHCPREQUEST","DHCPACK","DHCPOFFER"],"c":"DHCPDISCOVER","cat":"TCP/IP/DNS Protocols","e":"DHCPDISCOVER is the first message a client sends to find a DHCP server."},{"q":"A device running a Windows OS has the IP address 169.254.254.254. Which of the following statements is true?","o":["The address is automatically configured by the device itself.","The device is reachable via the internet.","The IP address is used to communicate with the default gateway.","The IP address is a loopback address."],"c":"The address is automatically configured by the device itself.","cat":"IP Addressing IPv4/Ipv6","e":"Intervallet **169.254.x.x** är reserverat för **APIPA (Automatic Private IP Addressing)**. En Windows-enhet själv-tilldelar denna adress när den är inställd på att använda DHCP men misslyckas med att hitta en DHCP-server på nätverket. Dessa adresser är endast giltiga för kommunikation inom det lokala länket."},{"q":"What is the default port for SNMP traps?","o":["162","161","53","25"],"c":"162","cat":"Network Fundamentals & Tools","e":"**SNMP traps** (unsolicited alerts from the agent) are typically sent to the SNMP Manager on **UDP port 162**. SNMP Get/Set requests are sent to UDP port 161."},{"q":"When using the modified EUI-64 format to create the interface ID of an IPv6 unicast address, which two portions of the Ethernet MAC are used unchanged? (Choose two.)","o":["Organizational Unique Identifier (OUI) octets","network interface card (NIC) specific octets","the universal/local bit","the unicast/multicast bit","the protocol type octet"],"c":["network interface card (NIC) specific octets","the unicast/multicast bit"],"cat":"IP Addressing IPv4/Ipv6","e":"The EUI-64 process converts the 48-bit MAC address into a 64-bit Interface ID by inserting 'FFFE' and then modifying the 7th bit (the Universal/Local bit) of the first octet. This means:\n\n1.  **network interface card (NIC) specific octets:** The last 24 bits of the MAC address are used entirely **unchanged** in the resulting Interface ID.\n2.  **the unicast/multicast bit:** This is the 8th bit of the first octet. It is *not* the bit that is inverted during the EUI-64 process, so it remains **unchanged**.\n\nConversely, the **universal/local bit** is intentionally **inverted**, which also changes the value of the overall **Organizational Unique Identifier (OUI) octets**."},{"q":"Which command on a Cisco router displays the routing table?","o":["show ip route","show ip arp","show running-config","show interfaces"],"c":"show ip route","cat":"Network Fundamentals & Tools","e":"The **`show ip route`** command displays the current IP routing table, listing all known routes, their origins, and metrics."}],"cisco2":[{"q":"What protocol provides the mapping between IP addresses and MAC addresses?","o":["ARP","DNS","DHCP","NAT"],"c":"ARP","cat":"Network Fundamentals & Tools","e":"**ARP (Address Resolution Protocol)** is used on a local network segment to dynamically find the **MAC address** associated with a specific **IP address**."},{"q":"Which two statements describe examples of social engineering attacks? (Choose two.)","o":["Cracking a user password using personal data related to the victim.","Defacing a website and explaining the political ideology behind the attack.","Delivering a DoS attack from a server trusted by all company users.","Sending an email from a seemingly legitimate address with writing that adopts typical sender language.","Sending an infected USB with a magazine."],"c":["Sending an email from a seemingly legitimate address with writing that adopts typical sender language.","Sending an infected USB with a magazine."],"cat":"Security AAA & ACL","e":"Social engineering relies on manipulating users to gain access or information. Both sending a highly believable (spear-phishing) email and leaving an infected physical item (like a USB) for a user to find and plug in are classic examples of deceiving human users."},{"q":"What are the two main WLAN deployment types? (Choose two.)","o":["centralized","router-based","standalone","Wi-Fi Direct","Zero Touch Provisioning (ZTP)"],"c":["centralized","standalone"],"cat":"Wireless","e":"The correct answers are centralized and standalone. When an AP is configured as centralized, all the traffic goes through the Cisco Wireless LAN Controller (WLC), which is not the case with standalone APs. The basic premise of a Wi-Fi Direct deployment is the creation of peer-to-peer Wi-Fi connections between devices, without the need for an AP. It is another example of a wireless personal area network (WPAN). ZTP is a process of automatically configuring network equipment."},{"q":"Which layer in the OSI model handles segmentation of data into segments?","o":["Layer 2","Layer 3","Layer 4","Layer 5"],"c":"Layer 4","cat":"Network Fundamentals & Tools","e":"The **Transport layer (Layer 4)** is responsible for the segmentation of data from the upper layers into manageable units called **segments** (when using TCP) or datagrams (when using UDP)."},{"q":"Which statement correctly describes roles and characteristics of network device functional planes?","o":["The control plane only handles traffic sent to the IP addresses of the device itself.","The control and management planes influence how the data plane forwards traffic.","The management plane traffic never crosses the data plane.","The data plane only forwards signals among physical interfaces. It does not create data structures nor perform lookups."],"c":"The control and management planes influence how the data plane forwards traffic.","cat":"Network Fundamentals & Tools","e":"The **Control Plane** (calculates routes) and the **Management Plane** (handles configuration/monitoring) both generate and maintain the rules and structures (like routing and forwarding tables) that the **Data Plane** uses for high-speed packet forwarding."},{"q":"On Cisco routers, routing for IPv6 is not enabled by default. Which command should you use to enable IPv6 routing?","o":["ipv6 enable","ipv6 local policy route-map","ipv6 route <IPv6 address>","ipv6 unicast-routing"],"c":"ipv6 unicast-routing","cat":"IP Addressing IPv4/Ipv6","e":"The 'ipv6 unicast-routing' command in global configuration mode enables the global forwarding of IPv6 packets across all interfaces. The 'ipv6 enable' command only enables IPv6 processing on a single interface."},{"q":"Which flag is set in the first TCP packet sent by a device initiating a communication?","o":["ACK","FIN","PSH","RST","SYN"],"c":"SYN","cat":"TCP/IP/DNS Protocols","e":"A TCP connection is initiated with a SYN flag in the first packet during the three-way handshake."},{"q":"Which statement is false regarding the encapsulation process?","o":["Encapsulation is the process the sending device uses to remove one or more protocol headers.","A Segment is the PDU of the Transport Layer.","The encapsulation process is performed from the top (Application) layer down to the bottom (Physical) layer.","Encapsulation increases the size of the PDU."],"c":"Encapsulation is the process the sending device uses to remove one or more protocol headers.","cat":"Network Fundamentals & Tools","e":"The false statement is that encapsulation removes headers. Encapsulation is the process of **adding** protocol headers (and sometimes trailers) to data as it moves down the OSI model layers on the sending device. The process of **removing** headers is called de-encapsulation, which happens on the receiving device. The other three statements are true."},{"q":"Which two capabilities does an NGFW have that a traditional firewall does not have? (Choose two.)","o":["ability to enforce an access control policy between two or more security zones","traffic-filtering capabilities","ability to provide actionable indications of compromise to identify malware activity","comprehensive network visibility","resistance to attacks to the firewall itself"],"c":["ability to provide actionable indications of compromise to identify malware activity","comprehensive network visibility"],"cat":"Security AAA & ACL","e":"**Next-Generation Firewalls (NGFWs)** tillhandahåller djupare inspektion (applikationsmedvetenhet), hotintelligens och **omfattande nätverksöversikt** för att upptäcka och identifiera sofistikerad skadlig kod/indikatorer på kompromettering, vilket traditionella brandväggar saknar."},{"q":"In a routing table, what is an optional entry that is used when no explicit path to a destination is found?","o":["static route","directly connected route","OSPF route","default route"],"c":"default route","cat":"Routing & Protocols","e":"A default route (often written as 0.0.0.0 0.0.0.0 in IPv4) is a catch-all entry used when no more specific match for the destination is found in the routing table."},{"q":"Which command displays EtherChannel status?","o":["show etherchannel summary","show interface trunk","show interfaces port-channel","show vlan"],"c":"show etherchannel summary","cat":"Switching & VLAN","e":"The 'show etherchannel summary' command provides a concise overview of all configured EtherChannel bundles, including the port-channel number, protocol (LACP or PAgP), and the operational status of the bundle (e.g., 'SU' for Layer 2 up/in use)."},{"q":"What is the purpose of Spanning Tree Protocol (STP)?","o":["To increase speed","To create VLANs","To prevent loops","To assign IP addresses"],"c":"To prevent loops","cat":"Switching & VLAN","e":"STP (Spanning Tree Protocol) is used in switched networks to prevent Layer 2 bridging loops by intelligently blocking redundant links. \nThis ensures there is only one active path between any two devices, which prevents broadcast storms and MAC address table instability."},{"q":"By default, which VLAN or VLANs are permitted across a trunk link?","o":["no VLANs","native VLAN","all VLANs","VLAN 0"],"c":"all VLANs","cat":"Switching & VLAN","e":"By default, a trunk link (using 802.1Q or ISL) allows all existing VLANs to traverse it, although this can be manually restricted."},{"q":"What is a common use for a default static route?","o":["connect an ISP network to the edge router of a company","connect between ISPs","connect the edge router of a company to an ISP network","connect between edge routers of the companies"],"c":"connect the edge router of a company to an ISP network","cat":"Routing & Protocols","e":"En **Default Static Route** (`0.0.0.0 0.0.0.0`) används vanligtvis på en företagsnätverks **Edge Router** för att skicka all trafik, som inte har en mer specifik matchning, mot **ISP-nätverket** (Internet). Detta fungerar bra eftersom det bara finns en utgångspunkt."},{"q":"Which command protects a switched network from a hacker who is trying to preempt an election of STP?","o":["spanning-tree portfast default","spanning-tree guard root","switchport port-security violation","spanning-tree guard"],"c":"spanning-tree guard root","cat":"Switching & VLAN","e":"**`spanning-tree guard root`** (**Root Guard**) is specifically designed to prevent a switch port from accepting superior BPDUs. This ensures that unauthorized or rogue switches cannot become the root bridge, thereby protecting the stable STP topology."},{"q":"Which layer of the OSI model is responsible for multiple sessions in a connection?","o":["Layer 3","Layer 4","Layer 5","Layer 6"],"c":"Layer 5","cat":"OSI Model","e":"The Session Layer (Layer 5) is responsible for establishing, managing, and terminating sessions between applications, enabling them to communicate across the network."},{"q":"What is the purpose of DHCP snooping?","o":["Block rogue DHCP servers","Increase DHCP speed","Encrypt DHCP traffic","Log DHCP requests"],"c":"Block rogue DHCP servers","cat":"TCP/IP/DNS Protocols","e":"DHCP snooping prevents rogue DHCP servers by validating DHCP messages and building a binding database of trusted IP-to-MAC address pairs."},{"q":"What is the function of a firewall?","o":["automatically handle the configuration of wireless access points","allow wireless devices to connect to a wired network","connect networks and intelligently choose the best paths between networks","monitor and control the incoming and outgoing network traffic"],"c":"monitor and control the incoming and outgoing network traffic","cat":"Security AAA & ACL","e":"A firewall's primary function is to monitor and control network traffic based on a defined set of security rules."},{"q":"Which mechanism does NETCONF use to install, manipulate, and delete the configuration of network devices?","o":["OpenFlow","Remote Procedure Call (RPC)","REST","RESTCONF"],"c":"Remote Procedure Call (RPC)","cat":"Automation & DevOps","e":"NETCONF uses an RPC (Remote Procedure Call) mechanism, typically encoded in XML, to send configuration operations (like `edit-config` and `get`) to the network device."},{"q":"What happens to a port that belongs to VLAN 5 after VLAN 5 is accidentally deleted?","o":["The port goes to the error-disabled state and is not operational.","The port becomes inactive and will not be functional until the missing VLAN 5 is created.","The port remains operational.","The port is shut down."],"c":"The port becomes inactive and will not be functional until the missing VLAN 5 is created.","cat":"Switching & VLAN","e":"If an access port is assigned to a VLAN that does not exist in the VLAN database (VLAN 5 in this case), the port's Layer 2 status will be inactive, and it will be unable to forward traffic until the VLAN is recreated."},{"q":"Which of the following SSH clients is written in Python?","o":["PuTTY","OpenSSH","Paramiko","WinSCP"],"c":"Paramiko","cat":"Network Fundamentals & Tools","e":"Paramiko is a Python library for implementing the SSH protocol."},{"q":"Match the OSPF packet type with correct description.","o":["sends specifically requested link-state records — LSU","acknowledges the other packet types — LSAck","checks for database synchronization — DBD","requests specific link-state records from another router — LSR","discovers neighbors — hello"],"c":["sends specifically requested link-state records — LSU","acknowledges the other packet types — LSAck","checks for database synchronization — DBD","requests specific link-state records from another router — LSR","discovers neighbors — hello"],"cat":"Routing & Protocols","e":"This maps the OSPF packet types to their primary functions:\n- **Hello**: Discovery and maintenance of neighbors.\n- **DBD (Database Description)**: Used to summarize and check the synchronization of the Link State Database.\n- **LSR (Link-State Request)**: Requests specific LSAs from a neighbor.\n- **LSU (Link-State Update)**: Sends the requested LSAs.\n- **LSAck (Link-State Acknowledgment)**: Acknowledges receipt of LSUs."},{"q":"What is the default port for HTTP?","o":["80","443","22","21"],"c":"80","cat":"TCP/IP/DNS Protocols","e":"**HTTP** (Hypertext Transfer Protocol) använder **TCP-port 80** som standard."},{"q":"In which type of applications does the user need to wait for a response when performing actions such as inventory lookup or database update?","o":["batch applications","real-time applications","interactive applications","human-to-human applications"],"c":"interactive applications","cat":"Network Fundamentals & Tools","e":"In **interactive applications** (such as web browsing, inventory systems, or remote terminal sessions), the user actively waits for a response from the server before continuing the next step. This requires low latency for a good user experience."},{"q":"Which troubleshooting step would you take if you wanted to check the connectivity to the local network?","o":["Ping the loopback address.","Ping the local host.","Ping the default gateway.","Ping the remote server."],"c":"Ping the default gateway.","cat":"Network Fundamentals & Tools","e":"Pinging the default gateway confirms connectivity from the host to a device on the local network (the router interface) and verifies that the host is correctly configured with its Layer 3 gateway."},{"q":"You configured an important host in your company with a static default gateway pointing to one of the routers in the network. You also have a second router that can provide connectivity to other subnets. What will happen when the primary router fails and there is only a dynamic routing protocol configured between the routers?","o":["The host will automatically discover the failure and update its default gateway with the IP address of the second router.","The second router will use the dynamic routing protocol to instruct the host to change its default gateway with its IP address.","The host should have DHCP provide the default gateway, so the DHCP server can dynamically update the gateway after the failure.","The host will lose connection to other subnets, since it cannot dynamically update the default gateway."],"c":"The host will lose connection to other subnets, since it cannot dynamically update the default gateway.","cat":"Routing & Protocols","e":""},{"q":"What are the three main objectives of TCP reliability? (Choose three.)","o":["detection and retransmission of dropped packets","detection and remediation of duplicate or out-of-order data","avoidance of congestion in the network","detection of dropped packets; the application does the retransmission","detection of duplicate or out-of-order data; the application does the remediation","avoidance of delay in the network"],"c":["detection and retransmission of dropped packets","detection and remediation of duplicate or out-of-order data","avoidance of congestion in the network"],"cat":"TCP/IP/DNS Protocols","e":"Correct: TCP ensures reliable delivery by retransmitting lost packets, reordering or removing duplicates, and implementing congestion control. Alternatives:\n- Options suggesting the application handles retransmission or remediation are incorrect; TCP handles reliability itself.\n- 'Avoidance of delay' is a performance concern but not a primary objective of TCP reliability."},{"q":"In the Wi-Fi 2.4 GHz band, which three channels do not overlap? (Choose three.)","o":["0","1","2","6","11","15","21"],"c":["1","6","11"],"cat":"Wireless","e":"To prevent interference in the 2.4 GHz band, channels must be separated by 5 channel numbers (25 MHz). Channels 1, 6, and 11 are the only three standard channels that can be used simultaneously without overlapping."},{"q":"Which two statements regarding ARP are true? (Choose two.)","o":["A device can use ARP to assign the MAC addresses to dynamic NICs.","ARP entries are permanent.","ARP entries are not permanent.","A device can use ARP to assign an IPv4 address to the requester.","Devices can exchange entire ARP tables.","ARP tables are created and maintained dynamically."],"c":["ARP entries are not permanent.","ARP tables are created and maintained dynamically."],"cat":"TCP/IP/DNS Protocols","e":"ARP entries are created dynamically when a Layer 3 to Layer 2 mapping is needed. They are **not permanent** but expire after a defined aging time to ensure the table remains accurate if devices move or change MAC addresses."},{"q":"How many bits constitute the DSCP field of the IP header?","o":["3 bits","4 bits","6 bits","8 bits"],"c":"6 bits","cat":"Network Fundamentals & Tools","e":"**DSCP (Differentiated Services Code Point)**-fältet är **6 bitar** långt och utgör en del av det 8-bitars Differentiated Services (DS)-fältet i IP-headern. Dessa 6 bitar möjliggör $2^6 = 64$ möjliga klassificeringsvärden."},{"q":"Which OSI layer is responsible for physical cables and electrical signals?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"c":"Layer 1","cat":"OSI Model","e":"The Physical layer (Layer 1) deals with transmission of raw bits over a physical medium such as cables."},{"q":"Which two conditions must be met on a router so that a route marked \"C\" shows up in the output of the show ip route command? (Choose two.)","o":["A valid IP address is configured on the interface.","Routing adjacency is established between two routers.","The interface has Layer 1 and Layer 2 connectivity.","The ip route mark connected command is issued for the route.","The same routing process ID must be set on both routers."],"c":["A valid IP address is configured on the interface.","The interface has Layer 1 and Layer 2 connectivity."],"cat":"Routing & Protocols","e":"A 'C' (**Connected**) route is created in the routing table when an interface is configured with an **IP address** and is in an operational 'up/up' state, meaning it has active **Layer 1 (Physical) and Layer 2 (Data Link) connectivity**."},{"q":"Which command configures IPv4 address 10.0.0.1/28 on a selected router interface?","o":["Router(config-if)# ip address 10.0.0.1 255.255.255.240","Router(config-if)# ip address 10.0.0.1/28","Router(config-if)# ip address 10.0.0.1 255.255.255.0","Router(config-if)# ip address 10.0.0.0 255.255.255.240","Router(config-if)# ip address 10.0.0.1/24"],"c":"Router(config-if)# ip address 10.0.0.1 255.255.255.240","cat":"Network Fundamentals & Tools","e":"Cisco IOS interface konfigurationskommando kräver IP-adressen följt av subnätmasken i **dotted-decimal format**. CIDR-notationen `/28` motsvarar subnätmasken `255.255.255.240`."},{"q":"Which layer in the OSI model handles session management?","o":["Layer 3","Layer 4","Layer 5","Layer 6"],"c":"Layer 5","cat":"Network Fundamentals & Tools","e":"The session layer (Layer 5) handles the establishment, management and termination of sessions between applications."},{"q":"What type of cable is typically used to connect two switches directly?","o":["Crossover cable","Straight-through cable","Fiber-optic cable","Rolled cable"],"c":"Crossover cable","cat":"Network Fundamentals & Tools","e":"A crossover cable is traditionally used to connect two devices of the same type (like two switches or two hosts) because it crosses the transmit and receive pairs. Modern devices often use Auto-MDIX and can use straight-through cables."},{"q":"What protocol is used to transfer files securely?","o":["FTP","SFTP","TFTP","HTTP"],"c":"SFTP","cat":"Security AAA & ACL","e":"**SFTP (SSH File Transfer Protocol)** uses the **SSH (Secure Shell)** protocol to provide an encrypted, secure connection for file transfer, unlike the unencrypted FTP and TFTP."},{"q":"Which command enables LACP on an interface?","o":["channel-group 1 mode active","channel-group 1 mode on","channel-group 1 mode auto","channel-group 1 mode desirable"],"c":"channel-group 1 mode active","cat":"Switching & VLAN","e":"LACP (IEEE 802.3ad) använder lägena **`active`** (aktivt initiera förhandling) och **`passive`** (passivt vänta på förhandling). `desirable` och `auto` används av PAgP (Ciscos proprietära protokoll), och `on` är för statisk konfiguration."},{"q":"Which two options represent when the OSPF routing protocol sends LSAs? (Choose two.)","o":["periodically every 30 minutes","on topology change","periodically every 30 seconds","periodically every 60 minutes","periodically every 60 seconds"],"c":["periodically every 30 minutes","on topology change"],"cat":"Routing & Protocols","e":"OSPF, being a link-state protocol, sends LSAs immediately **on a topology change** to ensure fast convergence. It also performs a full refresh of all self-originated LSAs **periodically every 30 minutes** ($1800 \text{ seconds}$) to ensure database synchronization."},{"q":"Which of the following is the primary purpose of a VPN (Virtual Private Network)?","o":["To create a secure and private connection over an insecure public network","To provide high-speed internet access to remote users","To filter malware from incoming traffic","To manage and configure IP addresses dynamically"],"c":"To create a secure and private connection over an insecure public network","cat":"Security AAA & ACL","e":"A **VPN** uses encryption and tunneling protocols to securely transmit data over public networks, ensuring privacy and confidentiality."},{"q":"Which command on a Cisco switch shows interface status and VLAN membership?","o":["show interfaces status","show ip interface brief","show vlan brief","show running-config"],"c":"show interfaces status","cat":"Network Fundamentals & Tools","e":"**show interfaces status** is the most direct command to show the operational status (up/down), connection speed, and the configured VLAN (access mode) or trunking status of each port."},{"q":"Which type of cable is typically used to connect a core switch with a data center switch, where bandwidth higher than 40 Gbps and low cost are required?","o":["Category 5e UTP","Category 6 UTP","multimode fiber","single-mode fiber"],"c":"multimode fiber","cat":"Network Fundamentals & Tools","e":"**Multimode fiber** är det föredragna valet för höghastighetsanslutningar (40/100 Gbps och uppåt) inom ett datacenters korta till medellånga avstånd. Det ger den nödvändiga bandbredden till en **betydligt lägre kostnad** jämfört med Single-mode fiber."},{"q":"For which network entity is the OSPF designated router/backup designated router (DR/BDR) selection performed?","o":["for each multi-access segment","for each OSPF router ID","for the entire OSPF area","per transmission state of the link"],"c":"for each multi-access segment","cat":"Routing & Protocols","e":"OSPF (Open Shortest Path First) uses the Designated Router (DR) and Backup Designated Router (BDR) mechanism to reduce the number of adjacencies that must be formed, which lowers the amount of OSPF traffic (LSAs). This election is performed **independently on every multi-access network segment** (like an Ethernet LAN). The DR/BDR mechanism is only needed on segments where multiple routers could potentially form full adjacencies (broadcast or non-broadcast multi-access). Point-to-point links, for example, do not require a DR/BDR."},{"q":"Which VLAN is the default native VLAN on most Cisco switches?","o":["VLAN 1","VLAN 100","VLAN 1000","VLAN 4095"],"c":"VLAN 1","cat":"Switching & VLAN","e":"Som standard använder Cisco-switchar **VLAN 1** som både **management VLAN** och det **Native VLAN** på alla trunk-länkar (om det inte uttryckligen ändras)."},{"q":"What does MNEMONIC %LINEPROTO-5-UPDOWN in a syslog message signify about the event being logged?","o":["An interface has changed its up/down status.","An interface has been configured with an IP address.","A routing protocol has just developed adjacency with a peer router.","The router is either shutting down or has just booted up."],"c":"An interface has changed its up/down status.","cat":"Network Fundamentals & Tools","e":"Mnemonicen `%LINEPROTO` indikerar en förändring i line protocol-status (Layer 2-status). `UPDOWN` betyder specifikt att ett gränssnitts operativa status har ändrats."},{"q":"What are two reasons for choosing Transport Layer Security (TLS) over IP Security (IPsec) encryption? (Choose two.)","o":["IPsec encrypts the IP packet, resulting in lesser application-level security.","IPsec is less efficient than TLS, and in general not supported on mobile devices.","IPsec requires dedicated software installed on client hosts.","TLS can be used for encrypting traffic to public websites.","TLS decryption can be easily accelerated in hardware."],"c":["IPsec requires dedicated software installed on client hosts.","TLS can be used for encrypting traffic to public websites."],"cat":"Security AAA & ACL","e":"TLS is the standard for securing public web traffic (HTTPS) and is natively supported by browsers. IPsec, commonly used for VPNs, often requires dedicated client software and is not the protocol of choice for general web encryption."},{"q":"What is the default port for DNS?","o":["53","80","443","25"],"c":"53","cat":"TCP/IP/DNS Protocols","e":"DNS (Domain Name System) uses **UDP port 53** primarily for standard queries, and TCP port 53 for zone transfers."},{"q":"What is the purpose of link-state advertisements?","o":["constructing a topological database","specifying a cost to reach a destination","determining the best path to a destination","verifying that a neighbor is still functioning"],"c":"constructing a topological database","cat":"Routing & Protocols","e":"**Link-State Advertisements (LSAs)** are packets used by OSPF routers to share information about their locally attached links and state. The collective information from all LSAs is used to build the complete **topological database (LSDB)** in each router."},{"q":"Dynamic ARP Inspection depends on which of the following options in environments that use DHCP?","o":["Port Security","DHCP snooping binding","Cisco Discovery Protocol","HTTP Services"],"c":"DHCP snooping binding","cat":"Security AAA & ACL","e":"Dynamic ARP Inspection (DAI) relies on the **DHCP Snooping binding database** to determine valid IP-to-MAC address mappings. If a host receives an IP address via DHCP, DAI trusts this mapping to validate ARP requests and replies."},{"q":"Which protocol enables VLAN trunk negotiation?","o":["DTP","LACP","STP","CDP"],"c":"DTP","cat":"Switching & VLAN","e":"DTP (Dynamic Trunking Protocol) negotiates whether an interface becomes a trunk port."},{"q":"You have configured two Layer 3 switches with HSRP for default gateway redundancy to hosts in VLAN 10 using HSRP version 1 and group 10. What is the virtual MAC address associated with the virtual router if the configured virtual IPv4 address is 10.1.1.1?","o":["1001.0001.001","1001.0c07.ac01","0000.0c07.ac10","0000.0c07.ac0a"],"c":"0000.0c07.ac0a","cat":"Routing & Protocols","e":"Correct: HSRP v1 generates virtual MAC in the format 0000.0c07.acXX, where XX is the HSRP group in hexadecimal. Group 10 = 0x0A, so MAC = 0000.0c07.ac0a. The options:\n- '1001.0001.001' is not HSRP MAC format.\n- '1001.0c07.ac01' is wrong because it would be group 1.\n- '0000.0c07.ac10' would correspond to group 16 (0x10)."},{"q":"Which command displays IP-to-MAC address mapping?","o":["show ip arp","show mac address-table","show interfaces","show ip route"],"c":"show ip arp","cat":"Network Fundamentals & Tools","e":"The 'show ip arp' command shows IP to MAC address bindings learned through ARP."},{"q":"Which three of the following application characteristic values are determined in the service level specification phase when designing the quality of service (QoS) policy of a network? (Choose three.)","o":["generated data flows","required bandwidth","required responsiveness","response criticality","tolerable jitter","tolerable packet loss"],"c":["required bandwidth","tolerable jitter","tolerable packet loss"],"cat":"Network Fundamentals & Tools","e":"The Service Level Specification phase involves defining measurable technical requirements for a traffic class, such as bandwidth, delay, jitter, and packet loss tolerance. Other aspects like data flows and criticality are typically determined in earlier phases (audit/discovery)."},{"q":"You have restarted a router, which has the default booting procedure. During the reboot, the following messages appear on the console: %Error opening tftp://255.255.255.255/network-confg (Timed out) %Error opening tftp://255.255.255.255/cisconet.cfg (Timed out). What can you conclude based on the messages?","o":["The configuration file is not found on the TFTP server","The router successfully loaded the configuration","The IOS image is corrupted","The interface is administratively down"],"c":"The configuration file is not found on the TFTP server","cat":"Network Fundamentals & Tools","e":"If startup-config is missing, the router searches for a network source. TFTP is attempted but not found, hence the error messages."},{"q":"What is the purpose of the Tracert command?","o":["Measure network delay","Trace the route to a destination","Test connectivity","Analyze packet loss"],"c":"Trace the route to a destination","cat":"Network Fundamentals & Tools","e":"**Tracert** (traceroute) identifies the sequence of routers (hops) a packet takes to reach a destination and measures the time taken at each hop."},{"q":"Which AP usually connects to a switch access port (nontrunking)?","o":["centralized AP (local mode)","standalone AP","none, all APs need to connect to a trunk port","standalone and centralized AP"],"c":"standalone AP","cat":"Wireless","e":"A **standalone AP** acts as an independent access point and typically carries traffic for only a single VLAN, hence connecting to a non-trunking **access port**."},{"q":"Which protocol does a router use to learn dynamic IP routes?","o":["RIP","DNS","DHCP","ICMP"],"c":"RIP","cat":"Routing & Protocols","e":"RIP (Routing Information Protocol) is a distance-vector **routing protocol** used by routers to dynamically exchange routing information and learn new paths to destination networks."},{"q":"What is the function of the ARP protocol?","o":["Resolves domain names to IP addresses","Resolves IP addresses to MAC addresses","Routes packets between networks","Encrypts IP packets"],"c":"Resolves IP addresses to MAC addresses","cat":"Network Fundamentals & Tools","e":"ARP (Address Resolution Protocol) translates IP addresses to MAC addresses on a local network link."},{"q":"Which two statement about VPNs are true? (Choose two.)","o":["VPNs do not necessarily implement cryptographic functions.","VPNs can only be established by the use of specialized hardware.","VPNs can be built using the technology used within the service provider WAN.","VPNs are secure because they are established over separate physical connections.","VPNs are only built over internet."],"c":["VPNs do not necessarily implement cryptographic functions.","VPNs can be built using the technology used within the service provider WAN."],"cat":"WAN & SDN/Virtualization","e":"There are two main categories of VPNs:\n\n1.  **Secure VPNs (e.g., IPsec, SSL/TLS):** These are established over insecure networks (like the public internet) and **must** use encryption (cryptographic functions) for confidentiality.\n2.  **Trusted VPNs (e.g., MPLS Layer 3 VPN):** These are established over a service provider's private, trusted network (often using **MPLS**, which is a core **SP WAN technology**). The isolation is achieved through techniques like VRFs (Virtual Routing and Forwarding) or pseudowires, meaning encryption is **not necessarily implemented** for customer traffic isolation in these cases."},{"q":"Which optical technology provides highest data rates?","o":["SONET","FTTx","DWDM","SDH"],"c":"DWDM","cat":"WAN & SDN/Virtualization","e":"DWDM (Dense Wavelength Division Multiplexing) is a technology used in long-haul backbone networks that multiplexes hundreds of different wavelengths (colors of light) onto a single fiber, providing data rates into the Tbits/s range."},{"q":"Which OSI layer is responsible for data encryption and format translation (for example, character encoding)?","o":["Session layer","Presentation layer","Transport layer","Data Link layer"],"c":"Presentation layer","cat":"OSI Model","e":"The Presentation layer (Layer 6) handles data representation, including encryption/decryption and translating data formats (like character encoding conversion)."},{"q":"What is the purpose of 802.1X authentication in a network?","o":["To provide port-based network access control","To encrypt wireless traffic","To manage IP address allocation","To configure VLANs dynamically"],"c":"To provide port-based network access control","cat":"Security AAA & ACL","e":"802.1X is used for port-based network access control, authenticating devices before they are granted access to the network."},{"q":"Which devices does the core layer interconnect?","o":["access layer switches","access points","distribution layer switches","end point devices"],"c":"distribution layer switches","cat":"Network Fundamentals & Tools","e":"In the hierarchical network design model (Access, Distribution, Core), the **Core layer** acts as the high-speed backbone, interconnecting multiple **Distribution layer** switches/routers."},{"q":"After a designated router (DR) and backup designated router (BDR) are selected on the multi-access segment in an OSPF routing domain, what is the OSPF state of the routers that are not elected as DR or BDR?","o":["2-way","exchange","full","loading"],"c":"2-way","cat":"Routing & Protocols","e":"Routers that are not elected as DR or BDR (known as DROTHERS) form a full adjacency (state 'full') only with the DR and BDR. They only reach the '2-way' state with each other."},{"q":"What is the main purpose of a default route?","o":["To route packets to unknown networks","To limit routing updates","To summarize routes","To create static VLANs"],"c":"To route packets to unknown networks","cat":"Routing & Protocols","e":"A default route provides a path when no specific route to a destination network exists."},{"q":"Which protocol is used to encrypt traffic between a client and a server over the internet?","o":["SSH","HTTP","HTTPS","Telnet"],"c":"HTTPS","cat":"Security AAA & ACL","e":"HTTPS (Hypertext Transfer Protocol Secure) uses SSL/TLS encryption to secure communication between clients and servers on the internet."},{"q":"Referring to the command output, in what state is the port?","o":["forwarding","error-disabled","shutdown","listening"],"c":"forwarding","cat":"Switching & VLAN","e":"The output shows the parameter **Port Status: Secure-up**. In Cisco terminology for port security, 'Secure-up' means the port is operational, has learned the allowed number of secure MAC addresses, and is actively participating in traffic forwarding. The port status would only be 'Secure-down' or 'err-disabled' if a security violation had occurred (given the **Violation Mode: Shutdown**), but the **Security Violation Count: 0** indicates the port is currently functioning normally and forwarding traffic."},{"q":"Match the type of attack with its description.","o":["spear phishing: emails sent to smaller, more targeted groups, even a single individual","whaling: emails sent to targeted groups of high profile individuals, such as top executives","pharming: Victims are lured by compromising name services.","watering hole: leverages a compromised web server to target select group that visits this website regularly","vishing: uses voice and the phone system as its medium","smishing: uses SMS texting as its medium"],"c":["spear phishing: emails sent to smaller, more targeted groups, even a single individual","whaling: emails sent to targeted groups of high profile individuals, such as top executives","pharming: Victims are lured by compromising name services.","watering hole: leverages a compromised web server to target select group that visits this website regularly","vishing: uses voice and the phone system as its medium","smishing: uses SMS texting as its medium"],"cat":"Security AAA & ACL","e":"These attacks leverage human trust (social engineering) or infrastructure weaknesses to trick users or redirect them to malicious sites:\n\n* **Spear Phishing:** Highly personalized emails targeting specific individuals or groups.\n* **Whaling:** Spear phishing specifically aimed at 'big fish' like executives (CEO, CFO).\n* **Pharming:** Redirecting users from legitimate websites to fraudulent ones by manipulating DNS (name services) or host files.\n* **Watering Hole:** Attacking a specific, trusted website that a target group regularly visits, compromising the users' devices as they access the site.\n* **Vishing:** Phishing conducted over voice calls (VoIP or phone).\n* **Smishing:** Phishing conducted via SMS text messages."},{"q":"Which command displays the currently configured gateway address on a Cisco router?","o":["show ip route | include 0.0.0.0","show ip route","show running-config | include default-gateway","show interfaces"],"c":"show ip route | include 0.0.0.0","cat":"Network Fundamentals & Tools","e":"By filtering the routing table with \"include 0.0.0.0\", the default route (default gateway) can be seen."},{"q":"Which three protocols use UDP? (Choose three.)","o":["DHCP","FTP","HTTPS","SNMP","TFTP"],"c":["DHCP","SNMP","TFTP"],"cat":"TCP/IP/DNS Protocols","e":"UDP is used by DHCP, SNMP, and TFTP because they are connectionless protocols that do not require reliable delivery."},{"q":"Which command verifies the STP root bridge on a Cisco switch?","o":["show spanning-tree","show vlan brief","show interfaces trunk","show mac address-table"],"c":"show spanning-tree","cat":"Switching & VLAN","e":"The 'show spanning-tree' command shows which switch is the root bridge for each VLAN."},{"q":"Which IPv6 command on a Cisco router can be used to provide the name-to-IP address resolution in case the DNS service in the network fails?","o":["hostname TFTP-SERVER 2001:db8:a:a::69","ipv6 host TFTP-SERVER interface Gi0/0","ipv6 host TFTP-SERVER 2001:db8:a:a::69 2001:db8:a:a::169","ipv6 hostname TFTP-SERVER 2001:db8:a:a::69"],"c":"ipv6 host TFTP-SERVER 2001:db8:a:a::69 2001:db8:a:a::169","cat":"Network Fundamentals & Tools","e":"The **`ipv6 host`** command is used to manually configure a static name-to-address mapping (a local DNS entry) on a Cisco router. The command can include one or more IPv6 addresses for a given hostname, which the router will use if DNS fails."},{"q":"What does the 'switchport port-security' command do?","o":["Enables SSH","Limits MAC addresses per port","Creates VLAN","Enables port mirroring"],"c":"Limits MAC addresses per port","cat":"Security AAA & ACL","e":"**Port Security** (aktiveras med `switchport port-security`) begränsar antalet tillåtna **MAC-adresser** på en switchport. Om gränsen överskrids kan porten stängas av eller begränsas, vilket skyddar mot MAC-flooding och obehöriga enheter."},{"q":"Which three types of booting are supported on servers? (Choose three.)","o":["booting from internal storage","booting from LAN","booting from SAN","booting from WAN","booting from wireless"],"c":["booting from internal storage","booting from LAN","booting from SAN"],"cat":"Network Fundamentals & Tools","e":"Servers commonly support booting from **internal storage** (local drives), **LAN** (using PXE/network boot), and **SAN** (Storage Area Network, using Fibre Channel or iSCSI). WAN and wireless booting are typically not supported due to latency and reliability concerns."},{"q":"Which statement regarding SSL and TLS is true?","o":["TLS is the predecessor of SSL.","Symmetric algorithms are used for authentication and the exchange of keys.","Asymmetric algorithms are used for bulk encryption.","SSL and TLS rely on PKI and digital certificates for authentication."],"c":"SSL and TLS rely on PKI and digital certificates for authentication.","cat":"Security AAA & ACL","e":"SSL and its successor, TLS, are cryptographic protocols that use the **Public Key Infrastructure (PKI)** and **digital certificates** (Asymmetric Cryptography) primarily for server authentication and key exchange before switching to Symmetric Cryptography for bulk encryption."},{"q":"Which three commands would enable you to enter extended ACL statements on en router? (Choose three.)","o":["Router(config-ext-nacl)#10 permit tcp host 192.168.1.1 host 209.165.201.1 eq 22","Router(config-ext-nacl)# deny ip any any host 209.165.201.0 eq 10","Router(config-ext-nacl)# permit icmp any host 200.165.201.1","Router(config-ext-nacl)# deny tcp host 209.165.201.0 host 192.168.1.1 eq 22","Router(config-ext-nacl)# deny tcp any host 201.165.201.0 0.0.0.31 host 192.168.1.1 eq 22","Router(config-ext-nacl)# permit udp host any eq dns"],"c":["Router(config-ext-nacl)#10 permit tcp host 192.168.1.1 host 209.165.201.1 eq 22","Router(config-ext-nacl)# permit icmp any host 200.165.201.1","Router(config-ext-nacl)# permit udp host any eq dns"],"cat":"Security AAA & ACL","e":"These three commands follow the correct syntax for an extended ACL: specifying the action (permit/deny), protocol (tcp/icmp/udp), source/destination (host/any/network), and optional port number (eq 22/dns)."},{"q":"What method does OSPF use to calculate the best path?","o":["Hop count","Cost (bandwidth)","Latency","Cost (delay)"],"c":"Cost (bandwidth)","cat":"Routing & Protocols","e":"OSPF uses 'Cost' as its metric. The cost is inversely related to the link's bandwidth, meaning higher bandwidth links have a lower (better) cost. The best path is the one with the lowest total accumulated cost."},{"q":"Which three SNMP messages are sent from an SNMP agent to an SNMP manager? (Choose three.)","o":["GetRequest","GetNextRequest","InformRequest","Response","SetRequest","Trap"],"c":["InformRequest","Response","Trap"],"cat":"TCP/IP/DNS Protocols","e":"The three messages sent *from* the **Agent** *to* the **Manager** are:\n1. **Response:** Sent as an acknowledgment or reply to a Manager's Get or Set request.\n2. **Trap:** An unsolicited alert sent by the Agent to notify the Manager of a critical event (e.g., a link failure).\n3. **InformRequest:** An unsolicited alert, similar to a Trap, but it requires a confirmation (Response) from the Manager, making it more reliable."},{"q":"Which of the following sentences is correct related to switch components?","o":["startup-config is copied to NVRAM when the switch is booted","running-config is copied to RAM when the switch is booted","startup-config is copied to RAM when the switch is booted","running-config is copied to NVRAM when the switch is booted"],"c":"startup-config is copied to RAM when the switch is booted","cat":"Switching & VLAN","e":"When a Cisco device (switch or router) boots up, the device locates the saved configuration file, **startup-config** (which resides in non-volatile memory, **NVRAM**), and copies it into **RAM**. Once loaded into RAM, it becomes the **running-config**, which the device actively uses to operate."},{"q":"Which network characteristic indicates the general expense to purchase, install, and maintain network components?","o":["bandwidth","security","cost","availability"],"c":"cost","cat":"Network Fundamentals & Tools","e":"**Cost** directly refers to the capital expenditures (CAPEX) for purchasing hardware and the operating expenditures (OPEX) for installation, maintenance, and ongoing support of network components."},{"q":"What command is used to view the current switch configuration?","o":["show running-config","show startup-config","show system","show interfaces"],"c":"show running-config","cat":"Network Fundamentals & Tools","e":"The \"show running-config\" command displays the configuration currently running in RAM on a Cisco device."},{"q":"Which command on a Cisco router shows IPv6 routing table?","o":["show ipv6 route","show ip route","show ipv6 interface brief","show running-config"],"c":"show ipv6 route","cat":"Network Fundamentals & Tools","e":"The command **`show ipv6 route`** is the Cisco IOS command used to display the contents of the router's IPv6 routing table."},{"q":"Which NTP setting specifies a stratum server?","o":["ntp server","ntp master","ntp peer","ntp source"],"c":"ntp master","cat":"TCP/IP/DNS Protocols","e":"The 'ntp master' command configures the device to act as an authoritative NTP time source (a stratum server) for other devices on the network when it cannot sync with an external source."},{"q":"What are the two characteristics of the overlay network? (Choose two.)","o":["It is a logical topology.","It is a physical topology.","It is used to connect devices virtually.","It is used to connect devices physically.","It provides underlay routing."],"c":["It is a logical topology.","It is used to connect devices virtually."],"cat":"Network Fundamentals & Tools","e":"An overlay network is a virtual, logical topology built 'over' the physical underlay network, using tunneling mechanisms (like VXLAN or IPsec) to connect devices virtually."},{"q":"Which of the following is a Cisco Meraki Access Point familiy?","o":["MR","MX","MS","MV"],"c":"MR","cat":"Network Fundamentals & Tools","e":"MR is the Meraki product family for wireless Access Points. MX is for security/SD-WAN appliances, MS for switches, and MV for smart cameras."},{"q":"Which role does not exist in the Rapid PVST+ Spanning Tree Protocol?","o":["alternate","backup","designated","disabled","nondesignated"],"c":"nondesignated","cat":"Switching & VLAN","e":"In Rapid PVST+ (RSTP/802.1w), the traditional 'Nondesignated' role is replaced by the more specific 'Alternate' and 'Backup' port roles, both of which are in the Discarding state. Nondesignated is a general term, not a defined RSTP role."}],"cisco3":[{"q":"Which of the following protocols is used for securing email communications?","o":["SMTP","IMAP","POP3","SMIME"],"c":"SMIME","cat":"Security AAA & ACL","e":"**S/MIME (Secure/Multipurpose Internet Mail Extensions)** is an industry standard used for securing email communication, providing both encryption and digital signatures to ensure confidentiality and integrity."},{"q":"Which IPv6 network prefix is only intended for local links and cannot be routed?","o":["::ffff/80","2001::/3","fc00::/7","fe80::/10"],"c":"fe80::/10","cat":"IP Addressing IPv4/Ipv6","e":"The prefix **fe80::/10** is reserved specifically for **Link-Local Addresses (LLA)**. These addresses are used by nodes to communicate with other nodes on the same physical link (or segment). Link-Local addresses are *non-routable* and cannot be forwarded by a router outside of that local link. This prefix is essential for IPv6 neighbor discovery and stateless address autoconfiguration (SLAAC) processes."},{"q":"Which statement regarding a small office/home office (SOHO) of a remote worker is correct?","o":["It is a LAN that includes both wireless and wired network devices.","It must be permanently connected to the main office.","It must follow the three-tier architecture model.","It typically uses dark fiber to connect to the main office."],"c":"It is a LAN that includes both wireless and wired network devices.","cat":"Network Fundamentals & Tools","e":"A SOHO (Small Office/Home Office) network is fundamentally a Local Area Network (LAN). Modern LANs almost always contain a combination of wired devices (e.g., computers or printers connected via Ethernet cable to a router) and wireless devices (e.g., laptops, tablets, and phones connected via Wi-Fi)."},{"q":"Which command will display the interface traffic statistics for the average input rate?","o":["show version","show interfaces","show running-config","show ip interface brief"],"c":"show interfaces","cat":"Network Fundamentals & Tools","e":"The **`show interfaces`** command displays detailed operational statistics for a specific interface, including five-minute input and output average rates (often referred to as 'rate')."},{"q":"What is the main benefit of spine-leaf architecture?","o":["It is typically used in any environment (service provider, enterprise, and data center).","It is optimized for north-south traffic.","It is very flexible because end devices can connect to both leaves and spines.","It is a very scalable design."],"c":"It is a very scalable design.","cat":"Network Fundamentals & Tools","e":"The spine-leaf architecture provides a highly scalable, non-blocking fabric with predictable, low-latency performance between any two leaf switches. This scalability is achieved by using all links in an active state via protocols like ECMP (Equal-Cost Multi-Path)."},{"q":"Refer to the exhibit. Which menu item should you select to configure a pre-shared key for a wireless network?","o":["Commands","Security","Wireless","WLANs"],"c":"WLANs","cat":"Wireless","e":"In a Cisco Wireless Controller (WLC) interface, the Pre-Shared Key (PSK) is a security setting applied to an individual Wireless LAN (WLAN), which corresponds to the SSID. Therefore, you must navigate to the 'WLANs' menu to configure this setting for a specific network."},{"q":"You have just configured two EtherChannels between two switches. Each EtherChannel contains 3 physical links. Which option describes how Layer 2 STP will react?","o":["It will block one physical link within one of the EtherChannels.","It will block one entire EtherChannel.","It will block one physical link within each EtherChannel.","It will not block any links."],"c":"It will block one entire EtherChannel.","cat":"Switching & VLAN","e":"EtherChannel bundles multiple physical links into a single logical link (Port Channel). STP treats the entire Port Channel as one link. If redundancy exists between two Port Channels, STP will block one of the entire Port Channels, not individual physical links within them."},{"q":"Which option involves only a single connection between a router and a switch for the purpose of inter-VLAN routing?","o":["router with a separate interface in each VLAN","Layer 3 switch","router on a stick","multilayer switch"],"c":"router on a stick","cat":"Switching & VLAN","e":"**Router-on-a-stick** uses a single physical link (configured as a trunk) between the router and the switch to route traffic between multiple VLANs via subinterfaces."},{"q":"Which statement about site-to-site VPN deployment mode is true?","o":["End devices that source messages are aware that VPN exists between them and the remote location.","In cryptographic VPN site-to-site deployment, the end device encrypts the content to be sent over the VPN.","Hub-and-spoke is the only VPN topology that can be implemented to interconnect more than two remote locations.","In a site-to-site VPN, a tunnel is built between VPN gateways present at each of the sites."],"c":"In a site-to-site VPN, a tunnel is built between VPN gateways present at each of the sites.","cat":"WAN & SDN/Virtualization","e":"Site-to-site VPNs create a secure tunnel between two dedicated devices (VPN gateways/routers) at each site. The end-user devices behind the gateways are typically unaware of the VPN."},{"q":"Which options are available for a network engineer to interact with a network device?","o":["A network engineer communicates directly with the device OS using machine programming languages.","A shell program exposes operating system services and can be accessed via CLI or GUI.","A hardware input device, like a mouse, can be used to interact directly with the device.","The operating system can only communicate with the user via hardware indicator lights."],"c":"A shell program exposes operating system services and can be accessed via CLI or GUI.","cat":"Network Fundamentals & Tools","e":"Nätverksingenjörer interagerar primärt med enheter genom ett **shell-program** (som IOS/Linux shell) för att komma åt operativsystemtjänster, vanligtvis via ett **Command Line Interface (CLI)** eller ibland ett **Graphical User Interface (GUI)**."},{"q":"What type of cable is typically crossed over to connect two Cisco switches directly?","o":["Fiber","Coaxial","Crossover Ethernet cable","Straight-through Ethernet cable"],"c":"Crossover Ethernet cable","cat":"Switching & VLAN","e":"A **Crossover Ethernet cable** is traditionally used for a direct connection between two similar devices (like two switches or two hosts) because it crosses the transmit and receive pairs. Modern devices often use Auto-MDIX to handle this automatically, but the crossover cable is the correct type."},{"q":"Which layer of the OSI model is responsible for embedding bit streams in frames?","o":["Lager 1","Lager 2","Lager 3","Lager 4"],"c":"Lager 2","cat":"OSI Model","e":"The data binding layer (Layer 2) is responsible for encapsulating packets in frames with MAC addresses."},{"q":"Which OSI layer is responsible for reliable end-to-end communication and error recovery?","o":["Data Link layer","Network layer","Transport layer","Application layer"],"c":"Transport layer","cat":"OSI Model","e":"The **Transport layer (Layer 4)** provides end-to-end communication services, such as reliable delivery, error checking, and flow control (e.g., TCP)."},{"q":"Which component is used to generate a signal for single-mode fiber connections?","o":["cathode","laser transmitter","LED diode","oscillator"],"c":"laser transmitter","cat":"Network Fundamentals & Tools","e":"**Single-mode fiber (SMF)** har en liten kärna och kräver en exakt, högenergisk ljuskälla, vanligtvis en **laser**, för att uppnå de långa avstånden och höga bandbredderna. **LED-dioder** används däremot för den billigare och kortare **multimode fiber (MMF)**."},{"q":"Which protocol is used as a transport for Google RPC?","o":["HTTP/2","HTTP/1.1","SSH","RESTCONF"],"c":"HTTP/2","cat":"Automation & DevOps","e":"gRPC (Google Remote Procedure Call) and other Google RPC mechanisms were developed to use **HTTP/2** as the underlying transport protocol due to its advantages in performance, multiplexing, and header compression."},{"q":"In a wireless IEEE 802.11 implementation, what is the most secure option to protect user traffic?","o":["WEP","WPA","WPA2","WPA3"],"c":"WPA3","cat":"Wireless","e":"WPA3 (Wi-Fi Protected Access 3) är den nuvarande och säkraste standarden. Den använder starkare kryptering och SAE (Simultaneous Authentication of Equals) handskakning för att skydda mot offline dictionary-attacker, vilket WPA2:s PSK (Pre-Shared Key) är sårbart för."},{"q":"Which three of the following commands can be used to exit the user EXEC mode in a Cisco CLI session? (Choose three.)","o":["exit","end","disable","quit","logout","escape"],"c":["exit","quit","logout"],"cat":"Network Fundamentals & Tools","e":"I **User EXEC-läge** (`Router>`) avslutar kommandona **`exit`**, **`quit`** och **`logout`** den nuvarande CLI-sessionen. `disable` flyttar dig från Privileged EXEC-läge (`Router#`) tillbaka till User EXEC-läge (`Router>`)."},{"q":"Which option correctly describes the network ID portion of the IPv4 address?","o":["It identifies the network of which the host is a part.","It identifies the individual host.","It is assigned by organizations to individual devices.","It identifies the interface of the router."],"c":"It identifies the network of which the host is a part.","cat":"IP Addressing IPv4/Ipv6","e":"The **Network ID** portion of an IPv4 address (determined by the subnet mask) identifies the specific network segment to which the host belongs, allowing routers to forward traffic between networks."},{"q":"On some simple Catalyst switches, the SYST LED will blink with which color when the switch POST process fails and Cisco IOS Software does not load?","o":["RED","AMBER","GREEN","WHITE"],"c":"AMBER","cat":"Network Fundamentals & Tools","e":"On Cisco Catalyst switches, the SYST LED typically indicates the overall health. A **blinking AMBER** (or Orange) status usually signals a failure during the Power-On Self-Test (POST) or when the operating system (Cisco IOS) fails to load properly."},{"q":"Which protocol is used to ensure integrity and authenticity in IP packets?","o":["AH (Authentication Header)","ESP (Encapsulating Security Payload)","TLS (Transport Layer Security)","SSL (Secure Sockets Layer)"],"c":"AH (Authentication Header)","cat":"Security AAA & ACL","e":"IPsec AH (Authentication Header) provides authentication and integrity protection for IP packets."},{"q":"Which of the following are common fiber-optic connectors used in networking?","o":["SC","LC","ST","RJ45","BNC"],"c":["SC","LC","ST"],"cat":"Network Fundamentals & Tools","e":"Vanliga fiberoptiska kontakter inkluderar **SC** (Square Connector), **LC** (Lucent Connector, populär för högdensitet) och **ST** (Straight Tip). RJ45 är för koppar Ethernet, och BNC är för koaxialkabel."},{"q":"Match the transport to the protocol: HTTP, NETCONF, SSH, RESTCONF, HTTP/2, gRPC","o":["HTTP → Web communication","NETCONF → Configuration management using XML","SSH → Secure shell transport","RESTCONF → RESTful interface for network configuration","HTTP/2 → Multiplexed web protocol","gRPC → Remote procedure calls over HTTP/2"],"c":["HTTP → Web communication","NETCONF → Configuration management using XML","SSH → Secure shell transport","RESTCONF → RESTful interface for network configuration","HTTP/2 → Multiplexed web protocol","gRPC → Remote procedure calls over HTTP/2"],"cat":"Automation & DevOps","e":"This is a correct mapping of common network protocols to their primary transport/function: **SSH** for secure transport; **NETCONF** for XML-based configuration; **RESTCONF** for RESTful configuration over HTTP; and **gRPC** for RPC over HTTP/2."},{"q":"How do you access the console of a network device that is part of a simulation in Cisco Modeling Labs?","o":["Add a Desktop node to a simulation and connect a console cable from it to the serial port on the node.","Install the Cisco Modeling Labs console tool for accessing device consoles.","Cisco Modeling Labs does not support console connections to network devices.","The console can be accessed directly from the Cisco Modeling Labs GUI."],"c":"The console can be accessed directly from the Cisco Modeling Labs GUI.","cat":"Network Fundamentals & Tools","e":"CML provides integrated console access directly from its web interface for all running nodes, eliminating the need for external terminal programs or virtual console connections."},{"q":"Which VLAN type can carry multiple VLAN tags in a frame?","o":["Access VLAN","Native VLAN","Trunk VLAN","Management VLAN"],"c":"Trunk VLAN","cat":"Switching & VLAN","e":"A Trunk port can carry multiple VLAN ID tags with 802.1Q."},{"q":"A company wants to interconnect all its branches. To ensure minimum downtime, the company wants to use a WAN that provides high availability and high redundancy. Which WAN topology should the company use?","o":["full mesh","hub-and-spoke","partial mesh","ring"],"c":"full mesh","cat":"Network Fundamentals & Tools","e":"En **full mesh**-topologi ger den **högsta redundansen** eftersom varje plats är direkt ansluten till varje annan plats. Om en enda länk misslyckas, finns det omedelbart flera alternativa direkta vägar tillgängliga, vilket minimerar driftstopp."},{"q":"Which ISO OSI layer defines services to segment data?","o":["Presentation layer","Session layer","Transport layer","Network layer"],"c":"Transport layer","cat":"OSI Model","e":"The **Transport layer (Layer 4)** is responsible for taking data from the Application layer and dividing it into smaller, manageable units called **segments** (for TCP) or datagrams (for UDP)."},{"q":"Assume that you have been told to secure the trunk ports on a switch. Which two options are recommended as best practice? (Choose two.)","o":["Change the native VLAN to something other than VLAN 1.","Make the native VLAN different on both ends.","Tag the native VLAN.","Enable DTP.","Make the native VLAN VLAN 1."],"c":["Change the native VLAN to something other than VLAN 1.","Tag the native VLAN."],"cat":"Switching & VLAN","e":"Security best practices for trunks include changing the native VLAN from the easily guessed default VLAN 1 (to mitigate VLAN hopping attacks) and explicitly disabling DTP (Dynamic Trunking Protocol) to prevent unexpected or unauthorized trunk establishment."},{"q":"Which two statements are true about Cisco Discovery Protocol? (Choose two.)","o":["It enables Cisco network devices to announce themselves to their neighbors.","It is disabled by default.","It provides an easy reconnaissance vector to any attacker with an Ethernet connection.","It can be useful for network troubleshooting when checking connectivity to non Cisco devices.","You can use the no cdp enable command to disable it globally."],"c":["It enables Cisco network devices to announce themselves to their neighbors.","It provides an easy reconnaissance vector to any attacker with an Ethernet connection."],"cat":"Network Fundamentals & Tools","e":"CDP is enabled by default and sends device information to neighboring devices, which is useful for troubleshooting but also provides information to attackers (reconnaissance)."},{"q":"What protocol is used to manage routers in SNMP v2c?","o":["UDP port 161","TCP port 161","UDP port 162","TCP port 162"],"c":"UDP port 161","cat":"Network Fundamentals & Tools","e":"SNMP Manager uses **UDP port 161** to send requests (GET/SET) to the Agent. Traps/Informs are typically sent from the Agent to the Manager on UDP port 162."},{"q":"Which of the following protocols is used to automatically assign IP addresses to devices on a network?","o":["DHCP","DNS","ICMP","FTP"],"c":"DHCP","cat":"TCP/IP/DNS Protocols","e":"**DHCP (Dynamic Host Configuration Protocol)** automatically assigns IP addresses, subnet masks, default gateways, and other network configurations to hosts."},{"q":"When a frame is forwarded to the destination by a switch, what happens with Layer 2 and
