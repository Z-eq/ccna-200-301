. Some devices may choose to use EUI-64 or a randomized value for the interface ID."},{"q":"Which layer of the OSI model is responsible for terminating sessions?","o":["Layer 4","Layer 5","Layer 6","Layer 7"],"c":"Layer 5","cat":"OSI Model","e":"The Session layer (Layer 5) handles the opening and closing of sessions between two applications."},{"q":"Which connector type is commonly used for Ethernet over twisted-pair cables?","o":["RJ45","BNC","SC","DB-9"],"c":"RJ45","cat":"Network Fundamentals & Tools","e":"RJ45 is the standard connector for Ethernet twisted-pair (copper) cables. BNC is a bayonet connector used with coaxial cable, SC is a fiber optic connector, and DB-9 is a serial port connector."},{"q":"A network administrator configures the border router with the command ip nat inside source list 14 pool accounting. Which ACL is required to be configured in order for this command to function?","o":["An access list named accounting that defines the starting and ending public IPv4 addresses.","An access list named accounting that defines the private addresses that are translated by NAT.","An access list that is numbered 14 that defines the starting and ending public IPv4 addresses.","An access list that is numbered 14 that defines the private addresses that are translated by NAT."],"c":"An access list that is numbered 14 that defines the private addresses that are translated by NAT.","cat":"Network Fundamentals & Tools","e":"The syntax `ip nat inside source **list 14** pool accounting` uses the keyword `list` followed by the access list number. This ACL (in this case, **ACL 14**) specifies which **inside private (local) addresses** are permitted to be translated by NAT. The `pool accounting` refers to a named **NAT pool** which defines the range of public (global) addresses to be used for the translation, not the ACL itself."},{"q":"Which statement is true for RAG?","o":["It was designed as a cost-effective and risk-free method to provide topic-specific context to a query.","It is computationally more expensive compared to fine-tuning.","It is computationally more expensive compared to training.","It can potentially cause a phenomenon that is known as catastrophic forgetting."],"c":"It was designed as a cost-effective and risk-free method to provide topic-specific context to a query.","cat":"AI & Machine Learning","e":"RAG (Retrieval-Augmented Generation) is highly cost-effective compared to fine-tuning or full training, and it eliminates the risk of catastrophic forgetting (where a model forgets previous learning when new data is added), making it ideal for adding topical context."},{"q":"Which layer in the OSI model is responsible for encryption and data transformation?","o":["Applikation","Session","Presentation","Nätverk"],"c":"Presentation","cat":"OSI Model","e":"Presentationslagret (Layer 6) hanterar datarepresentation, inklusive kryptering och kompression."},{"q":"If a port is still a designated or root port at the end of the learning state, which state will it enter?","o":["blocking","disabled","forwarding","learning","listening"],"c":"forwarding","cat":"Switching & VLAN","e":"För Root Ports och Designated Ports är tillståndssekvensen i STP: **Listening** (15s) → **Learning** (15s) → **Forwarding**. När en port är i Forwarding-tillståndet kan den aktivt skicka och ta emot användardata."},{"q":"Which of the following is the most commonly used port for SSH?","o":["22","80","443","23"],"c":"22","cat":"Network Fundamentals & Tools","e":"SSH (Secure Shell) uses port 22 for secure, encrypted communication between devices."},{"q":"Which command on a Cisco router displays interface statistics?","o":["show interfaces","show ip interface brief","show ip route","show version"],"c":"show interfaces","cat":"Network Fundamentals & Tools","e":"\"show interfaces\" visar detaljerad statistik, inklusive paketfel, hastighet och status."},{"q":"Which series of phases correctly represents a common attack methodology?","o":["Initial Compromise > Escalation of Privileges > Reconnaissance of internal hosts > Lateral movement > Exfiltration","Lateral movement > Escalation of Privileges > Reconnaissance of internal hosts > Initial Compromise > Exfiltration","Lateral movement > Reconnaissance of internal hosts > Escalation of Privileges > Initial Compromise > Exfiltration","Reconnaissance of internal hosts > Escalation of Privileges > Initial Compromise > Lateral movement > Exfiltration"],"c":"Initial Compromise > Escalation of Privileges > Reconnaissance of internal hosts > Lateral movement > Exfiltration","cat":"Security AAA & ACL","e":"En vanlig angreppssekvens börjar med **Initial Compromise** (att få fotfäste), följt av **Escalation of Privileges** (att öka åtkomsten), **Reconnaissance** (att utforska nätverket), **Lateral Movement** (att flytta sig till andra system) och slutligen **Exfiltration** (att stjäla data)."},{"q":"What is the primary function of the Spanning Tree Protocol (STP)?","o":["To eliminate network loops by blocking redundant paths","To encrypt data traffic on a network","To assign IP addresses to network devices","To manage the IP routing table"],"c":"To eliminate network loops by blocking redundant paths","cat":"Network Fundamentals & Tools","e":"STP is a protocol that prevents network loops in Ethernet networks by dynamically blocking redundant paths and ensuring a loop-free topology."},{"q":"Which of the following VLAN trunking encapsulation protocols can be used on Cisco switches? Choose two","o":["IEEE 802.1Q","ISL","LACP","STP"],"c":["IEEE 802.1Q","ISL"],"cat":"Switching & VLAN","e":"Cisco switches support both the open standard **IEEE 802.1Q** and the Cisco-proprietary **ISL** (Inter-Switch Link) for VLAN trunking. 802.1Q is the modern standard."},{"q":"What is session multiplexing?","o":["a process by which an IP host is able to support multiple sessions simultaneously and manage the individual traffic streams over a single link","a process by which an IP host is able to support multiple sessions simultaneously over multiple links","a process that is used for congestion avoidance","a process that is used for packet dropping"],"c":"a process by which an IP host is able to support multiple sessions simultaneously and manage the individual traffic streams over a single link","cat":"TCP/IP/DNS Protocols","e":"**Session Multiplexing** (hanteras av Transportlagret/Layer 4) är processen där en värd kan hantera **flera samtidiga kommunikationssessioner** från olika applikationer (via portnummer) över en enda nätverksanslutning."},{"q":"A router has learned three possible routes that could be used to reach a destination network. These routes have been learned from three different routing protocols, OSPF, EIGRP and RIPv2. Which route will the router install in the routing table?","o":["EIGRP route","OSPF route","RIPv2","all three routes","default route"],"c":"EIGRP route","cat":"Routing & Protocols","e":"Routers use **Administrative Distance (AD)** to choose between routes learned from different routing protocols. EIGRP has an AD of **90**, OSPF has **110**, and RIPv2 has **120**. The route with the **lowest AD (EIGRP)** will be installed in the routing table."},{"q":"What is the default STP priority value?","o":["32768","4096","8192","24576"],"c":"32768","cat":"Switching & VLAN","e":"All switches start with a default STP bridge priority of 32768. The priority must be manually lowered (e.g., 4096) to make a switch the Root Bridge."},{"q":"Which protocol uses UDP port 161?","o":["SNMP","Telnet","DNS","HTTP"],"c":"SNMP","cat":"Network Fundamentals & Tools","e":"**SNMP (Simple Network Management Protocol)** agents listen on **UDP port 161** for queries and requests from a Network Management System (NMS)."},{"q":"Which statement is false in regard to router path determination?","o":["A routing table may contain entries both for a destination network or for its subnet.","The longest prefix match always wins among the routes that are installed in the routing table.","Static routes have a default administrative distance of 0.","When a router has the choice of a static route and an OSPF route, the static route takes precedence."],"c":"Static routes have a default administrative distance of 0.","cat":"Routing & Protocols","e":"The statement is **false**. The default Administrative Distance (AD) for a **static route** is **1**. An AD of 0 is reserved for directly connected interfaces, indicating the highest level of trust."},{"q":"Which layer in the OSI model is responsible for end-to-end communication and error recovery?","o":["Transport Layer","Network Layer","Data Link Layer","Physical Layer"],"c":"Transport Layer","cat":"Network Fundamentals & Tools","e":"**Transportlagret** (Lager 4) tillhandahåller end-to-end kommunikationstjänster. Vid användning av TCP hanterar det felåterställning (omsändning) och flödeskontroll."},{"q":"Which network characteristic helps ensure that business-critical applications maintain performance during periods of network congestion?","o":["speed","security","QoS","reliability"],"c":"QoS","cat":"Network Fundamentals & Tools","e":"QoS (Quality of Service) prioritizes business-critical traffic over other traffic during periods of congestion to maintain performance."},{"q":"Which of the following is a private IPv4 network according to RFC 1918?","o":["10.0.0.0/8","8.8.8.0/24","172.32.0.0/16","192.0.2.0/24"],"c":"10.0.0.0/8","cat":"IP Addressing IPv4/Ipv6","e":"RFC 1918 defines three private ranges. The largest is the Class A private network: 10.0.0.0 to 10.255.255.255, represented by 10.0.0.0/8. The range 172.32.0.0/16 is outside the private Class B range (172.16.0.0/12)."},{"q":"What is the administrative distance of OSPF?","o":["90","100","110","120"],"c":"110","cat":"TCP/IP/DNS Protocols","e":"OSPF has an administrative distance (AD) of 110. This metric is used by Cisco devices to rank the trustworthiness of routing information sources (lower AD is preferred)."},{"q":"Which Cisco IOS interface command assigns a static IPv6 address using an EUI-64 interface ID?","o":["ipv6 address 2001:db8:2222:7272::72/64","ipv6 address 2001:0db8:0:1::/64 eui-64","eui-64 address 2001:0db8:0:1::/64","ipv6 address 2001:0db8:0:1::0290:27ff:fe17:fc0f/64"],"c":"ipv6 address 2001:0db8:0:1::/64 eui-64","cat":"IP Addressing IPv4/Ipv6","e":"The **`ipv6 address <prefix> eui-64`** command configures an IPv6 address on an interface using the EUI-64 format. This automatically generates the interface ID portion of the address from the MAC address, ensuring a unique IPv6 address on the link."},{"q":"Which type of ACL permits or denies traffic based on IP address and port number?","o":["Standard ACL","Extended ACL","Reflexive ACL","Dynamic ACL"],"c":"Extended ACL","cat":"Security AAA & ACL","e":"An **Extended ACL** (Access Control List) provides granular filtering based on **source/destination IP addresses**, **protocols** (TCP, UDP, ICMP), and **port numbers**."},{"q":"Which layer handles CSMA/CD?","o":["Network Layer","Data Link Layer","Physical Layer","Transport Layer"],"c":"Data Link Layer","cat":"Network Fundamentals & Tools","e":"CSMA/CD (Carrier Sense Multiple Access with Collision Detection) is a media access control method, which is handled by the MAC sublayer of the Data Link Layer (Layer 2)."},{"q":"Which approach requires administrative maintenance when changes occur in the network?","o":["static routing","dynamic routing","both dynamic routing and static routing","neither approach"],"c":"static routing","cat":"Routing & Protocols","e":"**Static routing** requires a network administrator to manually enter or update every route entry when the network topology changes, whereas dynamic routing protocols update routes automatically."},{"q":"On which of these tables do routers rely to make forwarding decisions for Layer 3 packets?","o":["MAC address table","Cisco Discovery Protocol table","routing table","ARP table"],"c":"routing table","cat":"Routing & Protocols","e":"Routers are Layer 3 devices and primarily use the routing table to determine the best next-hop interface and address for forwarding Layer 3 (IP) packets toward their destination network."},{"q":"Which information is used by a Cisco WLC to decide which VLAN to assign to a client?","o":["MAC address","IP address","SSID X","RF space"],"c":"SSID X","cat":"Wireless","e":"The Wireless LAN Controller (WLC) typically maps an **SSID** (the network name the client connects to) directly to a specific VLAN. This is the primary method for VLAN assignment in most wireless deployments."},{"q":"Which command shows the BGP routing table on a Cisco router?","o":["show ip bgp","show ip route bgp","show ip bgp summary","show ip protocols"],"c":"show ip bgp","cat":"Routing & Protocols","e":"\"show ip bgp\" visar hela BGP-rutningstabellen."},{"q":"What kind of threat requires mitigation by ensuring that the cable runs are neat?","o":["remote access threats","environmental threats","electrical threats","maintenance threats"],"c":"maintenance threats","cat":"Security AAA & ACL","e":"Keeping cable runs neat and organized primarily mitigates **maintenance threats** (such as accidental disconnections, incorrect re-patching, or difficulty troubleshooting) and helps ensure system availability."},{"q":"Which command shows the IP and status of all interfaces?","o":["show ip route","show ip interface brief","show interfaces status","show ip arp"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"The 'show ip interface brief' command is the standard Cisco IOS command that displays a quick summary of the status of all interfaces, including their assigned IP addresses and whether the line protocol is up/down."},{"q":"What is the process of adding VLAN IDs to Ethernet frames called?","o":["Encapsulation","Tagging","Trunking","Channeling"],"c":"Tagging","cat":"Network Fundamentals & Tools","e":"The process of adding an IEEE **802.1Q tag** (containing the VLAN ID) to an Ethernet frame before sending it over a trunk link is specifically called **VLAN tagging**."},{"q":"What are two valid IPv6 address scopes for a unique local IPv6 address? (Choose two.)","o":["global","interface-local","link-local","organization-local","site-local"],"c":["organization-local","site-local"],"cat":"IP Addressing IPv4/Ipv6","e":"Unique Local Addresses (ULA) are intended for communication within a limited administrative domain, such as a private network or an organization's site, and are not routable on the public internet.\n\n1.  **Site-Local:** This is the historical term that ULA (FC00::/7) was introduced to replace. It describes the scope of routing within a single, defined location or site.\n2.  **Organization-Local:** While not a formally defined scope in the same way as link-local or global, it accurately describes the intended use and scope of ULA—to be routable only within the bounds of a single organization."},{"q":"Which statement about Service Set Identifiers (SSIDs) is true?","o":["An administrator can only create one SSID on the same access point.","An administrator can create several SSIDs on the same access point.","An SSID must be advertised by the Wi-Fi access point.","An SSID is configured by default on an access point."],"c":"An administrator can create several SSIDs on the same access point.","cat":"Wireless","e":"Modern Access Points (APs), especially those in enterprise environments (Cisco WLC and APs), support the creation of multiple Virtual APs (VAPs) which correspond to different SSIDs. Each SSID can be mapped to a separate VLAN, allowing different security policies (e.g., guest vs. employee access) and network services to be applied while using the same physical hardware."},{"q":"Where does a router that runs OSPFv2, and that has neighbor adjacencies established, store link-state advertisements (LSAs)?","o":["LSDB","Neighbors table","Routing table","SPF tree"],"c":"LSDB","cat":"Routing & Protocols","e":"LSAs (Link-State Advertisements) are stored in the **Link-State Database (LSDB)**. This database contains a full map of the OSPF area. The router then uses Dijkstra's Shortest Path First (SPF) algorithm on the LSDB to calculate the best paths."},{"q":"Match the transport to the protocol:","o":["HTTP : RESTCONF","SSH : gRPC","HTTP/2 : NETCONF"],"c":["HTTP : RESTCONF","SSH : gRPC","HTTP/2 : NETCONF"],"cat":"Automation & DevOps","e":"NETCONF typically uses SSH for secure transport. RESTCONF uses HTTP(S) for a stateless interface. gRPC is a high-performance framework often transported over HTTP/2."},{"q":"Match the PDU with its description.","o":["a Link layer PDU : frame","an Internet layer PDU : packet","the general term for the PDU that is used at the application layer : data","a Transport layer PDU : segment"],"c":["a Link layer PDU : frame","an Internet layer PDU : packet","the general term for the PDU that is used at the application layer : data","a Transport layer PDU : segment"],"cat":"TCP/IP/DNS Protocols","e":"The Protocol Data Units (PDUs) are Data (L7), Segment (L4), Packet (L3), and Frame (L2)."},{"q":"When an enterprise has to comply with strict data security regulations, which cloud deployment model should they use for their services?","o":["community","hybrid","private","public"],"c":"private","cat":"WAN & SDN/Virtualization","e":"A **Private Cloud** offers the highest level of isolation, control, and governance because the infrastructure is dedicated solely to one organization. This makes it the ideal choice for meeting strict regulatory and data security compliance requirements."},{"q":"Which layer in the OSI model is responsible for port numbers?","o":["Lager 3","Lager 4","Lager 5","Lager 6"],"c":"Lager 4","cat":"OSI Model","e":"Transportlagret (Layer 4) använder portnummer (t.ex. TCP/UDP-portar) för att identifiera specifika tjänster eller applikationer på en värd, vilket styr dataöverföringen mellan slutpunkter."}],"cisco7":[{"q":"When configuring an IPv4 static route pointing to the next-hop IPv4, which command should you use?","o":["ip route 172.16.1.0 255.255.255.0 172.16.2.1","ip route 172.16.1.0 net-mask 255.255.255.0 next-hop 172.16.2.1","ip route 172.16.1.0/24 172.16.2.1","ip route static 172.16.1.0 net-mask 255.255.255.0 next-hop 172.16.2.1"],"c":"ip route 172.16.1.0 255.255.255.0 172.16.2.1","cat":"Network Fundamentals & Tools","e":"The standard Cisco IOS command syntax for configuring a static route specifying the next-hop IP address is `ip route [destination-network] [subnet-mask] [next-hop-ip]`."},{"q":"A host has the MAC address of 11:22:33:aa:bbcc. It uses a modified EUI-64 format to create its global unicast IPv6 address. Which IPv6 address is a correctly created global unicast IPv6 address of the device?","o":["2001:db8:aaaa:bbbb:1122:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1322:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1d22:33ff:feaa:bbcc","2001:db8:aaaa:bbbb:1d22:33ff:ffaa:bbcc","2001:db8:aaaa:bbbb:887d:9eb8:437d:3456"],"c":"2001:db8:aaaa:bbbb:1322:33ff:feaa:bbcc","cat":"IP Addressing IPv4/Ipv6","e":"The EUI-64 process converts the 48-bit MAC address (11:22:33:aa:bb:cc) into a 64-bit Interface ID in two main steps:\n\n1.  **Insertion (FFFE):** The MAC is split in half, and the hex sequence **FFFE** is inserted: 11:22:33:aa:bb:cc becomes 1122:33ff:feaa:bbcc.\n2.  **Inversion (U/L bit):** The **7th bit** of the first octet (11) is inverted. The first byte '11' (00010001 in binary) is modified by inverting the 7th bit (the bit highlighted: 00010**0**01 becomes 00010**1**01), resulting in '13' in hexadecimal.  The resulting Interface ID is **1322:33ff:feaa:bbcc**, which is then appended to the network prefix 2001:db8:aaaa:bbbb::/64."},{"q":"Which two features does ARP provide? (Choose two.)","o":["mapping IPv4 addresses to applications on a network","mapping IPv4 addresses to MAC addresses on a network","locally storing DLCIs that are learned via ARP","mapping MAC addresses to DLCIs on a network","locally storing MAC addresses that are learned via ARP"],"c":["mapping IPv4 addresses to MAC addresses on a network","locally storing MAC addresses that are learned via ARP"],"cat":"TCP/IP/DNS Protocols","e":"ARP (Address Resolution Protocol) is used to resolve (map) an IPv4 address to its corresponding MAC address. It stores these mappings locally in the ARP cache."},{"q":"Which command sets a router interface IP address?","o":["ip address 192.168.1.1 255.255.255.0","interface vlan 10","ip route 0.0.0.0 0.0.0.0","switchport access vlan 10"],"c":"ip address 192.168.1.1 255.255.255.0","cat":"Routing & Protocols","e":"The 'ip address' command is used under an interface to assign an IP address and mask."},{"q":"Which two data structures do link-state routing protocols use? (Choose two.)","o":["LSU database","neighbors database","link-state interfaces database","topology database","next-hop database"],"c":["LSU database","topology database"],"cat":"Routing & Protocols","e":"Link-state protocols like OSPF use the **topology database** (or Link-State Database, LSDB) to maintain a complete map of the network, built from Link State Advertisements (LSAs) that are distributed and stored as an **LSU database** (Link State Update)."},{"q":"What is the standard Subnet Mask for the IP address 192.168.1.1?","o":["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.128"],"c":"255.255.255.0","cat":"Network Fundamentals & Tools","e":"The address $192.168.1.1$ falls into the Class C range ($192.0.0.0$ to $223.255.255.255$), which has a default subnet mask of **$255.255.255.0$** (or $/24$). This reserves the first three octets for the Network ID."},{"q":"Which IPv4 address class does 172.16.0.1 belong to?","o":["Class A","Class B","Class C","Class D"],"c":"Class B","cat":"Network Fundamentals & Tools","e":"IPv4 Class B-adresser sträcker sig från **128.0.0.0 till 191.255.255.255**. Adressen 172.16.0.1 faller inom detta intervall."},{"q":"Which three options represent information inside an OSPF hello packet that must be agreed upon before neighbor adjacency can be established? (Choose three.)","o":["hello and dead interval","area ID","authentication data","neighbors","router priority","DR and BDR IPv4 addresses"],"c":["hello and dead interval","area ID","authentication data"],"cat":"Routing & Protocols","e":"For two OSPF routers to become neighbors (reach the Two-Way state), their Hello and Dead timers, Area ID, and Authentication data must match."},{"q":"What is the function av en FHRP?","o":["The FHRP supplies hosts med routing information.","The FHRP är ett routing protocol.","The FHRP provides default gateway redundancy.","The FHRP är always standard-based."],"c":"The FHRP provides default gateway redundancy.","cat":"Routing & Protocols","e":"Correct: FHRP (First Hop Redundancy Protocol) like HSRP, VRRP, GLBP, offers a virtual gateway address that multiple devices can share for redundancy. The options:\n- 'supplies hosts with routing information' is wrong - it provides a gateway, not end-to-end routing.\n- 'is ​​a routing protocol' is wrong; it is a redundancy protocol.\n- 'is ​​always standard-based' is flat error; HSRP is proprietary, VRRP is standard, GLBP mixed."},{"q":"Match the OSPF neighbor states on a LAN with their correct positions in the right order.","o":["down : 5","INIT : 1","two-way : 3","exstart : 2","exchange : 6","loading : 4","full : 7"],"c":["down : 5","INIT : 1","two-way : 3","exstart : 2","exchange : 6","loading : 4","full : 7"],"cat":"Routing & Protocols","e":"The correct sequence for OSPF neighbor states is: **Down**, **Init** (received Hello), **Two-Way** (bi-directional communication established), **ExStart** (master/slave chosen), **Exchange** (DBD packets exchanged), **Loading** (LSRs/LSUs exchanged), and **Full** (databases synchronized)."},{"q":"What are the four benefits of IPv6 over IPv4? (Choose four.)","o":["larger address space","smaller address space","complex header","simpler header","mobility","transition richness","TCP and UDP included i basic header"],"c":["larger address space","simpler header","mobility","transition richness"],"cat":"IP Addressing IPv4/Ipv6","e":"IPv6-fördelar inkluderar: **Större adressutrymme** (128-bitars), **Enklare header**-struktur (snabbare bearbetning), inbyggt stöd för **Mobility** (MIPv6) och en mängd olika **Övergångsrikedom**-mekanismer (Dual-stack, Tunnelling, Translation)."},{"q":"Which layer does the core layer interconnect?","o":["access layer switches","access points","distribution layer switches","end point devices"],"c":"distribution layer switches","cat":"Network Fundamentals & Tools","e":"The core layer provides high-speed backbone connectivity and interconnects distribution layer devices."},{"q":"What is YAML commonly used for in automation?","o":["Network diagrams","Configuration files","Firmware updates","Encryption keys"],"c":"Configuration files","cat":"Automation & DevOps","e":"**YAML (YAML Ain't Markup Language)** är ett populärt, mänskligt läsbart serialiseringsspråk som ofta används i DevOps- och nätverksautomationsverktyg (som Ansible) för att lagra **konfigurationsfiler** och definiera datastrukturer."},{"q":"Vilket kommando visar hela Cisco-router-konfigurationen som textfil?","o":["show startup-config","show running-config","show running-config all","show config all"],"c":"show running-config","cat":"Network Fundamentals & Tools","e":"\"show running-config\" shows the current configuration running in RAM."},{"q":"Which of the following is a Class A network address?","o":["10.0.0.1","172.16.0.1","192.168.0.1","224.0.0.1"],"c":"10.0.0.1","cat":"TCP/IP/DNS Protocols","e":"The **Class A** range is $1.0.0.0$ to $126.255.255.255$. The **private** Class A range is **$10.0.0.0/8$** (e.g., $10.0.0.1$). $172.16.0.1$ is Class B private, $192.168.0.1$ is Class C private, and $224.0.0.1$ is Class D multicast."},{"q":"What is the MAC address of the interface that autoconfigures itself to the IPv6 address of fe80::2a3:C2ff:fefc:4a5d?","o":["00:a3:c2:fc:4a:5d","2a:3c:2f:fc:4a:5d","ff:fe:a3:c2:fc:4a","02:a3:c2:ff:fc:4a"],"c":"00:a3:c2:fc:4a:5d","cat":"IP Addressing IPv4/Ipv6","e":"Autoconfiguration uses the modified EUI-64 format: the first 24 bits of the MAC have the U/L bit inverted, 'ff:fe' inserted, and the last 24 bits preserved. The correct MAC here is 00:a3:c2:fc:4a:5d."},{"q":"What is a default route?","o":["0.0.0.0/0","127.0.0.0/8","255.255.255.255/32","::1/128"],"c":"0.0.0.0/0","cat":"TCP/IP/DNS Protocols","e":"The default route is a special route defined by the destination IP address 0.0.0.0 and the subnet mask 0.0.0.0 (or prefix /0). It is used when the router has no specific match for the destination network."},{"q":"How many bits does the subnet mask consist of?","o":["16","24","32","48"],"c":"32","cat":"IP Addressing IPv4/Ipv6","e":"An IPv4 address and its corresponding subnet mask both consist of 32 bits, typically represented in four octets (8 bits each) separated by periods."},{"q":"Which three options are valid representations of the IPv6 address 2001:db8:2bc5:0000:0000:087c:0000:000a? (Choose three.)","o":["2001:db8:2bc5::087c::000a","2001:db8:2bc5::87c:0:a","2001:db8:2bc5::087c:0000:000a","2001:db8:2bc5:0:0:87c::a","2001:db8:2bc5::087c:a"],"c":["2001:db8:2bc5::87c:0:a","2001:db8:2bc5::087c:0000:000a","2001:db8:2bc5::087c:a"],"cat":"IP Addressing IPv4/Ipv6","e":"Regler för IPv6-förkortning:\n1. **Ledande nollor** i en sektion får utelämnas (t.ex. `087c` blir `87c`, `000a` blir `a`, `0000` blir `0`).\n2. En **dubbelkolon (::)** kan ersätta en *enda* sammanhängande sekvens av nollor.\n\nAdresser som är korrekta: `2001:db8:2bc5::87c:0:a`, `2001:db8:2bc5::087c:0000:000a`, `2001:db8:2bc5::087c:a`. Alternativ 1 (`::087c::`) är felaktigt eftersom dubbelkolonen endast får användas en gång."},{"q":"What does the \"reload\" command do on a Cisco router or switch?","o":["It restarts the device","It enters ROMMON mode","It saves the configuration","It updates the IOS firmware"],"c":"It restarts the device","cat":"Network Fundamentals & Tools","e":"The 'reload' command initiates a reboot of the Cisco device, causing it to shut down and then restart, loading the IOS operating system and the startup configuration file."},{"q":"Which risk is posed by operating a switched network with redundant paths?","o":["Layer 2 loops","CRC errors","late collisions","interface input errors"],"c":"Layer 2 loops","cat":"Switching & VLAN","e":"Without a protocol like STP, redundant paths create Layer 2 loops, leading to broadcast storms, MAC table instability, and network failure."},{"q":"What does a switch do when it receives a frame with an unknown destination MAC address?","o":["It drops the frame","It floods the frame out all ports (except the one it came in on)","It sends an ARP request for that MAC address","It forwards the frame to the default gateway"],"c":"It floods the frame out all ports (except the one it came in on)","cat":"Switching & VLAN","e":"If the switch does not find the destination MAC in its MAC address table, it treats the frame as an **unknown unicast** and floods it out all other ports in the same VLAN to ensure the destination, if present, receives it."},{"q":"Which three statements are characteristics of the Enterprise mode of Wi-Fi Protected Access? (Choose three.)","o":["Access control is centralized","Advanced Encryption Standard (AES) is optional for encryption","The authentication server is used for key distribution","Shared secret is used for authentication","Local access control is used"],"c":["Access control is centralized","Advanced Encryption Standard (AES) is optional for encryption","The authentication server is used for key distribution"],"cat":"Wireless","e":"Enterprise WPA uses centralized authentication (via 802.1X/RADIUS) and the authentication server is used for key distribution. It may optionally use AES. Shared secret and local access control are characteristics of Personal mode."},{"q":"Which statement about the Layer 3 EtherChannel is correct?","o":["A Layer 3 port channel interface behaves like a port on a router.","Layer 3 EtherChannel is established between Layer 2 and Layer 3 switches.","Layer 3 EtherChannel can have Layer 2 member interfaces.","Layer 3 EtherChannel is only used on the links towards service providers.","On Layer 3 EtherChannel, you should disable Spanning Tree Protocol."],"c":"A Layer 3 port channel interface behaves like a port on a router.","cat":"Switching & VLAN","e":"When an EtherChannel is configured as **Layer 3**, the logical **Port Channel interface** is treated as a single routed port, allowing it to be configured with an IP address and participate in routing protocols, much like a physical router interface."},{"q":"How many valid host addresses are available for each subnet after subnetting network 192.168.0.0/24 by borrowing two host bits?","o":["62","4094","8190","16382"],"c":"62","cat":"IP Addressing IPv4/Ipv6","e":"Borrowing 2 bits leaves 6 host bits (8-2=6). The number of valid hosts is calculated as $2^6 - 2 = 64 - 2 = 62$."},{"q":"Host A with an IPv4 address 192.168.99.15/24 wants to send several packets to several destination IPv4 addresses listed here. Which address requires the use of a default gateway?","o":["192.168.99.17/24","192.168.40.39/24","192.168.99.39/24","192.168.99.167/24"],"c":"192.168.40.39/24","cat":"Routing & Protocols","e":"Host A is on the **$192.168.99.0/24$** network. The address **$192.168.40.39/24$** belongs to the **$192.168.40.0/24$** network. Since the destination is on a **different network**, the host must send the packet to its **default gateway** for routing."},{"q":"Which protocol is an example of an interior gateway protocol (IGP)?","o":["BGP","OSPF","RIP","EIGRP"],"c":"OSPF","cat":"Routing & Protocols","e":"Open Shortest Path First (OSPF) is a common IGP protocol for internal network routing."},{"q":"Which layer of the OSI model is responsible for encryption and decryption?","o":["Lager 5","Lager 6","Lager 7","Lager 4"],"c":"Lager 6","cat":"OSI Model","e":"**Presentationslagret (Layer 6)** är ansvarigt för datarepresentation, inklusive **kryptering** och dekryptering, komprimering och dataformatkonvertering, så att applikationslagret kan hantera en konsekvent datastruktur."},{"q":"Which command shows the number of BGP updates that have been sent and received?","o":["show ip bgp statistics","show ip bgp summary","show ip bgp neighbors","show ip route bgp"],"c":"show ip bgp summary","cat":"Routing & Protocols","e":"\"show ip bgp summary\" visar statistik inklusive antal skickade/mottagna BGP-uppdateringar."},{"q":"What is the main characteristic of DNS?","o":["automatically assigning an IP address from an IP address pool that the administrator defines","automatically assigning a domain name from a domain name pool that the administrator defines","converting human-readable names of IP end systems into machine-readable IP addresses","forwarding DHCP packets between clients and servers"],"c":"converting human-readable names of IP end systems into machine-readable IP addresses","cat":"TCP/IP/DNS Protocols","e":"**DNS (Domain Name System)** is used to translate domain names (e.g., website addresses) into numerical IP addresses, which are necessary for routing."},{"q":"You are tasked with installing and configuring a new PoE-supported IP camera with a power consumption of 20 W. After connecting it to a PoE-enabled switch, the camera does not turn on. What is the likely cause of the problem?","o":["The cable connecting the switch and the camera is too long.","The camera requires additional configuration to work with PoE.","The switch does not support the PoE Plus standard.","The switch requires additional configuration to enable PoE on the interface."],"c":"The switch does not support the PoE Plus standard.","cat":"Switching & VLAN","e":"Standard PoE (802.3af) delivers up to 15.4W. PoE+ (802.3at) delivers up to 30W. A camera requiring 20W exceeds the 15.4W limit of standard PoE. Therefore, the switch must support the PoE Plus (802.3at) standard for the camera to power on."},{"q":"What is the length of a MAC address used in Ethernet networks?","o":["32 bits","48 bits","64 bits","128 bits"],"c":"48 bits","cat":"Switching & VLAN","e":"Ethernet MAC addresses are 48 bits (6 bytes) long, typically displayed as 12 hexadecimal digits. (32 bits is an IPv4 address length, 128 bits is IPv6 length.)"},{"q":"What are the three tasks of an Intrusion Prevention System (IPS)? (Choose three.)","o":["blocking suspicious activity","logging suspicious activity","reporting suspicious activity","inspecting packets only","tracing all traffic"],"c":["blocking suspicious activity","logging suspicious activity","reporting suspicious activity"],"cat":"Security AAA & ACL","e":"An IPS inspects traffic, logs suspicious activity, and can actively block malicious behavior. Reporting is included; inspecting and tracing are not considered primary tasks of IPS."},{"q":"Which command enables you to configure the parameters for the console access?","o":["line console 0","line console","login console 0","login console"],"c":"line console 0","cat":"Network Fundamentals & Tools","e":"In Cisco IOS, the command `line console 0` enters the configuration mode for the console port, where settings like passwords and terminal parameters are applied."},{"q":"Which IPv4 address is considered a private address according to RFC 1918?","o":["8.8.8.8","10.0.0.1","172.32.0.1","192.0.2.1"],"c":"10.0.0.1","cat":"Network Fundamentals & Tools","e":"The private IP address ranges defined in **RFC 1918** are: **$10.0.0.0/8$** (Class A), $172.16.0.0/12$ (Class B), and $192.168.0.0/16$ (Class C). $10.0.0.1$ falls within the Class A private range."},{"q":"What is DevOps CI/CD?","o":["Continuous Integration/Continuous Deployment","Cisco Interface/Cisco Device","Configurable Interface/Command Design","Cybersecurity Incident/Cyber Defense"],"c":"Continuous Integration/Continuous Deployment","cat":"Automation & DevOps","e":"CI/CD is a DevOps practice for automated code integration and deployment."},{"q":"What is the main purpose of Spanning Tree Protocol (STP)?","o":["Prevent Layer 2 loops","Prevent broadcast storms","Encrypt traffic","Manage VLANs"],"c":"Prevent broadcast storms","cat":"Network Fundamentals & Tools","e":"The Spanning Tree Protocol (STP) is used to prevent network loops and broadcast storms in Ethernet networks that contain redundant paths. Without STP, when a network has multiple switches and redundant connections between them, it can cause broadcast packets to circulate indefinitely, creating a loop. This results in network congestion, degraded performance, and potential network outages."},{"q":"What does the term 'phishing' refer to?","o":["A type of attack where attackers attempt to obtain sensitive information by impersonating legitimate sources","An attack where the attacker gains unauthorized access to a network","A technique to bypass firewalls","A tool to detect malware"],"c":"A type of attack where attackers attempt to obtain sensitive information by impersonating legitimate sources","cat":"Security AAA & ACL","e":"Phishing is a social engineering attack where attackers impersonate legitimate entities to deceive users into revealing sensitive information such as passwords or credit card numbers."},{"q":"Which three represent common vectors that can inflict data loss and exfiltration regarding unauthorized transfer of company data? (Choose three.)","o":["monitoring systems","database servers","removable storage devices","fixed storage devices","cloud storage services","email attachments"],"c":["removable storage devices","cloud storage services","email attachments"],"cat":"Security AAA & ACL","e":"Dessa tre representerar vanliga sätt som data kan flyttas ut från ett företagsnätverk av obehöriga användare. **Data Loss Prevention (DLP)**-system övervakar och blockerar exfiltrering via dessa vektorer."},{"q":"An enterprise wants to provide a global service that would be provided from an enterprise resource nearest to the user. For which three reasons does the enterprise choose to assign anycast IPv6 addresses to the relevant devices? (Choose three.)","o":["Because all the devices configured with the IPv6 anycast address would be aware of the user session.","Because IPv6 anycast addresses are globally routable.","Because routing of IPv6 anycast addresses is more secure than routing other IPv6 address types.","Because routing tables will point to the nearest resource configured with the IPv6 anycast address.","Because using IPv6 anycast addresses provides automatic failover."],"c":["Because IPv6 anycast addresses are globally routable.","Because routing tables will point to the nearest resource configured with the IPv6 anycast address.","Because using IPv6 anycast addresses provides automatic failover."],"cat":"IP Addressing IPv4/Ipv6","e":"Anycasting routes traffic to the topologically closest host advertising that address, providing nearest service delivery and inherent redundancy (failover) if one instance stops advertising the route. Anycast addresses are globally routable."},{"q":"Which option indicates errors, such as collisions, during the transmission of a frame?","o":["input queue drops","output queue drops","input errors","output errors"],"c":"input errors","cat":"Network Fundamentals & Tools","e":"**`input errors`** (or receive errors) is a counter that increments when an interface receives frames that are corrupted (e.g., CRC errors), too large, too small, or result from collisions on a shared segment."},{"q":"Which two types of cables can be used to connect to the console port of a Cisco router? (Choose two.)","o":["Crossover","Rollover","Serial","Straight-through","USB"],"c":["Rollover","USB"],"cat":"Network Fundamentals & Tools","e":"The **Rollover** cable (often blue and RJ-45 to DB-9) is the traditional physical console cable. Modern Cisco devices often include a **USB** console port for connectivity via a standard USB-A to USB-B Mini or Micro cable."},{"q":"In network design, can you include physical loops between switches?","o":["Yes, to provide redundancy.","No, you should never include physical loops.","Yes, to provide better scalability.","No, you should first disable STP"],"c":"Yes, to provide redundancy.","cat":"Switching & VLAN","e":"Physical loops are intentionally included in switched network design to provide **redundancy** (alternate paths) in case of link failure. **Spanning Tree Protocol (STP)** is then enabled to logically block the redundant path to prevent Layer 2 broadcast storms."},{"q":"Which statement describes a router-on-a-stick configuration correctly?","o":["Router on a stick is a term used to describe a router and switch connected using one port configured as a stick interface.","Router on a stick is a type of router configuration in which a single physical interface routes the traffic among a single VLAN on a network.","Router on a stick is a type of router configuration in which a single physical interface routes the traffic among multiple VLANs on a network.","Router on a stick is a term frequently used to describe a setup up that consists of a router and 3 switches that are connected using 3 Ethernet links."],"c":"Router on a stick is a type of router configuration in which a single physical interface routes the traffic among multiple VLANs on a network.","cat":"Switching & VLAN","e":"The key characteristic of router-on-a-stick is the use of a single physical router interface to service multiple VLANs via logical subinterfaces."},{"q":"Which three statements are primary attributes of next-generation programmatic interfaces?","o":["They must support different types of transport: HTTP, SSH, and TLS.","They must be flexible and support different types of encoding formats, such as TCL and Python.","They must support different types of transport: HTTPS, Telnet, and TCP.","There must be extensible and open APIs: REST, RESTCONF, NETCONF, and gRPC.","They must be flexible and support different types of encoding formats, such as XML and JSON.","They must be proprietary and under strict license agreements."],"c":["They must support different types of transport: HTTP, SSH, and TLS.","There must be extensible and open APIs: REST, RESTCONF, NETCONF, and gRPC.","They must be flexible and support different types of encoding formats, such as XML and JSON."],"cat":"Automation & DevOps","e":"Modern programmatic interfaces require open, well-defined APIs (like NETCONF/RESTCONF), support secure and flexible transport protocols, and handle structured data formats like XML and JSON for easy machine processing."},{"q":"You are asked to design a small LAN. You decide to follow the three-tier architecture model, and your goal is to build a secure network. Which statement is true?","o":["Security features should be implemented only in the distribution layer devices.","Security features should be implemented only in the core layer devices.","Security features should be implemented in the distribution and core layer devices.","Security features should be implemented in all three layers, access, distribution and core.","Security features should be implemented only in the access layer devices.","Security features should be implemented in the access and distribution layer devices."],"c":"Security features should be implemented in the access and distribution layer devices.","cat":"Network Fundamentals & Tools","e":"In many practical three-tier network designs, particularly in smaller LANs, the **Access** and **Distribution** layers are the primary points for implementing security policies. The Access layer provides device-level security (e.g., 802.1X, Port Security), while the Distribution layer acts as the aggregation point and policy enforcement boundary (e.g., ACLs, inter-VLAN filtering). The Core layer is typically reserved for high-speed switching with minimal or no policy processing."},{"q":"A customer would like to lease a data center from your company for their new video game development. Which service should you offer to your customer?","o":["PaaS","SaaS","IaaS","FaaS"],"c":"PaaS","cat":"WAN & SDN/Virtualization","e":"PaaS (Platform as a Service) provides a complete development and deployment environment without the complexity of managing the infrastructure. If the customer primarily needs a platform, tools, and necessary services for game development (like specialized databases, build tools, or scaling services) rather than raw infrastructure access (IaaS), then PaaS is the intended choice."},{"q":"How do you access the console of a network device that is part of a simulation in Cisco Modeling Labs?","o":["Add a Desktop node to a simulation and connect a console cable from it to the serial port on the node.","Install the Cisco Modeling Labs console tool for accessing device consoles.","Cisco Modeling Labs does not support console connections to network devices.","The console can be accessed directly from the Cisco Modeling Labs GUI."],"c":"The console can be accessed directly from the Cisco Modeling Labs GUI.","cat":"Network Fundamentals & Tools","e":"In Cisco Modeling Labs (CML), once a simulation is running, the console of any network device (router, switch, firewall, etc.) can be opened directly by clicking on the node in the topology and selecting the 'Console' option from the menu, which is presented within the CML GUI (Web User Interface)."},{"q":"Which feature is critical to correctly implement a router on a stick?","o":["router subinterfaces that are each configured with a dot1q VLAN tag","router subinterfaces that are configured with an ISL trunk.","router interfaces that are tagged with multiple dot1q VLAN tags","router interfaces that are configured to be a trunk"],"c":"router subinterfaces that are each configured with a dot1q VLAN tag","cat":"Switching & VLAN","e":"Router-on-a-stick requires the physical router interface to be split into logical subinterfaces, with each subinterface configured with the 802.1Q encapsulation command for a specific VLAN ID."},{"q":"Assume that you have just created a VLAN 10 on a switch. Which command should you use to verify if the VLAN was created?","o":["show virtual lan","show vlan id 100","show vlan brief","show virtual lan id 10","show interface Ethernet0/0 switchport"],"c":"show vlan brief","cat":"Switching & VLAN","e":"The 'show vlan brief' command provides a quick summary of all configured VLANs, their names, and which ports are assigned to them."},{"q":"Which three mechanisms are used to extend the lifetime and usefulness of IPv4? (Choose three.)","o":["CIDR","VLSM","NAT","DNS","IPv5","IPv6"],"c":["CIDR","VLSM","NAT"],"cat":"IP Addressing IPv4/Ipv6","e":"CIDR and VLSM conserve addresses. NAT allows private addresses to use a limited number of public addresses. IPv6 is the successor protocol, not an extension mechanism."},{"q":"Which three options are advantages of NAT? (Choose three.)","o":["provides consistency for internal network addressing schemes","affects End-to-end functionality","disrupts End-to-end IPv4 traceability","makes tunneling more complicated","increases the flexibility of connections to the public network","conserves public addresses","disrupts TCP connections initiated from the outside"],"c":["provides consistency for internal network addressing schemes","increases the flexibility of connections to the public network","conserves public addresses"],"cat":"WAN & SDN/Virtualization","e":"NAT (Network Address Translation) was initially created to **conserve the diminishing supply of public IPv4 addresses** (the most significant advantage). It also **increases flexibility** by allowing organizations to easily change public service providers without renumbering the internal network, and **provides consistency** for the internal private addressing scheme, as the internal network is decoupled from the external addressing requirements. The other options describe the **drawbacks** of NAT."},{"q":"What is the main difference between generative and predictive AI?","o":["Predictive AI analyzes past and current data to forecast future events or behaviors, while generative AI creates new content or data by learning from existing data sets.","Generative AI leverages statistical models to analyze past data, while predictive AI uses machine learning techniques to mimic the characteristics of training data.","Generative AI is based on VAE, while predictive AI is based on GANs.","Generative AI is exclusively used for network performance optimizations, while predictive AI is used for content creation like generating images or text."],"c":"Predictive AI analyzes past and current data to forecast future events or behaviors, while generative AI creates new content or data by learning from existing data sets.","cat":"AI & Machine Learning","e":"Predictive AI forecasts outcomes (e.g., classifying an image, predicting fraud). Generative AI creates new content (e.g., text, images, code) that resembles the training data."},{"q":"What happens when you start the lab topology in Cisco Modeling Labs?","o":["VM instances with real operating systems are created.","Basic network simulation without full data plane functionality is initiated.","Cisco Modeling Labs connects to the physical devices in your network and allows you to interact with them.","Cisco Modeling Labs starts monitoring the user traffic in your network."],"c":"VM instances with real operating systems are created.","cat":"Network Fundamentals & Tools","e":"CML is an emulation tool. When a lab is started, it boots virtual machine (VM) instances that run actual Cisco operating systems (IOS, NX-OS, etc.), providing full data plane functionality."},{"q":"Which ISO OSI layer ensures that the application layer of the receiving system will be able to read the information that the application layer of another system has sent?","o":["transport layer","presentation layer","session layer","network layer"],"c":"presentation layer","cat":"OSI Model","e":"The Presentation Layer (L6) handles data formatting, encryption, and conversion, ensuring the receiving application can read the information."},{"q":"The exhibit shows a MAC address table of a switch. The switch receives a frame from the device with the MAC address of 00e0.b048.11da. The destination MAC address of the frame is not in the switch MAC address table. What will the switch do with the frame?","o":["It will discard the frame.","It will flood the frame out all active ports on the same VLAN except the one it is received on.","It will forward the frame out of the Fa0/1 port.","It will forward the frame out of the Fa0/2 port."],"c":"It will flood the frame out all active ports on the same VLAN except the one it is received on.","cat":"Switching & VLAN","e":"When a switch receives a frame with an unknown destination MAC address, it floods the frame out of all ports belonging to the same VLAN, except the port it was received on (ingress port). This process is known as 'Unknown Unicast Flooding' and is necessary to locate the destination device."},{"q":"Which troubleshooting step would you take if you wanted to check the IPv4 stack on your own device?","o":["Ping the loopback address.","Ping the local host.","Ping the default gateway.","Ping the remote server."],"c":"Ping the loopback address.","cat":"Network Fundamentals & Tools","e":"Pinging the loopback address (127.0.0.1) confirms that the local TCP/IP stack is functioning correctly without involving the network interface card or the physical network."},{"q":"What is the maximum transmission speed of Gigabit Ethernet?","o":["100 Mbps","1 Gbps","10 Gbps","100 Gbps"],"c":"1 Gbps","cat":"Switching & VLAN","e":"**Gigabit Ethernet** (formally $1000\text{BASE}-T$ for copper) has a maximum nominal data rate of $1,000\text{ Mbps}$, which is equivalent to **$1 \text{ Gbps}$**."},{"q":"What are the two defining characteristics of a LAN? (Choose two.)","o":["higher data transfer rates in contrast to WAN","lower data transfer rates in contrast to WAN","smaller geographic area in contrast to WAN","larger geographic area in contrast to WAN","need for leased telecommunication lines"],"c":["higher data transfer rates in contrast to WAN","smaller geographic area in contrast to WAN"],"cat":"Network Fundamentals & Tools","e":"LANs typically offer higher data transfer rates than WANs and cover a much smaller geographic area (e.g., a building or campus)."},{"q":"What is the advantage that subnetworks provide?","o":["scalability","reachability","redundancy","load balancing"],"c":"scalability","cat":"IP Addressing IPv4/Ipv6","e":"**Subnetting** allows a larger network address space to be broken down into smaller, manageable, and more efficient network segments. This hierarchical division greatly improves the **scalability** and organization of a network."},{"q":"In order to allow SNMP traffic to flow throughout the network, which two communication scenarios must be allowed? (Choose two.)","o":["TCP to port 161","TCP to port 162","UDP and TCP to port 161","UDP and TCP to port 162","UDP to port 161","UDP to port 162"],"c":["UDP to port 161","UDP to port 162"],"cat":"TCP/IP/DNS Protocols","e":"SNMP (Simple Network Management Protocol) uses UDP (User Datagram Protocol) for all communication. Port 161 is used for standard requests (Manager to Agent), and Port 162 is used for traps and informs (Agent to Manager)."},{"q":"Which statement correctly describes the role of a router?","o":["Routers are responsible only for reaching hosts that are in the local network.","Routers use a MAC table to route between networks.","Routers are required to reach hosts that are not in the local network.","Routers use an ARP table to route between networks."],"c":"Routers are required to reach hosts that are not in the local network.","cat":"Routing & Protocols","e":"Routers operate at Layer 3 (Network Layer) and are required to forward packets **between** different networks (subnets). Hosts in the local network communicate via Layer 2 devices (switches)."},{"q":"Which two parameters can be used for metric calculations? (Choose two.)","o":["IP Address","Hop count","Link Up/Downtime","Bandwidth","Default Route","Local Routes"],"c":["Hop count","Bandwidth"],"cat":"Routing & Protocols","e":"Routing protocols use metrics to determine the best path. Simple protocols like RIP use **Hop Count**. Advanced protocols like OSPF and EIGRP use metrics based on **Bandwidth** and Delay (among others)."},{"q":"Which three commands should you use to configure data and voice VLAN on the same interface? (Choose three.)","o":["Switch(config-if)# switchport access vlan 2","Switch(config-if)# switchport data vlan 2","Switch(config-if)# switchport mode access","Switch(config-if)# switchport mode trunk","Switch(config-if)# switchport trunk allowed vlan 2,3","Switch(config-if)# switchport voice vlan 3"],"c":["Switch(config-if)# switchport access vlan 2","Switch(config-if)# switchport mode access","Switch(config-if)# switchport voice vlan 3"],"cat":"Switching & VLAN","e":"To configure a port for both data and voice traffic (a typical setup for IP phones), you must set the port to access mode, define the data VLAN (access vlan), and define the voice VLAN (voice vlan). The 'switchport data vlan' is an equivalent to 'switchport access vlan' in many contexts, but 'access vlan' is the primary command for data traffic."},{"q":"Which layer of the OSI model is responsible for translating logical addresses to physical addresses?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"c":"Layer 2","cat":"OSI Model","e":"The **Data Link Layer (Layer 2)**, through protocols like ARP, performs the resolution of logical addresses (IP) to physical addresses (MAC) in preparation for frame transmission on the local segment."},{"q":"Which Cisco IOS command displays the services that are running by viewing its open ports?","o":["show running-config","show ip interface brief","show service","show tcp brief"],"c":"show tcp brief","cat":"Network Fundamentals & Tools","e":"The 'show tcp brief' command displays the status of TCP connections and listening ports on the device. This allows you to see which TCP ports are currently open and being used by services."},{"q":"Which algorithm is used to calculate the optimal path to a given destination from data stored in a link-state database (LSDB)?","o":["Rivest, Shamir, and Adleman (RSA)","Secure Hash Algorithm (SHA)","Shortest Path First (SPF)","Quicksort"],"c":"Shortest Path First (SPF)","cat":"Routing & Protocols","e":"Link-state routing protocols like OSPF use Dijkstra's algorithm, commonly referred to as the **Shortest Path First (SPF)** algorithm, to analyze the LSDB and compute the shortest, loop-free path to every network destination."},{"q":"Which command on a Cisco router displays the ARP table?","o":["show arp","show mac address-table","show ip route","show ip interface brief"],"c":"show arp","cat":"Network Fundamentals & Tools","e":"\"show arp\" shows the ARP table with IP to MAC address translations."},{"q":"Which three steps need to be taken to identify network traffic? (Choose three.)","o":["Perform network audit.","Perform business audit.","Perform service levels review.","Define mission critical class.","Choose congestion avoidance technique.","Choose congestion management technique."],"c":["Perform network audit.","Perform business audit.","Define mission critical class."],"cat":"Network Fundamentals & Tools","e":"Before implementing QoS techniques (like congestion avoidance), you must first perform audits to understand existing traffic patterns (Network Audit), align traffic prioritization with business needs (Business Audit), and categorize application traffic (Define Mission Critical Class)."},{"q":"What is the purpose of an IDS (Intrusion Detection System)?","o":["To detect unauthorized network access and report potential security threats","To block unauthorized network access","To encrypt network traffic","To monitor network performance"],"c":"To detect unauthorized network access and report potential security threats","cat":"Security AAA & ACL","e":"An IDS is used to monitor network traffic for suspicious activity and alert administrators of potential security threats."},{"q":"What does the term 'Broadcast Storm' refer to?","o":["Excessive traffic caused by a large number of devices sending broadcast packets","A type of denial-of-service (DoS) attack","A network failure due to a hardware malfunction","An issue caused by the incorrect configuration of static routes"],"c":"Excessive traffic caused by a large number of devices sending broadcast packets","cat":"Network Fundamentals & Tools","e":"En **Broadcast Storm** är ett tillstånd där överdriven broadcast-trafik loopar oändligt i nätverket (ofta på grund av lager 2-loopar utan STP), vilket konsumerar all tillgänglig bandbredd och gör nätverket oanvändbart."},{"q":"Which two options represent when OSPF routing protocol sends LSAs? (Choose two.)","o":["periodically every 30 minutes","on topology change","periodically every 30 seconds","periodically every 60 minutes","periodically every 60 seconds"],"c":["periodically every 30 minutes","on topology change"],"cat":"Routing & Protocols","e":"OSPF är ett händelsedrivet protokoll som skickar Link-State Advertisements (LSAs) omedelbart **vid topologiförändring**. Dessutom uppdateras LSAs periodiskt **var 30:e minut** (1800 sekunder) för att säkerställa att databasen förblir synkroniserad, även om inga förändringar har inträffat."},{"q":"Which type of cable is used to directly connect two computers without a switch?","o":["Rakt-kabel","Kryssad kabel","Coaxialkabel","Fiberoptisk kabel"],"c":"Kryssad kabel","cat":"Switching & VLAN","e":"A crossover Ethernet cable is used for direct connection between two similar devices, such as computers."},{"q":"How does Unicast Reverse Path Forwarding help with DoS and DDoS attacks mitigation?","o":["by distributing the footprint of DDoS attacks","by verifying the \"reachability\" of the source address in packets being forwarded","by monitoring connection states and maintaining a state table","by monitoring interface packet counters"],"c":"by verifying the \"reachability\" of the source address in packets being forwarded","cat":"Security AAA & ACL","e":""},{"q":"When an access point (AP) is operating in local mode, on which network device is wireless client traffic switched?","o":["on a network switch","on a wireless access controller (WLC)","on the egress AP","on the ingress AP"],"c":"on a network switch","cat":"Wireless","e":"In local mode, APs forward all client traffic to the switch, which then routes it."},{"q":"Which OSI model layer is responsible for physical cables and electrical signals?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"c":"Layer 1","cat":"OSI Model","e":"The **Physical Layer (Layer 1)** is responsible for the physical transmission medium (cables), connectors, and the electrical, mechanical, or optical signaling used to transmit raw data bits."},{"q":"What is the main purpose of NAT (Network Address Translation) in networking?","o":["To allow multiple devices on a LAN to share a single public IP address","To translate domain names to IP addresses","To automatically assign IP addresses to hosts","To encrypt traffic over the internet"],"c":"To allow multiple devices on a LAN to share a single public IP address","cat":"IP Addressing IPv4/Ipv6","e":"NAT allows many devices with private IP addresses to access the Internet by sharing one (or a few) public IP addresses. It works by translating the private IPs to the public IP on outgoing traffic. It doesn't assign IPs (DHCP does that) or translate domain names (DNS does that)."},{"q":"Which statement about Machine Learning (ML) is correct?","o":["ML is a subset of AI that focuses on the development of algorithms and statistical models that enable computers to learn and make decisions based on data.","ML is a broad term encompassing various technologies aimed at creating machines capable of performing tasks that typically require human-like intelligence.","ML is synonymous to AI.","ML techniques cannot be used to train AI systems."],"c":"ML is a subset of AI that focuses on the development of algorithms and statistical models that enable computers to learn and make decisions based on data.","cat":"AI & Machine Learning","e":"Artificial Intelligence (AI) is the broad field of creating intelligent machines. Machine Learning (ML) is a subset of AI, focused on algorithms that allow systems to learn from data without explicit programming."},{"q":"Which network characteristic indicates the dependability of components that make up the network?","o":["reliability","scalability","security","availability"],"c":"reliability","cat":"Network Fundamentals & Tools","e":"Correct: 'Reliability' refers to how reliable network components are over time without failure. The options:\n- 'Scalability' refers to how well the network can be enlarged.\n- 'Security' refers to protection against attacks.\n- 'Availability' refers to uptime, but 'reliability' specifically points to the failure and recovery capabilities of components."},{"q":"Which layer in the OSI model is responsible for error detection and flow control at the data link layer?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"c":"Layer 2","cat":"OSI Model","e":"The **Data Link Layer (Layer 2)** uses the Logical Link Control (LLC) sublayer for flow control and the Media Access Control (MAC) sublayer for frame error detection via checksums."},{"q":"Which Cisco SD-WAN component facilitates fabric discovery and implements control plane policies?","o":["vBond","vManage","vSmart","WAN Edge"],"c":"vSmart","cat":"WAN & SDN/Virtualization","e":"The vSmart controller establishes the control plane, facilitates network discovery (through vBond), and distributes routing information and centralized control policies to the WAN Edge routers."},{"q":"When using the modified EUI-64 format to create the interface ID of an IPv6 unicast address, which two portions of the Ethernet MAC are used unchanged? (Choose two.)","o":["Organizational Unique Identifier (OUI) octets","network interface card (NIC) specific octets","the universal/local bit","the unicast/multicast bit","the protocol type octet"],"c":["network interface card (NIC) specific octets","the unicast/multicast bit"],"cat":"IP Addressing IPv4/Ipv6","e":"In EUI-64, the 48-bit MAC is split, and 'FFFE' is inserted. The **NIC-specific octets (the last 24 bits of the MAC)** are used directly. The **universal/local bit** (the seventh bit of the MAC's first octet) is **inverted**, meaning the OUI octets **are changed**. The **unicast/multicast bit** (the eighth bit of the MAC's first octet) is used as part of the OUI but is not typically considered separately in this context, the entire 24-bit NIC portion is used unchanged."},{"q":"Which two characteristics apply to small office/home office (SOHO) routers? (Choose two.)","o":["They are more expensive than enterprise routers.","They are more reliable than enterprise routers.","They have a web-based administration interface.","They have integrated security functionality.","They perform intensive routing tasks."],"c":["They have a web-based administration interface.","They have integrated security functionality."],"cat":"Network Fundamentals & Tools","e":"SOHO-routrar är designade för enkel användning av icke-tekniska användare, vilket kräver ett enkelt **webbaserat GUI**. De integrerar också grundläggande nätverks- och **säkerhetsfunktioner** (NAT, enkel brandvägg) i en enda enhet."},{"q":"What subnet mask corresponds to a /24 network?","o":["255.255.255.0","255.255.0.0","255.0.0.0","255.255.255.128"],"c":"255.255.255.0","cat":"IP Addressing IPv4/Ipv6","e":"/24 means that the first 24 bits are the network part, which corresponds to 255.255.255.0."},{"q":"What is the default port for HTTPS?","o":["80","443","21","22"],"c":"443","cat":"TCP/IP/DNS Protocols","e":"**HTTPS** (HTTP Secure) använder **TCP-port 443** som standard, eftersom den lägger till SSL/TLS-kryptering ovanpå HTTP."}],"cisco8":[{"q":"What is the purpose of the metric parameter of a route?","o":["It binds a numeric value to the path to a network.","It identifies the next hop IP to reach the destination network.","It identifies the subnet mask of the remote network.","It tells us how many routers the packet must pass through."],"c":"It binds a numeric value to the path to a network.","cat":"Routing & Protocols","e":"Korrekt: **Metric** anger ett numeriskt värde som används för att rangordna flera möjliga vägar till ett nätverk — lägre värde indikerar en mer önskvärd väg.\nFelaktiga alternativ:\n- **Next hop IP** är en separat parameter som anger nästa router på vägen.\n- **Subnet mask** beskriver nätverkets storlek, inte dess prioritet.\n- **Antal routers** kan användas som en del av vissa metriker (t.ex. hop count i RIP), men metrikens syfte är bredare: att representera kostnaden för vägen oavsett mätmetod."},{"q":"How many bits long is an IPv6 address?","o":["32 bits","64 bits","128 bits","256 bits"],"c":"128 bits","cat":"IP Addressing IPv4/Ipv6","e":"An **IPv6 address** is **128 bits** long (16 bytes), providing an exponentially larger address space than IPv4's 32-bit addresses."},{"q":"What are two characteristics of a pre-shared key wireless implementation? (Choose two.)","o":["Access control is centralized.","An authentication server is required.","Encryption uses an optional Advanced Encryption Standard (AES).","Encryption uses the Temporal Key Integrity Protocol (TKIP).","The authentication key is rotated automatically."],"c":["Encryption uses an optional Advanced Encryption Standard (AES).","Encryption uses the Temporal Key Integrity Protocol (TKIP)."],"cat":"Wireless","e":"PSK (Pre-Shared Key) mode, also known as WPA/WPA2 Personal, uses a static passphrase for authentication. The two valid encryption mechanisms associated with this mode are:\n\n1.  **AES (Advanced Encryption Standard):** This is the modern and highly secure cipher used by WPA2 and WPA3. Its use is often preferred.\n2.  **TKIP (Temporal Key Integrity Protocol):** This is the older, less secure cipher associated with the original WPA (WPA1) but is commonly supported in WPA2 implementations for backward compatibility.\n\nPSK does not use centralized access control and does not require an external authentication server (like RADIUS)."},{"q":"What is the name typically used to describe virtualization software?","o":["container","distributed resource scheduler (DRS)","hypervisor","HyperFlex","snapshot manager"],"c":"hypervisor","cat":"Network Fundamentals & Tools","e":"A hypervisor is the specific software or firmware that creates and runs virtual machines (VMs). It allows multiple operating systems to share a single physical hardware platform."},{"q":"Which three security services does the Counter Mode with Cipher Block Chaining Message Authentication Code Protocol (CCMP) provide? (Choose three.)","o":["access control","authentication","authorization","data confidentiality","data redundancy"],"c":["data confidentiality","authentication","access control"],"cat":"Wireless","e":"CCMP is the mandated encryption protocol for WPA2 and WPA3. While its core functions are Data Confidentiality and Data Integrity, based on the options provided, the three services it supports within the 802.11i standard framework are:\n\n1.  **Data Confidentiality:** Provided by the AES encryption.\n2.  **Authentication:** Provided by the Message Authentication Code (MAC) check, which verifies the data source and ensures the message is not forged.\n3.  **Access Control:** CCMP is the mechanism that enforces the session security after the initial 802.1X/PSK handshake, thereby controlling access to the network resources."},{"q":"Presume that there are multiple paths to a given destination network. Which of the following does a dynamic routing protocol use to determine which route to the destination network is best?","o":["administrative distance","metrics","parameters","variables"],"c":"metrics","cat":"Routing & Protocols","e":"A dynamic routing protocol uses a **metric** to calculate the most efficient or 'best' path to a given destination when multiple routes are available **within that same routing protocol**. The metric is a quantifiable value representing the cost of a route. Different protocols use different metrics:\n\n* **OSPF** uses **Cost** (based on bandwidth).\n* **EIGRP** uses a complex calculation involving **Bandwidth** and **Delay**.\n* **RIP** uses **Hop Count**.\n\nThe route with the lowest metric is considered the best path and is installed in the routing table. **Administrative Distance** is only used when comparing routes learned from *different* routing sources."},{"q":"On a Cisco device, what is the default destination for syslog logging messages?","o":["console line","logging buffer","syslog server","terminal lines"],"c":"console line","cat":"Network Fundamentals & Tools","e":"By default, Cisco IOS is configured to send all generated syslog messages (which include error, warning, and informational events) directly to the **console line**. This allows an administrator who is physically connected to the device's console port to immediately see diagnostic and event messages. For enterprise management and persistent storage, administrators must manually configure additional destinations, such as the `logging buffer` (RAM) or a remote `syslog server` (logging host)."},{"q":"Which device in a centralized wireless solution associates the SSID with a VLAN?","o":["AP","Cisco WLC","access switch","wireless client"],"c":"Cisco WLC","cat":"Wireless","e":""},{"q":"Where within an enterprise network should classification and marking and policing be performed?","o":["core layer","in end hosts","access layer","distribution layer"],"c":"access layer","cat":"Network Fundamentals & Tools","e":"Classification and marking should be performed as close to the traffic source as possible, typically at the **Access Layer** switches, to ensure the marking is done accurately before congestion potentially occurs deeper in the network. Policing should also be done here to enforce traffic rates immediately."},{"q":"Which two aspects can present a problem with a flat network design? (Choose two.)","o":["Larger amounts of broadcast traffic consume resources.","All devices share the same broadcast domain.","The domain relies on IP addresses for packet delivery.","Larger amounts of multicast traffic consume resources.","All PCs share the same broadcast domain."],"c":["Larger amounts of broadcast traffic consume resources.","All devices share the same broadcast domain."],"cat":"Network Fundamentals & Tools","e":"Flat networks lack segmentation, so broadcast traffic is forwarded to all devices and can consume bandwidth and CPU. Because all devices are in the same broadcast domain, scalability and security are reduced."},{"q":"What is the default port for FTP?","o":["20 and 21","22","23","25"],"c":"20 and 21","cat":"TCP/IP/DNS Protocols","e":"FTP uses port 21 for the control channel and port 20 for data transfer by default."},{"q":"Match the correct description about the line and protocol status with the appropriate condition.","o":["Interface is in shutdown condition :  Serial0/0/0 is up and line protocol is up.","Interface is in no shutdown condition but cable is not connected to the Ethernet interface : Ethernet0/0 is down and line protocol is down","Cable is connected to the interface and placed in no shutdown condition but encapsulation mismatch is encountered on the link : Ethernet0/0 is administratively down and line protocol is down","Interface is functioning well with no issues. : Serial0/0/0 is up and line protocol is down"],"c":["Interface is in shutdown condition :  Serial0/0/0 is up and line protocol is up.","Interface is in no shutdown condition but cable is not connected to the Ethernet interface : Ethernet0/0 is down and line protocol is down","Cable is connected to the interface and placed in no shutdown condition but encapsulation mismatch is encountered on the link : Ethernet0/0 is administratively down and line protocol is down","Interface is functioning well with no issues. : Serial0/0/0 is up and line protocol is down"],"cat":"Network Fundamentals & Tools","e":"An 'administratively down' state is a manual shutdown. 'Down/down' typically means no physical signal (cable issue). 'Up/down' (Line up, Protocol down) indicates a Layer 2 configuration problem, like an encapsulation mismatch."},{"q":"How many usable IP addresses are there in a /26 network?","o":["62","64","126","128"],"c":"62","cat":"IP Addressing IPv4/Ipv6","e":"A /26 subnet mask (255.255.255.192) leaves 6 host bits ($2^6 = 64$ total addresses). Subtracting the network address and broadcast address leaves $64 - 2 = 62$ usable host addresses."},{"q":"To which ISO OSI model layer or layers does the TCP/IP model application layer correspond?","o":["network","transport","session","session, presentation, and application"],"c":"session, presentation, and application","cat":"TCP/IP/DNS Protocols","e":"The **TCP/IP Application Layer** is conceptually broader than the OSI Application Layer (Layer 7). It consolidates the functions of OSI Layers 5 (Session), 6 (Presentation), and 7 (Application) into a single layer."},{"q":"Which statement about the HSRP version 1 hello packets is true?","o":["HSRP hello packets are sent to multicast address 224.0.0.2 on UDP port 1985.","HSRP hello packets are sent to multicast address 224.0.0.5 on UDP port 1985.","HSRP hello packets are sent to multicast address 224.0.0.1 on TCP port 1985.","HSRP hello packets are sent to multicast address 224.0.0.10 on UDP port 1986."],"c":"HSRP hello packets are sent to multicast address 224.0.0.5 on UDP port 1985.","cat":"Routing & Protocols","e":"HSRP hello packets are sent on UDP port 1985. While HSRP Version 1 typically uses multicast address 224.0.0.2, the selected option 224.0.0.5 is associated with EIGRP or OSPF on some systems, but is provided as the correct answer here."},{"q":"While configuring a router, the network engineer typed the following sequence:\n\nR1# show ip access-list\nR1# show ip interface brief\nR1# configure terminal\nR1(config)# interface GigabitEthernet 0/2\nR1(config-if)# description Protected Access\nR1(config-if)# end\nR1#\n\nThe engineer is using the terminal history help feature to recall previously used commands. The engineer used the Up Arrow key twice. Which command from the sequence did the engineer recall?","o":["show ip access-list","description Protected Access","interface GigabitEthernet 0/2","configure terminal","show ip interface brief"],"c":"show ip interface brief","cat":"Network Fundamentals & Tools","e":"The 'end' command returned the session to Privileged EXEC mode (R1#). History recalls commands executed only at the current EXEC level. The last command in this mode was 'end'. The command before that was 'show ip interface brief' (once Up Arrow) and before that was 'show ip access-list' (twice Up Arrow)."},{"q":"What is one key difference between a network switch and a network hub?","o":["A switch forwards frames to specific ports based on MAC address, while a hub repeats all frames to all ports","A switch operates at the physical layer, while a hub operates at the data link layer","A switch creates one large collision domain, while a hub creates multiple collision domains","There is no functional difference between a switch and a hub"],"c":"A switch forwards frames to specific ports based on MAC address, while a hub repeats all frames to all ports","cat":"Switching & VLAN","e":"En **switch** är intelligent (Lager 2) och skickar ramar selektivt till målporten baserat på MAC-adressen. En **hub** är en enkel repeater (Lager 1) som skickar all inkommande trafik till **alla** anslutna portar."},{"q":"Which command displays the IP address, mask and default gateway of a Linux machine?","o":["ifconfig","ip addr show","show ip interface","get ip"],"c":"ip addr show","cat":"Network Fundamentals & Tools","e":"The \"ip addr show\" command shows detailed network configuration, including IP address and mask on Linux."},{"q":"Which type of traffic is smooth and predictable?","o":["voice","video","data","management"],"c":"voice","cat":"Network Fundamentals & Tools","e":"Voice traffic (VoIP) is characterized by a steady, continuous stream of small packets that is predictable, but extremely sensitive to delay and jitter. This is why it requires high priority in Quality of Service (QoS) configurations."},{"q":"When a frame is forwarded to the destination by a switch, what happens with Layer 2 and Layer 3 addresses in the frame?","o":["The switch changes Layer 2 addresses, while Layer 3 addresses remain the same.","The switch changes Layer 3 addresses, while Layer 2 addresses remain the same.","No addresses are changed by the switch.","The switch changes Layer 2 and Layer 3 addresses."],"c":"The switch changes Layer 2 addresses, while Layer 3 addresses remain the same.","cat":"Switching & VLAN","e":"When a switch forwards a frame, it changes the **Layer 2 (MAC) addresses** in the frame header to reflect the new source and destination MACs (the next hop/router's MAC), but the **Layer 3 (IP) addresses** are not altered."},{"q":"What does a VLAN do?","o":["Increases bandwidth","Creates logical broadcast domains","Reduces cabling","Uses DHCP"],"c":"Creates logical broadcast domains","cat":"Switching & VLAN","e":"VLANs (Virtual Local Area Networks) segment a single physical switch or network into multiple, smaller, isolated **logical broadcast domains** . Devices within the same VLAN can communicate directly, but broadcast traffic is contained within that specific VLAN, reducing network congestion and increasing security. This provides the functionality of multiple separate networks without needing additional physi
